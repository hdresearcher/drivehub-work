  <div class="g3">${Array.from({length:cat.contacts},(_,i)=>{var names=['Global Logistics Co','QuickShip Partners','Metro Express','Urban Delivery Co','Prime Parcels','SwiftDrop Inc','RouteMax LLC','DirectShip Pro','CoreFreight','FlexRoute Co','PackTrack Inc','NextDay Solutions','SpeedLine Delivery','FastLane Logistics','ClearPath Co','BrightDrop Inc','SureShip LLC','OptiRoute Co','MegaDrop Inc','CrossPoint Delivery','StarShip Co','PeakDrop LLC','HyperRoute Inc','TrueTrack Co'];var name=names[i%names.length];var cities=['Los Angeles, CA','San Francisco, CA','Phoenix, AZ','Dallas, TX','Chicago, IL','Seattle, WA','Miami, FL','Atlanta, GA','Denver, CO','Portland, OR','Boston, MA','Houston, TX'];var city=cities[i%cities.length];var rate=(1.1+Math.random()*0.8).toFixed(2);return`<div class="card cb"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="width:36px;height:36px;border-radius:8px;background:${cat.color}15;display:flex;align-items:center;justify-content:center;color:${cat.color};font-size:14px">${cat.icon}</div><div><div style="font-weight:600;font-size:12px">${esc(name)}</div><div style="font-size:11px;color:var(--muted)">${esc(city)}</div></div></div><div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-sub)"><span style="font-size:12px;color:var(--muted)">Rate: <strong style="color:var(--primary)">$${rate}/stop</strong></span><button class="btn btn-p btn-sm" onclick="toast('Connection request sent to ${esc(name)}')">${icon('Send')} Connect</button></div></div>`;}).join('')}</div></div>`;
}
window.sendCommMsg=function(){
  var inp=document.getElementById('comm-msg-input');if(!inp||!inp.value.trim())return;
  var text=inp.value.trim();
  if(commTab==='internal'){var c=COMM_INTERNAL_CONTACTS.find(c=>c.id===commActiveChat);if(c)c.msgs.push({from:'me',text:text,time:'Just now'});}
  else if(commTab==='rsp_network'){var c=COMM_RSP_OWNERS.find(c=>c.id===commActiveChat);if(c)c.msgs.push({from:'me',text:text,time:'Just now'});}
  rerenderPage();
};

function renderKanbanBoard(){
  var u=state.user;var isAdmin=u&&u.role==='admin';var isOwner=u&&u.role==='owner';
  var pendingCount=kbTasks.filter(t=>t.pendingEdit&&!t.editApproved).length;
  var newNotifs=isOwner?kbTasks.filter(t=>t.createdBy==='admin'&&t.col!=='done').length:pendingCount;
  var filtered=kbFilter==='all'?kbTasks:kbTasks.filter(t=>t.assignedTo===kbFilter);
  return`<div class="page">
    <div class="ph"><div><div class="pt">${icon('ClipboardList')}&nbsp;Project Board</div><div class="ps">Shared task management · ${kbTasks.length} tasks</div></div><div style="display:flex;gap:8px"><div style="display:flex;gap:4px"><button class="btn btn-sm ${kbFilter==='all'?'btn-p':'btn-o'}" onclick="kbFilter='all';rerenderPage()">All</button><button class="btn btn-sm ${kbFilter==='admin'?'btn-p':'btn-o'}" onclick="kbFilter='admin';rerenderPage()">Admin</button><button class="btn btn-sm ${kbFilter==='owner'?'btn-p':'btn-o'}" onclick="kbFilter='owner';rerenderPage()">Owner</button></div>${isAdmin?`<button class="btn btn-p" onclick="openKbTaskModal()">${icon('Plus')} New Task</button>`:''}</div></div>
    ${newNotifs>0?`<div class="kb-notif">${icon('Bell')}&nbsp;${isOwner?newNotifs+' task(s) assigned to you by Platform Admin':pendingCount+' edit(s) pending your approval'}</div>`:''}
    <div class="kb-board">${KANBAN_COLS.map(col=>{var tasks=filtered.filter(t=>t.col===col);return`<div class="kb-column"><div class="kb-col-head"><span class="kb-col-title" style="color:${KANBAN_COL_COLORS[col]}">${KANBAN_LABELS[col]}</span><span class="kb-col-count">${tasks.length}</span></div>${tasks.map(t=>{
      var hasPending=t.pendingEdit&&!t.editApproved;
      return`<div class="kb-task" onclick="openKbDetail(${t.id})"><div class="kb-task-title">${esc(t.title)}</div><div class="kb-task-meta"><span class="kb-task-tag" style="background:${t.createdBy==='admin'?'var(--info-bg)':'var(--ok-bg)'};color:${t.createdBy==='admin'?'var(--info-t)':'var(--ok-t)'}">${t.createdBy==='admin'?'Admin':'Owner'}</span>${t.cost>0?`<span class="kb-task-tag" style="background:var(--primary-bg);color:var(--primary)">$${t.cost.toLocaleString()}</span>`:''}</div><div class="kb-task-dates">${icon('Calendar')} ${esc(t.startDate)} → ${esc(t.endDate)}</div>${t.result?`<div class="kb-task-result">${icon('Check')} ${esc(t.result.slice(0,80))}${t.result.length>80?'…':''}</div>`:''}${hasPending?`<div class="kb-approval">${icon('AlertTriangle')} Edit pending approval</div>`:''}<div class="kb-task-foot"><div class="kb-task-assignee"><div class="avatar" style="width:20px;height:20px;font-size:8px;background:${t.assignedTo==='owner'?'var(--ok-bg)':'var(--info-bg)'};color:${t.assignedTo==='owner'?'var(--ok-t)':'var(--info-t)'}">${t.assignedTo==='owner'?'OW':'AD'}</div><span style="font-size:11px;color:var(--muted)">${t.assignedTo==='owner'?'Company Owner':'Admin'}</span></div>${isAdmin||isOwner?`<select class="small-select" onclick="event.stopPropagation()" onchange="moveKbTask(${t.id},this.value)">${KANBAN_COLS.map(c=>`<option value="${c}"${t.col===c?' selected':''}>${KANBAN_LABELS[c]}</option>`).join('')}</select>`:''}</div></div>`;}).join('')}</div>`;}).join('')}</div>
  </div>`;
}
window.moveKbTask=function(id,col){var t=kbTasks.find(t=>t.id===id);if(t)t.col=col;toast('Task moved to '+KANBAN_LABELS[col]);rerenderPage();};
window.openKbDetail=function(id){
  var t=kbTasks.find(t=>t.id===id);if(!t)return;
  var u=state.user;var isAdmin=u&&u.role==='admin';var isOwner=u&&u.role==='owner';
  var hasPending=t.pendingEdit&&!t.editApproved;
  var html=`<div class="overlay" id="kb-detail-modal"><div class="modal" style="max-width:640px"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px"><div class="modal-title" style="margin:0">${esc(t.title)}</div><span class="badge ${t.col==='done'?'b-completed':t.col==='review'?'b-pending':t.col==='in_progress'?'b-active':'b-inactive'}">${KANBAN_LABELS[t.col]}</span></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5">${esc(t.desc)}</div>
    <div class="g2 mb4">${[{l:'Start Date',v:t.startDate},{l:'End Date',v:t.endDate},{l:'Cost',v:'$'+t.cost.toLocaleString()},{l:'Created By',v:t.createdBy==='admin'?'Platform Admin':'Company Owner'},{l:'Assigned To',v:t.assignedTo==='owner'?'Company Owner':'Admin'}].map(f=>`<div><label>${f.l}</label><div style="font-size:13px;font-weight:500;padding:4px 0">${esc(f.v)}</div></div>`).join('')}</div>
    ${t.notes?`<div style="margin-bottom:14px"><label>Notes</label><div style="font-size:12px;color:var(--muted);padding:10px;background:rgba(255,255,255,.02);border:1px solid var(--border-sub);border-radius:6px;line-height:1.5">${esc(t.notes)}</div></div>`:''}
    ${t.result?`<div style="margin-bottom:14px"><label>What We Get as a Result of Completion</label><div style="font-size:12px;color:var(--ok-t);padding:10px;background:var(--ok-bg);border:1px solid rgba(74,222,128,.15);border-radius:6px;line-height:1.5">${icon('Check')} ${esc(t.result)}</div></div>`:''}
    ${hasPending?`<div style="margin-bottom:14px;padding:12px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:8px"><div style="font-size:12px;font-weight:600;color:var(--pur-t);margin-bottom:8px">${icon('AlertTriangle')} Pending Edit Request</div><div style="font-size:12px;color:var(--muted)">Field: <strong>${esc(t.pendingEdit.field)}</strong> · Old: ${esc(t.pendingEdit.oldVal)} → New: <strong style="color:var(--warn-t)">${esc(t.pendingEdit.newVal)}</strong></div><div style="font-size:11px;color:var(--dim);margin-top:4px">Reason: ${esc(t.pendingEdit.reason)} · By: ${esc(t.pendingEdit.by)}</div>${isAdmin?`<div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-ok btn-sm" onclick="approveKbEdit(${t.id})">Approve</button><button class="btn btn-err btn-sm" onclick="rejectKbEdit(${t.id})">Reject</button></div>`:''}</div>`:''}
    ${isOwner&&!hasPending?`<div style="margin-top:12px"><button class="btn btn-o btn-sm" onclick="proposeKbEdit(${t.id})">Propose Edit</button></div>`:''}
    <div class="modal-foot"><button class="btn btn-o" onclick="closeModal('kb-detail-modal')">Close</button>${isAdmin?`<button class="btn btn-err btn-sm" onclick="deleteKbTask(${t.id})">Delete</button>`:''}</div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  document.getElementById('kb-detail-modal').addEventListener('click',function(e){if(e.target.id==='kb-detail-modal')closeModal('kb-detail-modal');});
};
window.approveKbEdit=function(id){var t=kbTasks.find(t=>t.id===id);if(!t||!t.pendingEdit)return;t[t.pendingEdit.field]=t.pendingEdit.newVal;t.pendingEdit=null;t.editApproved=true;toast('Edit approved');closeModal('kb-detail-modal');rerenderPage();};
window.rejectKbEdit=function(id){var t=kbTasks.find(t=>t.id===id);if(!t)return;t.pendingEdit=null;toast('Edit rejected');closeModal('kb-detail-modal');rerenderPage();};
window.proposeKbEdit=function(id){
  var t=kbTasks.find(t=>t.id===id);if(!t)return;
  var field=prompt('Which field to edit? (cost, endDate, notes)');if(!field)return;
  var newVal=prompt('New value:');if(!newVal)return;
  var reason=prompt('Reason for change:');if(!reason)return;
  t.pendingEdit={field:field,oldVal:t[field],newVal:newVal,reason:reason,by:'owner',ts:new Date().toISOString()};
  t.editApproved=false;toast('Edit proposed — pending Admin approval');closeModal('kb-detail-modal');rerenderPage();
};
window.deleteKbTask=function(id){if(!confirm('Delete this task?'))return;kbTasks=kbTasks.filter(t=>t.id!==id);toast('Task deleted');closeModal('kb-detail-modal');rerenderPage();};
window.openKbTaskModal=function(){
  var html=`<div class="overlay" id="kb-new-modal"><div class="modal"><div class="modal-title">New Task</div><form id="kb-form"><div class="frow"><div class="fcol full"><label>Title *</label><input class="inp" id="kb-title" required/></div><div class="fcol full"><label>Description</label><textarea class="inp" id="kb-desc" rows="2"></textarea></div><div class="fcol"><label>Start Date</label><input class="inp" id="kb-start" type="date"/></div><div class="fcol"><label>End Date</label><input class="inp" id="kb-end" type="date"/></div><div class="fcol"><label>Cost ($)</label><input class="inp" id="kb-cost" type="number" value="0"/></div><div class="fcol"><label>Assign To</label><select class="inp" id="kb-assign"><option value="owner">Company Owner</option><option value="admin">Admin</option></select></div><div class="fcol full"><label>Notes</label><textarea class="inp" id="kb-notes" rows="2"></textarea></div><div class="fcol full"><label>What We Get as a Result of Completion</label><textarea class="inp" id="kb-result" rows="2"></textarea></div></div><div class="modal-foot"><button type="button" class="btn btn-o" onclick="closeModal('kb-new-modal')">Cancel</button><button type="submit" class="btn btn-p">Create Task</button></div></form></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);

    kbTasks.push({id:kbSeq++,title:document.getElementById('kb-title').value,desc:document.getElementById('kb-desc').value||'',assignedTo:document.getElementById('kb-assign').value,createdBy:state.user.role==='admin'?'admin':'owner',col:'backlog',startDate:document.getElementById('kb-start').value||'TBD',endDate:document.getElementById('kb-end').value||'TBD',cost:+document.getElementById('kb-cost').value||0,notes:document.getElementById('kb-notes').value||'',result:document.getElementById('kb-result').value||'',pendingEdit:null,editApproved:true});
    toast('Task created');closeModal('kb-new-modal');rerenderPage();

};

function renderOwnerValuation(){
  var u=state.user;var ops=getOwnerOps(u.co);if(!ops)return'';
  var co=ops.co;
  var annualRev=ops.monthlyRev*12;
  var annualProfit=annualRev*((100-72)/100); // 28% margin from getOwnerOps
  var sde=annualProfit+45000; // owner salary add-back
  var ebitda=annualProfit*0.88; // ~EBITDA
  var fleetVal=co.fleet*18000; // avg vehicle value
  var goodwill=annualRev*0.3;
  // Valuation methods
  var methods=[
    {name:'SDE Multiple (Seller\'s Discretionary Earnings)',value:Math.round(sde*2.8),mult:'2.5–3.2×',source:'BizBuySell 2024 — Transportation & Logistics median multiples',components:[{l:'Annual Net Profit',v:annualProfit},{l:'Owner Salary Add-Back',v:45000},{l:'SDE',v:sde},{l:'Applied Multiple',v:'2.8×'}]},
    {name:'EBITDA Multiple',value:Math.round(ebitda*4.5),mult:'4.0–5.5×',source:'PitchBook 2024 — Last-Mile Delivery & Logistics sector comps',components:[{l:'Annual EBITDA (est.)',v:ebitda},{l:'Applied Multiple',v:'4.5×'},{l:'Industry Avg Multiple',v:'4.0–5.5×'}]},
    {name:'Revenue Multiple',value:Math.round(annualRev*1.2),mult:'0.8–1.5×',source:'IBISWorld 2024 — Couriers & Local Delivery Services (NAICS 49211)',components:[{l:'Annual Revenue',v:annualRev},{l:'Applied Multiple',v:'1.2×'},{l:'Revenue Growth Rate',v:'+8.4%'}]},
    {name:'Asset-Based Valuation',value:Math.round(fleetVal+goodwill+annualProfit*0.5),mult:'Fleet + Goodwill',source:'IRS Asset Depreciation Guidelines + FMV Assessment Standards (AICPA)',components:[{l:'Fleet Fair Market Value ('+co.fleet+' vehicles)',v:fleetVal},{l:'Routes & Customer Goodwill',v:goodwill},{l:'Working Capital',v:Math.round(annualProfit*0.5)}]},
    {name:'DCF (Discounted Cash Flow) — 5-Year',value:Math.round(annualProfit*3.79),mult:'NPV @ 12% WACC',source:'Damodaran NYU Stern — Cost of Capital for Transportation sector, Jan 2025',components:[{l:'Year 1 Cash Flow',v:annualProfit},{l:'Growth Rate',v:'6% p.a.'},{l:'Discount Rate (WACC)',v:'12%'},{l:'Terminal Multiple',v:'4.0×'},{l:'NPV 5-Year',v:Math.round(annualProfit*3.79)}]},
  ];
  var avgVal=Math.round(methods.reduce((a,m)=>a+m.value,0)/methods.length);
  var targetPrice=state._targetPrice||avgVal;
  var recommendations=[
    {title:'Increase Route Density & Stop Count',impact:'+12–18%',desc:'Optimize route planning to maximize stops per driver per day. Target 75+ stops/route in LA Metro. Higher utilization directly increases SDE and EBITDA multiples.',timeframe:'3–6 months'},
    {title:'Diversify Revenue Streams Beyond OnTrac',impact:'+15–25%',desc:'Add DTC/Shopify delivery ($1.65/stop) and white-glove furniture ($4.80/stop) via OnRouteRates platform. Multi-source revenue reduces buyer risk perception.',timeframe:'3–9 months'},
    {title:'Lock In Long-Term Carrier Contracts',impact:'+10–15%',desc:'Negotiate 2–3 year contracts with OnTrac and other carriers at locked rates. Predictable revenue commands higher acquisition multiples from PE buyers.',timeframe:'1–3 months'},
    {title:'Build Driver Retention Program',impact:'+8–12%',desc:'Reduce driver turnover below 20% annually. Implement bonus tiers, performance incentives, and benefits. Low turnover = operational stability for buyers.',timeframe:'6–12 months'},
    {title:'Automate Operations & Reduce Owner Dependency',impact:'+20–30%',desc:'Hire GM, implement TMS/WMS, automate dispatch. Buyers pay premium for businesses that run without the owner. Critical for maximizing SDE multiple.',timeframe:'6–18 months'},
    {title:'Improve Compliance & Safety Record',impact:'+5–10%',desc:'Maintain clean DOT/MC record, zero safety violations, current insurance. Clean compliance history reduces buyer due diligence risk.',timeframe:'Ongoing'},
    {title:'Document SOPs & Financial Records',impact:'+10–15%',desc:'Create comprehensive Standard Operating Procedures. Maintain 3+ years of clean financials (CPA-reviewed). Buyers need auditability.',timeframe:'3–6 months'},
    {title:'Expand Fleet & Territory',impact:'+15–25%',desc:'Strategic fleet expansion (60+ vehicles) and new territory coverage. Larger operations attract institutional buyers and PE firms, who pay 5–6× EBITDA vs 3–4× for small ops.',timeframe:'12–24 months'},
  ];
  return`<div class="page">
    <div class="ph"><div><div class="pt">${icon('DollarSign')}&nbsp;Company Valuation</div><div class="ps">${esc(co.name)} · Business value analysis using US-standard methods</div></div><span class="badge b-active">5 Methods</span></div>
    <div class="card cb mb4" style="background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(167,139,250,.08));border-color:rgba(0,212,255,.2)">
      <div style="text-align:center"><div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:var(--mono);margin-bottom:6px">Estimated Company Value (Weighted Average)</div><div style="font-size:42px;font-weight:800;letter-spacing:-1px;color:var(--primary)">$${avgVal.toLocaleString()}</div><div style="font-size:13px;color:var(--muted);margin-top:4px">Range: $${Math.min(...methods.map(m=>m.value)).toLocaleString()} — $${Math.max(...methods.map(m=>m.value)).toLocaleString()}</div></div>
    </div>
    <div class="g4 mb4">${[{l:'Annual Revenue',v:'$'+annualRev.toLocaleString()},{l:'Annual Profit',v:'$'+annualProfit.toLocaleString()},{l:'Fleet Size',v:co.fleet+' vehicles'},{l:'Drivers',v:co.drivers+' active'}].map(k=>`<div class="card cb"><div class="kpi-label">${k.l}</div><div class="kpi-val" style="font-size:20px">${esc(k.v)}</div></div>`).join('')}</div>
    <div class="st">Valuation Methods</div>
    ${methods.map(m=>`<div class="val-method"><div class="val-method-head"><div><div class="val-method-name">${esc(m.name)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Multiple: ${esc(m.mult)}</div></div><div class="val-method-value">$${m.value.toLocaleString()}</div></div><div style="margin-bottom:8px">${m.components.map(c=>`<div class="val-component"><span style="color:var(--muted)">${esc(c.l)}</span><span style="font-weight:600">${typeof c.v==='number'?'$'+c.v.toLocaleString():esc(c.v)}</span></div>`).join('')}</div><div style="font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px">${icon('Info')} Source: ${esc(m.source)}</div></div>`).join('')}
    <div style="margin-top:24px"><div class="st">Target Sale Price</div><div class="card cb mb4"><div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap"><div><label>Set Your Target Price</label><div style="display:flex;align-items:center;gap:8px;margin-top:4px"><span style="font-size:16px;font-weight:700;color:var(--primary)">$</span><input class="inp" type="number" style="width:180px" value="${targetPrice}" onchange="state._targetPrice=+this.value;rerenderPage()"/></div></div><div style="flex:1"><div style="font-size:12px;color:var(--muted);margin-bottom:4px">vs Average Valuation: <strong style="color:${targetPrice>=avgVal?'var(--ok-t)':'var(--err-t)'}">${targetPrice>=avgVal?'+':''}${((targetPrice-avgVal)/avgVal*100).toFixed(1)}%</strong></div><div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden"><div style="height:100%;width:${Math.min(100,targetPrice/avgVal*80)}%;background:${targetPrice>avgVal*1.2?'var(--warn-t)':targetPrice>=avgVal?'var(--ok-t)':'var(--err-t)'};border-radius:4px"></div></div><div style="font-size:11px;color:var(--dim);margin-top:4px">${targetPrice>avgVal*1.3?'Above market — will require significant improvements':'Achievable with strategic improvements below'}</div></div></div></div></div>
    <div style="margin-top:24px"><div class="st">Recommendations to Increase Company Value</div>${recommendations.map((r,i)=>`<div class="val-rec"><div class="val-rec-num">${i+1}</div><div style="flex:1"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-weight:600;font-size:13px">${esc(r.title)}</span><span class="badge b-active">${esc(r.impact)} value</span></div><div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:6px">${esc(r.desc)}</div><div style="font-size:11px;color:var(--dim)">${icon('Clock')} Timeframe: ${esc(r.timeframe)}</div></div></div>`).join('')}</div>
  </div>`;
}

function renderOnRouteRates(){

function notifCanNavigate(n){
  if(!state.user)return false;
  var map=NOTIF_NAV_MAP[n.type]||NOTIF_NAV_MAP.sim;
  if(!map.page)return false;
  var role=state.user.role;
  if(map.page==='driver'&&role!=='driver')return(role==='admin'||role==='general_manager'||role==='manager');
  if(map.page==='billing'&&(role==='manager'||role==='driver'))return false;
  return true;
}

function resolveNotifPage(n){
  var map=NOTIF_NAV_MAP[n.type]||NOTIF_NAV_MAP.sim;
  var role=state.user?state.user.role:'admin';
  var target=n.page||map.page;
  if(!target)return null;
  if(target==='driver'&&role!=='driver')return{page:'tracking',tab:null};
  if(target==='dashboard'&&role==='owner')return{page:'owner_command',tab:null};
  if(target==='billing'&&n.type==='submission')return{page:'billing',tab:'manual'};
  return{page:target,tab:map.tab||null};
}

  var n=notifications.find(function(x){return x.id===id;});
  if(!n)return;
  n.read=true;

    var target=resolveNotifPage(n);
    if(target){
      if(target.tab&&state.user&&state.user.role==='driver'){
        state.drvTab=target.tab;state.page='driver';
      }else{
        state.page=target.page;
      }
      if(target.page==='reporting'){startApiSimulation();}else{stopApiSimulation();}
      render();
      return;
    }
  }
  showNotifDetail(n);
};

  function walk(el,d){
    if(d>12||skip.has(el.tagName)||el.id==="dh-con"||el.id==="dh-dialog"||el.id==="dh-toggle"||el.id==="dh-panel")return;
    if(el.children.length===0&&el.textContent.trim().length>0&&el.textContent.trim().length<200){
      if(!el.dataset.dhText){el.dataset.dhText="1";el.addEventListener("click",conHandleTextClick);el.addEventListener("keydown",e=>{if(e.key==="Escape")conCancelTextEdit(e.target);if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();conCommitTextEdit(e.target);}});el.addEventListener("blur",e=>conCommitTextEdit(e.target));}
    }
    Array.from(el.children).forEach(c=>walk(c,d+1));
  }
  walk(document.body,0);
}

function conHandleTextClick(e){if(CON.mode!=="text")return;e.stopPropagation();e.preventDefault();const el=e.currentTarget;if(el.contentEditable==="true")return;if(CON.activeEdit&&CON.activeEdit!==el)conCommitTextEdit(CON.activeEdit);el._dhOrig=el.textContent;el.contentEditable="true";el.focus();const range=document.createRange();range.selectNodeContents(el);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);CON.activeEdit=el;}
function conCommitTextEdit(el){if(el.contentEditable!=="true")return;el.contentEditable="false";const nv=el.textContent.trim(),ov=el._dhOrig||"";if(nv!==ov&&nv.length>0){const pg=conCurrentPage();CON.textChanges.push({id:CON.nextId++,type:"text",page:pg,selector:conSelector(el),oldVal:ov,newVal:nv,ts:new Date().toISOString()});el.style.outline="1px solid rgba(251,191,36,.4)";conRefreshPanel();}CON.activeEdit=null;delete el._dhOrig;}
function conCancelTextEdit(el){if(!el||el.contentEditable!=="true")return;el.textContent=el._dhOrig||el.textContent;el.contentEditable="false";CON.activeEdit=null;delete el._dhOrig;}

let _pendingPin=null;
function conHandlePageClick(e){if(CON.mode!=="annotate")return;if(e.target.closest("#dh-con")||e.target.closest("#dh-dialog")||e.target.closest("#dh-toggle"))return;e.stopPropagation();var container=document.getElementById('page-content');var rect=container?container.getBoundingClientRect():{left:0,top:0};var scrollT=container?container.scrollTop:0;var scrollL=container?container.scrollLeft:0;var px=e.clientX-rect.left+scrollL;var py=e.clientY-rect.top+scrollT;_pendingPin={x:px,y:py,page:conCurrentPage(),target:e.target.tagName+(e.target.className&&typeof e.target.className==="string"?" ."+e.target.className.trim().split(/\s+/)[0]:"")};document.getElementById("dh-dlg-page").textContent=conCurrentPage().toUpperCase();document.getElementById("dh-ann-n").textContent=CON.nextId;document.getElementById("dh-ann-input").value="";document.getElementById("dh-dialog").classList.add("open");setTimeout(()=>document.getElementById("dh-ann-input").focus(),80);}
function conSaveAnnotation(){const desc=document.getElementById("dh-ann-input").value.trim();if(!desc)return;const id=CON.nextId++;CON.annotations.push({id,..._pendingPin,desc,ts:new Date().toISOString()});conPlacePin(CON.annotations[CON.annotations.length-1]);document.getElementById("dh-dialog").classList.remove("open");_pendingPin=null;conRefreshPanel();}
window.conCancelAnnotation=()=>{document.getElementById("dh-dialog").classList.remove("open");_pendingPin=null;};
document.addEventListener("keydown",e=>{if(e.key==="Escape"){if(document.getElementById("dh-dialog").classList.contains("open"))conCancelAnnotation();if(CON.activeEdit)conCancelTextEdit(CON.activeEdit);}if(e.key==="Enter"&&document.getElementById("dh-dialog").classList.contains("open")&&e.ctrlKey)conSaveAnnotation();});

function conPlacePin(ann){var container=document.getElementById('page-content');if(!container){container=document.body;}container.style.position='relative';var pin=document.createElement("div");pin.className="dh-pin";pin.id="dh-pin-"+ann.id;pin.style.left=ann.x+"px";pin.style.top=ann.y+"px";pin.innerHTML='<button class="dh-pin-del" onclick="event.stopPropagation();conDeleteItem('+ann.id+',\'ann\')" title="Delete pin">✕</button><div class="dh-pin-line"></div><div class="dh-pin-dot">'+ann.id+'</div><div class="dh-pin-tip"><strong style="color:#ede9fe;font-size:10px;display:block;margin-bottom:3px">#'+ann.id+' · '+ann.page+'</strong>'+ann.desc+'</div>';container.appendChild(pin);}
function conRemovePin(id){const p=document.getElementById("dh-pin-"+id);if(p)p.remove();}

window.conSetMode=m=>{if(CON.mode===m){conSetMode(null);return;}if(CON.activeEdit)conCancelTextEdit(CON.activeEdit);CON.mode=m;document.body.classList.remove("dh-text-mode","dh-ann-mode");document.getElementById("dh-btn-text").classList.remove("act-text");document.getElementById("dh-btn-ann").classList.remove("act-ann");if(m==="text"){document.body.classList.add("dh-text-mode");document.getElementById("dh-btn-text").classList.add("act-text");conMarkTextNodes();}else if(m==="annotate"){document.body.classList.add("dh-ann-mode");document.getElementById("dh-btn-ann").classList.add("act-ann");}};
document.addEventListener("click",conHandlePageClick,true);

let _panelOpen=false;
window.conTogglePanel=()=>{_panelOpen=!_panelOpen;document.getElementById("dh-panel").classList.toggle("open",_panelOpen);if(_panelOpen)conRefreshPanel();};
function conRefreshPanel(){
  const all=[...CON.textChanges.map(c=>({...c,kind:"text"})),...CON.annotations.map(c=>({...c,kind:"ann"}))].sort((a,b)=>a.id-b.id);
  document.getElementById("dh-count").textContent=all.length;
  document.getElementById("dh-tx-count").textContent=CON.textChanges.length;
  document.getElementById("dh-ann-count").textContent=CON.annotations.length;
  const list=document.getElementById("dh-plist");
  if(all.length===0){list.innerHTML='<div style="padding:20px;text-align:center;font-size:11px;color:rgba(255,255,255,.38)">No changes yet</div>';return;}
  list.innerHTML=all.map(item=>{const isT=item.kind==="text";return`<div class="dh-pitem${isT?" dh-ptx":""}"><div class="dh-pitem-hdr"><div class="dh-pitem-num">${item.id}</div><span class="dh-pitem-pg">${item.page} · ${isT?"TEXT":"PIN"}</span><button class="dh-pitem-del" onclick="event.stopPropagation();conDeleteItem(${item.id},'${item.kind}')">✕</button></div><div class="dh-pitem-txt">${isT?`<em style="color:rgba(255,255,255,.50)">"${item.oldVal}"</em> → <strong style="color:#fbbf24">"${item.newVal}"</strong>`:item.desc}</div></div>`;}).join("");
}
window.conDeleteItem=(id,kind)=>{if(kind==="ann"){CON.annotations=CON.annotations.filter(a=>a.id!==id);conRemovePin(id);}else{CON.textChanges=CON.textChanges.filter(t=>t.id!==id);}conRefreshPanel();};
window.conClearAll=()=>{if(!confirm("Clear all?"))return;CON.annotations.forEach(a=>conRemovePin(a.id));CON.annotations=[];CON.textChanges=[];CON.nextId=1;conRefreshPanel();};
window.conExport=()=>{
  const all=[...CON.textChanges.map(c=>({...c,kind:"text"})),...CON.annotations.map(c=>({...c,kind:"ann"}))].sort((a,b)=>a.id-b.id);
  if(!all.length){alert("No changes to export.");return;}
  const now=new Date();const ds=now.toISOString().slice(0,10);
  let md=`# DriveHub — Change Annotations\n**Exported:** ${ds} · **User:** ${state.user?.name||'Unknown'}\n\n---\n\n`;
  all.forEach(item=>{const tag=item.kind==="text"?"TEXT EDIT":"ANNOTATION";md+=`## ${item.id}. [${tag}] — ${item.page.toUpperCase()}\n`;if(item.kind==="text"){md+=`Rename \`"${item.oldVal}"\` → \`"${item.newVal}"\`\n\n`;}else{md+=`${item.desc}\n\n> *Location: (${Math.round(item.x)}px, ${Math.round(item.y)}px) · Element: \`${item.target}\`*\n\n`;}});
  md+=`---\n*Generated by DriveHub Constructor · ${all.length} change${all.length!==1?"s":""} total*\n`;
  const blob=new Blob([md],{type:"text/markdown;charset=utf-8"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`rsp_changes_${ds}.md`;a.click();URL.revokeObjectURL(url);
};
function conToggleVisible(){CON.visible=!CON.visible;document.getElementById("dh-con").classList.toggle("vis",CON.visible);document.getElementById("dh-toggle").textContent=CON.visible?"⬡ Hide Constructor":"⬡ Constructor";}
function conCurrentPage(){return state.page||'dashboard';}
function conSelector(el){if(el.id)return"#"+el.id;const cls=typeof el.className==="string"?"."+el.className.trim().split(/\s+/).slice(0,2).join("."):"";return(el.tagName.toLowerCase()+cls).slice(0,60);}

function initMaps(){
  if(typeof L==='undefined')return;
  if(state.page==='tracking')initTrackingMap();
  if(state.user&&state.user.role==='driver'&&(state.drvTab||'route')==='route')initDriverRouteMap();
}

// ── Reporting global handlers ──
window.setRptTab=tab=>{state.rptTab=tab;rerenderPage();};
window.toggleCat=idx=>{const c=DETAIL_CATEGORIES[idx];if(rptSelectedCats.includes(c))rptSelectedCats=rptSelectedCats.filter(x=>x!==c);else rptSelectedCats.push(c);rerenderPage();};
window.manualApiSync=()=>{
  const ts=new Date().toISOString().slice(0,16).replace('T',' ');const user=state.user?state.user.name:'System';
  reportingLog.unshift({ts,user,action:'Manual API sync — '+onTracLive.metrics.totalVolume.toLocaleString()+' vol confirmed',type:'api_sync'});

};
window.applyManualEdit=(liveKey,val)=>{
  if(!val||isNaN(+val))return;const parts=liveKey.split('.');
  const target=parts[0]==='sc'?onTracLive.scorecardMetrics:onTracLive.metrics;const old=target[parts[1]];target[parts[1]]=+val;
  const ts=new Date().toISOString().slice(0,16).replace('T',' ');const user=state.user?state.user.name:'System';
  reportingLog.unshift({ts,user,action:'Manual override: '+parts[1]+' '+old+'→'+val,type:'manual_edit'});
  toast('Value updated: '+parts[1]);rerenderPage();
};

window.acctSort=col=>{if(acctSortCol===col){acctSortDir=acctSortDir==='asc'?'desc':'asc';}else{acctSortCol=col;acctSortDir='asc';}rerenderPage();};

window.exportLocXLSX=()=>{const data=getFilteredAcctData();const selLoc=acctLocFilter==='all'?'All_Locations':LOCATIONS.find(l=>l.id===acctLocFilter)?.name||'Report';const rows=data.map(d=>({Date:d.date,Day:d.dow,Location:d.location,Volume:d.volume,Stops:d.stops,Delivered:d.delivered,'LOS%':d.losRate,'CustOTP%':d.custOTP,Drivers:d.driversActive}));exportToXLSX(rows,'RSP_'+selLoc.replace(/[^a-zA-Z0-9]/g,'_'),'Daily Report');};
window.exportLocPDF=()=>{const data=getFilteredAcctData();const selLoc=acctLocFilter==='all'?'All Locations':LOCATIONS.find(l=>l.id===acctLocFilter)?.name||'Report';const rows=data.map(d=>({Date:d.date,Day:d.dow,Location:d.location,Volume:d.volume,Stops:d.stops,Delivered:d.delivered,'LOS%':d.losRate,'OTP%':d.custOTP,Drivers:d.driversActive}));exportToPDF(rows,'RSP_'+selLoc.replace(/[^a-zA-Z0-9]/g,'_'),'RSP Business Report — '+selLoc,Object.keys(rows[0]));};

// ── Touch support for Constructor pin placement ──
document.addEventListener('touchstart',function(e){
  if(CON.mode!=='annotate')return;
  if(e.target.closest('#dh-con')||e.target.closest('#dh-dialog')||e.target.closest('#dh-toggle')||e.target.closest('.dh-pin-del'))return;
  var container=document.getElementById('page-content');
  if(!container||!container.contains(e.target))return;
  e.preventDefault();
  var touch=e.touches[0];
  var rect=container.getBoundingClientRect();
  var px=touch.clientX-rect.left+container.scrollLeft;
  var py=touch.clientY-rect.top+container.scrollTop;
  _pendingPin={x:px,y:py,page:conCurrentPage(),target:e.target.tagName+(e.target.className&&typeof e.target.className==='string'?' .'+e.target.className.trim().split(/\s+/)[0]:'')};
  document.getElementById('dh-dlg-page').textContent=conCurrentPage().toUpperCase();
  document.getElementById('dh-ann-n').textContent=CON.nextId;
  document.getElementById('dh-ann-input').value='';
  document.getElementById('dh-dialog').classList.add('open');
  setTimeout(function(){document.getElementById('dh-ann-input').focus();},120);
},{passive:false});

// ── Star field animation ──
function initStarField(){
  var canvas=document.getElementById('star-canvas');
  if(!canvas)return;
  canvas.innerHTML='';
  var count=120;
  var floats=['starFloat1','starFloat2','starFloat3'];
  for(var i=0;i<count;i++){
    var star=document.createElement('div');
    var cls='star';
    if(Math.random()<0.25)cls+=' glow';
    if(Math.random()<0.15)cls+=' warm';
    star.className=cls;
    var size=Math.random()<0.1?(Math.random()*2+2.5):(Math.random()*2+0.4);
    var x=Math.random()*100;
    var startY=Math.random()*130+10;
    var floatAnim=floats[Math.floor(Math.random()*3)];
    var driftDur=Math.random()*50+30;
    var pulseDur=Math.random()*4+2;
    var driftDelay=Math.random()*driftDur;
    var pulseDelay=Math.random()*pulseDur;
    var minO=(Math.random()*0.15+0.05).toFixed(2);
    var maxO=(Math.random()*0.5+0.45).toFixed(2);
    star.style.cssText='width:'+size.toFixed(1)+'px;height:'+size.toFixed(1)+'px;left:'+x.toFixed(1)+'%;top:'+startY.toFixed(1)+'%;--star-min:'+minO+';--star-max:'+maxO+';animation:'+floatAnim+' '+driftDur.toFixed(1)+'s linear infinite, starPulse '+pulseDur.toFixed(1)+'s ease-in-out infinite;animation-delay:-'+driftDelay.toFixed(1)+'s,-'+pulseDelay.toFixed(1)+'s';
    canvas.appendChild(star);
  }
}

// ── Settings Panel ──
function renderSettingsBtn(){
  return `<button class="settings-bell" id="settings-bell-btn" onclick="toggleSettings()" title="Settings">${icon('Settings')}</button>`;
}

window.toggleSettings=function(){
  var existing=document.getElementById('settings-panel');
  var scrim=document.getElementById('settings-scrim');
  if(existing){existing.remove();if(scrim)scrim.remove();return;}
  var u=state.user;if(!u)return;
  var isLight=document.body.classList.contains('light-theme');
  var tz=state.timezone||'America/Los_Angeles';
  var tzOpts=[
    {v:'America/New_York',l:'Eastern (ET)'},
    {v:'America/Chicago',l:'Central (CT)'},
    {v:'America/Denver',l:'Mountain (MT)'},
    {v:'America/Los_Angeles',l:'Pacific (PT)'},
    {v:'America/Phoenix',l:'Arizona (AZ)'},
    {v:'UTC',l:'UTC'}
  ];
  var langOpts=[{v:'en',l:'English'},{v:'es',l:'Español'},{v:'zh',l:'中文'}];
  var currentLang=state.language||'en';
  var roleColor=AVATAR_COLOR[u.role]||'var(--primary)';
  var html=`<div class="settings-panel-scrim" id="settings-scrim" onclick="closeSettingsPanel()"></div>
  <div class="settings-panel open" id="settings-panel">
    <div class="stp-header"><h3>${icon('Settings')} Settings</h3><button class="btn-g" onclick="closeSettingsPanel()" style="padding:4px">✕</button></div>
    <div class="stp-section">
      <div class="stp-label">Account</div>
      <div class="stp-user-card">
        <div class="avatar" style="width:36px;height:36px;font-size:12px;background:${roleColor}22;color:${roleColor}">${initials(u.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="stp-user-name">${esc(u.name)}</div>
          <div class="stp-user-role">${esc(ROLE_LABELS[u.role])}</div>
          <div class="stp-user-email">${esc(u.email||'')}</div>
        </div>
      </div>
    </div>
    <div class="stp-section">
      <div class="stp-label">Appearance</div>
      <div class="stp-row">
        <span class="stp-row-label">${isLight?'☀ Light Mode':'🌙 Dark Mode'}</span>
        <button class="stp-toggle ${isLight?'on':'off'}" id="stp-theme-toggle" onclick="settingsToggleTheme()"></button>
      </div>
    </div>
    <div class="stp-section">
      <div class="stp-label">Region</div>
      <div class="stp-row">
        <span class="stp-row-label">Timezone</span>
        <select class="stp-select" id="stp-tz" onchange="settingsSetTimezone(this.value)">${tzOpts.map(function(o){return'<option value="'+o.v+'"'+(tz===o.v?' selected':'')+'>'+o.l+'</option>';}).join('')}</select>
      </div>
      <div class="stp-row">
        <span class="stp-row-label">Language</span>
        <select class="stp-select" id="stp-lang" onchange="settingsSetLanguage(this.value)">${langOpts.map(function(o){return'<option value="'+o.v+'"'+(currentLang===o.v?' selected':'')+'>'+o.l+'</option>';}).join('')}</select>
      </div>
    </div>
    <div class="stp-section">
      <div class="stp-label">Notifications</div>
      <div class="stp-row">
        <span class="stp-row-label">Push Notifications</span>
        <button class="stp-toggle ${state.pushNotif!==false?'on':'off'}" onclick="settingsTogglePush(this)"></button>
      </div>
      <div class="stp-row">
        <span class="stp-row-label">Sound Alerts</span>
        <button class="stp-toggle ${state.soundAlerts!==false?'on':'off'}" onclick="settingsToggleSound(this)"></button>
      </div>
    </div>
    <div class="stp-version">DriveHub v2.4.0 · Build 2026.03</div>
  </div>`;
  var btn=document.getElementById('settings-bell-btn');
  var rect=btn?btn.getBoundingClientRect():{right:window.innerWidth-24,bottom:48};
  document.body.insertAdjacentHTML('beforeend',html);
  var panel=document.getElementById('settings-panel');
  panel.style.position='fixed';
  panel.style.top=(rect.bottom+8)+'px';
  panel.style.right=Math.max(16,window.innerWidth-rect.right)+'px';
};

window.closeSettingsPanel=function(){
  var p=document.getElementById('settings-panel');if(p)p.remove();
  var s=document.getElementById('settings-scrim');if(s)s.remove();
};

window.settingsToggleTheme=function(){
  document.body.classList.toggle('light-theme');
  var isLight=document.body.classList.contains('light-theme');
  var tog=document.getElementById('stp-theme-toggle');
  if(tog){tog.className='stp-toggle '+(isLight?'on':'off');tog.previousElementSibling.textContent=isLight?'☀ Light Mode':'🌙 Dark Mode';}
  var label=document.querySelector('.theme-toggle-label');
  var ico=document.querySelector('.theme-icon');
  if(label)label.textContent=isLight?'Light':'Dark';
  if(ico)ico.textContent=isLight?'☀':'🌙';
};

window.settingsSetTimezone=function(tz){state.timezone=tz;toast('Timezone set to '+tz.split('/').pop().replace(/_/g,' '));};
window.settingsSetLanguage=function(lang){state.language=lang;toast('Language preference saved');};
window.settingsTogglePush=function(btn){state.pushNotif=btn.classList.contains('off');btn.className='stp-toggle '+(state.pushNotif?'on':'off');};
window.settingsToggleSound=function(btn){state.soundAlerts=btn.classList.contains('off');btn.className='stp-toggle '+(state.soundAlerts?'on':'off');};

// ── Theme toggle ──
window.toggleTheme=function(){
  document.body.classList.toggle('light-theme');
  var label=document.querySelector('.theme-toggle-label');
  var ico=document.querySelector('.theme-icon');
  if(label)label.textContent=document.body.classList.contains('light-theme')?'Light':'Dark';
  if(ico)ico.textContent=document.body.classList.contains('light-theme')?'☀':'🌙';
};

// ── Boot ──
window._reqView='kanban';
render();
</script>
