function renderManualData(){
  const pending=driverSubmissions.filter(s=>s.status==='pending');
  const history=driverSubmissions.filter(s=>s.status!=='pending');
  const SC={pending:'var(--warn-t)',approved:'var(--ok-t)',rejected:'var(--err-t)',matched:'var(--info-t)'};
  return `<div class="page">
    <div class="ph"><div><div class="pt">Manual Data Entry</div><div class="ps">Review driver-submitted actual values vs API data</div></div>${timeRangePicker('md',state.timeRange)}</div>
    <div class="tab-bar" style="max-width:500px">${[{id:'overview',label:'Overview'},{id:'manual_data',label:'Manual Data Entry'},{id:'reports',label:'Reports'}].map(t=>`<div class="tab-item${state.accTab===t.id?' active':''}" onclick="state.accTab='${t.id}';rerenderPage()">${t.label}${t.id==='manual_data'?` <span class="nav-badge" style="font-size:9px;margin-left:4px">${pending.length}</span>`:''}</div>`).join('')}</div>
    ${pending.length>0?`<div class="card mb4" style="border-color:rgba(251,191,36,.25)"><div class="ch" style="color:var(--warn-t)">${icon('AlertTriangle')}&nbsp;Pending Review (${pending.length})</div><div class="cb"><table><thead><tr><th>Driver</th><th>Date</th><th>Type</th><th style="text-align:right">API Value</th><th style="text-align:right">Actual</th><th>Reason</th><th>Actions</th></tr></thead><tbody>${pending.map(s=>{
    const diff=s.actualValue-s.apiValue;
    const pctDiff=((diff/s.apiValue)*100).toFixed(1);
    return`<tr><td style="font-weight:500">${esc(s.driverName)}</td><td style="color:var(--muted);font-family:var(--mono);font-size:11px">${esc(s.date)}</td><td>${badge('b-info-t',s.type)}</td><td style="text-align:right;font-family:var(--mono);color:var(--muted)">${s.type==='earnings'?'$':''}${s.apiValue}</td><td style="text-align:right;font-family:var(--mono);font-weight:600;color:${diff>0?'var(--ok-t)':diff<0?'var(--err-t)':'var(--text)'}">${s.type==='earnings'?'$':''}${s.actualValue} <span style="font-size:10px;opacity:.7">(${diff>0?'+':''}${pctDiff}%)</span></td><td style="max-width:180px"><div class="truncate" style="font-size:11px;color:var(--muted)">${esc(s.reason)}</div></td><td><div style="display:flex;gap:4px"><button class="btn btn-sm btn-ok" onclick="approveSubmission(${s.id})">вң“ Approve</button><button class="btn btn-sm btn-err" onclick="rejectSubmission(${s.id})">вң• Reject</button></div></td></tr>`;}).join('')}</tbody></table></div></div>`:'<div class="card mb4 cb" style="text-align:center;padding:32px;color:var(--muted)">вң… No pending submissions вҖ” all data verified</div>'}
    <div class="card"><div class="ch">${icon('Clock')}&nbsp;History</div><div class="cb"><table><thead><tr><th>Driver</th><th>Date</th><th>Type</th><th style="text-align:right">API</th><th style="text-align:right">Actual</th><th>Status</th><th>Reason</th></tr></thead><tbody>${history.map(s=>`<tr><td style="font-weight:500">${esc(s.driverName)}</td><td style="color:var(--muted);font-family:var(--mono);font-size:11px">${esc(s.date)}</td><td>${badge('b-info-t',s.type)}</td><td style="text-align:right;font-family:var(--mono);color:var(--muted)">${s.type==='earnings'?'$':''}${s.apiValue}</td><td style="text-align:right;font-family:var(--mono);font-weight:600">${s.type==='earnings'?'$':''}${s.actualValue}</td><td><span style="color:${SC[s.status]||'var(--muted)'};font-weight:500;font-size:11px">${s.status}</span></td><td style="max-width:180px;font-size:11px;color:var(--muted)">${esc(s.reason)}</td></tr>`).join('')}</tbody></table></div></div>
  </div>`;
}

function renderReports(){
  return `<div class="page">

    <div class="tab-bar" style="max-width:500px">${[{id:'overview',label:'Overview'},{id:'manual_data',label:'Manual Data Entry'},{id:'reports',label:'Reports'}].map(t=>`<div class="tab-item${state.accTab===t.id?' active':''}" onclick="state.accTab='${t.id}';rerenderPage()">${t.label}</div>`).join('')}</div>
    <div class="g3 mb4">
      ${[{t:'Verified Records',v:driverSubmissions.filter(s=>s.status==='approved'||s.status==='matched').length,s:'data points confirmed',ic:'CheckCircle',bg:'var(--ok-bg)',d:'Total number of driver data submissions that have been verified or auto-matched'},{t:'Data Corrections',v:driverSubmissions.filter(s=>s.status==='approved').length,s:'driver overrides applied',ic:'Pencil',bg:'var(--warn-bg)',d:'Cases where driver-reported actual values replaced API data after review'},{t:'Pending Review',v:driverSubmissions.filter(s=>s.status==='pending').length,s:'awaiting verification',ic:'Clock',bg:'var(--err-bg)',d:'Submissions waiting for accountant to approve or reject the correction'}].map(kpiCard).join('')}

function renderTeam(){
  const ROLE_ORDER=['admin','owner','general_manager','manager','accountant','driver'];
  const AVB={admin:'rgba(0,212,255,.15)',owner:'rgba(74,222,128,.15)',general_manager:'rgba(167,139,250,.15)',manager:'rgba(251,191,36,.15)',accountant:'rgba(45,212,191,.15)',driver:'rgba(249,115,22,.15)'};
  const grouped={};USERS.forEach(u=>{if(!grouped[u.role])grouped[u.role]=[];grouped[u.role].push(u);});
  return `<div class="page">
    <div class="ph"><div><div class="pt">Team</div><div class="ps">${USERS.length} platform users</div></div></div>
    ${ROLE_ORDER.filter(r=>grouped[r]).map(role=>`<div class="mb6"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div class="st" style="margin:0">${esc(ROLE_LABELS[role])}</div><span class="badge b-secondary">${grouped[role].length}</span></div><div class="gc" style="gap:12px">${grouped[role].map(u=>{const cn=u.co?companies.find(c=>c.id===u.co)?.name:null;const dd=u.role==='driver'?DRIVER_DATA[u.id]:null;return`<div class="card cb" style="padding:14px"><div class="user-card"><div class="av-lg" style="background:${AVB[role]};color:${AVATAR_COLOR[role]}">${initials(u.name)}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px"><div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.name)}</div><span class="badge ${u.active?'b-active':'b-inactive'}">${u.active?'Active':'Inactive'}</span></div><span class="badge b-${role}" style="margin-bottom:5px">${esc(ROLE_LABELS[role])}</span><br/>${u.phone?`<div class="icon-row" style="margin-top:5px">${icon('Phone')}&nbsp;${esc(u.phone)}</div>`:''}<div class="icon-row">${icon('Mail')}&nbsp;<span style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.email)}</span></div>${cn?`<div class="icon-row">${icon('Building2')}&nbsp;${esc(cn)}</div>`:''}</div></div></div>`;}).join('')}</div></div>`).join('')}
  </div>`;
}

function renderOwnerFleet(){
  const u=state.user;const ops=getOwnerOps(u.co);if(!ops)return'';
  const search=(document.getElementById('fleet-search')||{}).value||'';
  const statusF=(document.getElementById('fleet-status')||{}).value||'all';
  let drivers=ops.driverMatrix;
  if(search){const q=search.toLowerCase();drivers=drivers.filter(d=>d.name.toLowerCase().includes(q)||d.zone.toLowerCase().includes(q));}
  if(statusF!=='all')drivers=drivers.filter(d=>d.status===statusF);
  const active=ops.driverMatrix.filter(d=>d.status==='active').length;const completed=ops.driverMatrix.filter(d=>d.status==='completed').length;
  const totalStops=ops.driverMatrix.reduce((a,d)=>a+d.done,0);const totalEarnings=ops.driverMatrix.reduce((a,d)=>a+d.earnings,0);
  const avgOtp=(ops.driverMatrix.reduce((a,d)=>a+d.otp,0)/ops.driverMatrix.length).toFixed(1);
  return`<div class="page">
    <div class="ph"><div><div class="pt">${icon('Truck')}&nbsp;Fleet Command</div><div class="ps">${ops.driverCount} drivers В· ${ops.co.fleet} vehicles</div></div><span class="badge b-active">${active} active В· ${completed} done</span></div>
    <div class="g4 mb4">${[{t:'On Shift',v:ops.driversOnShift,s:`of ${ops.driverCount}`,ic:'Users',bg:'var(--primary-bg)',d:'Drivers currently on active delivery routes right now'},{t:'Stops Done',v:totalStops.toLocaleString(),s:'all routes',ic:'CheckCircle',bg:'var(--ok-bg)',d:'Total delivery stops completed across all active drivers today'},{t:'Avg OTP',v:avgOtp+'%',s:'target 95%',ic:'Clock',bg:parseFloat(avgOtp)>=95?'var(--ok-bg)':'var(--warn-bg)',d:'Average on-time performance across all drivers вҖ” target is 95%+'},{t:'Earnings',v:'$'+totalEarnings.toLocaleString(),s:'driver pay today',ic:'DollarSign',bg:'var(--primary-bg)',d:'Total driver compensation earned today based on per-stop rates'}].map(kpiCard).join('')}</div>
    <div class="filters"><div class="inp-w" style="flex:1;min-width:180px"><span class="inp-ic">${icon('Search')}</span><input class="inp has-ic" id="fleet-search" placeholder="Search driver, zoneвҖҰ" value="${esc(search)}" oninput="rerenderPage()"/></div><select class="inp" id="fleet-status" style="width:140px" onchange="rerenderPage()"><option value="all"${statusF==='all'?' selected':''}>All</option><option value="active"${statusF==='active'?' selected':''}>Active</option><option value="completed"${statusF==='completed'?' selected':''}>Completed</option><option value="idle"${statusF==='idle'?' selected':''}>Idle</option></select></div>
    <div class="card cb"><table><thead><tr><th></th><th>Driver</th><th>Zone</th><th>Vehicle</th><th>Stops</th><th>Progress</th><th style="text-align:right">OTP</th><th style="text-align:right">Rating</th><th style="text-align:right">Earned</th><th>Status</th></tr></thead><tbody>${drivers.map((d,i)=>`<tr><td style="font-size:11px;color:var(--dim);width:28px">${i+1}</td><td style="font-weight:500">${esc(d.name)}</td><td><span class="spec-tag">${esc(d.zone)}</span></td><td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${esc(d.vehicle)}</td><td>${d.done}/${d.stops}</td><td style="min-width:80px"><div style="display:flex;align-items:center;gap:6px"><div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:${d.stops>0?Math.round(d.done/d.stops*100):0}%;background:${d.done>=d.stops?'var(--ok-t)':'var(--primary)'};border-radius:3px"></div></div><span style="font-size:10px;font-weight:600;color:var(--muted)">${d.stops>0?Math.round(d.done/d.stops*100):0}%</span></div></td><td style="text-align:right;font-weight:500;color:${d.otp>=95?'var(--ok-t)':d.otp>=90?'var(--warn-t)':'var(--err-t)'}">${d.otp}%</td><td style="text-align:right">${d.rating}вҳ…</td><td style="text-align:right;font-weight:600">$${d.earnings}</td><td>${statusBadge(d.status)}</td></tr>`).join('')}</tbody></table></div>
  </div>`;
}
function renderOwnerFinancials(){

function renderDriverDashboard(){
  const u=state.user;
  const dd=DRIVER_DATA[u.id];
  if(!dd)return`<div class="page"><div style="text-align:center;padding:60px;color:var(--muted)">No driver data found.</div></div>`;
  const co=companies.find(c=>c.id===u.co);
  const tab=state.drvTab||'route';
  const TABS=[{id:'route',label:'Daily Route'},{id:'earnings',label:'My Earnings'},{id:'rates',label:'My Rates'},{id:'forecast',label:'Forecasts'},{id:'performance',label:'My Statistics'},{id:'report',label:'рҹ“қ Report Data'}];
  const rt=dd.currentRoute;
  const pct=Math.round(rt.completed/rt.totalStops*100);

  const hero=`<div class="drv-hero">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div class="drv-status-badge"><div class="drv-status-dot"></div> On Shift</div>
        <div class="drv-hero-name">${esc(u.name)}</div>
        <div class="drv-hero-sub">${esc(dd.vehicleType)} В· ${esc(dd.vehicleId)} В· ${esc(dd.zone)}</div>
        <div class="drv-hero-stats">
          <div class="drv-hero-stat"><div class="drv-hero-stat-val">${rt.completed}/${rt.totalStops}</div><div class="drv-hero-stat-label">Stops</div></div>
          <div class="drv-hero-stat"><div class="drv-hero-stat-val">${rt.drivenMiles} mi</div><div class="drv-hero-stat-label">Driven</div></div>
          <div class="drv-hero-stat"><div class="drv-hero-stat-val">${dd.streak}d рҹ”Ҙ</div><div class="drv-hero-stat-label">Streak</div></div>
          <div class="drv-hero-stat"><div class="drv-hero-stat-val">${dd.customerRating}вҳ…</div><div class="drv-hero-stat-label">Rating</div></div>
        </div>
      </div>
      <div style="text-align:right">
        <div class="drv-earnings-label">Today's Earnings</div>
        <div class="drv-earnings-big">$${dd.todayPay.toFixed(2)}</div>
        <div style="font-size:12px;opacity:.5">Week: $${dd.weekPay.toFixed(2)} В· Month: $${dd.monthPay.toFixed(2)}</div>
      </div>
    </div>
    <div style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;font-size:12px;opacity:.6;margin-bottom:6px"><span>${pct}%</span><span>${rt.completed} done В· ${rt.failed} failed В· ${rt.pending} left</span></div>
      <div style="height:8px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden"><div style="height:100%;border-radius:4px;background:var(--primary);width:${pct}%;box-shadow:0 0 12px var(--primary-glow)"></div></div>
    </div>
  </div>`;

  const tabBar=`<div class="tab-bar">${TABS.map(t=>`<div class="tab-item${tab===t.id?' active':''}" onclick="setDrvTab('${t.id}')">${t.label}</div>`).join('')}</div>`;

  let content='';
  if(tab==='route') content=renderDriverRoute(dd,co);
  else if(tab==='earnings') content=renderDriverEarnings(dd);
  else if(tab==='rates') content=renderDriverRates(dd);
  else if(tab==='forecast') content=renderDriverForecast(dd);
  else if(tab==='performance') content=renderDriverPerformance(dd,u);
  else if(tab==='report') content=renderDriverReport(dd,u);

  return`<div class="page">${hero}${tabBar}${content}</div>`;
}

        <div style="font-weight:600;font-size:13px;margin-bottom:10px">${icon('DollarSign')}&nbsp;Pay Breakdown</div>

    <div class="card mb4" style="overflow:hidden"><div class="ch">${icon('MapPin')}&nbsp;Live Driver Locations</div><div class="cb" style="padding:0"><div id="tracking-map" class="tracking-map"></div></div></div>

function initTrackingMap(){
  const mapEl=document.getElementById('tracking-map');if(!mapEl||mapEl._leaflet_id)return;
  const map=L.map(mapEl,{scrollWheelZoom:true,zoomControl:true}).setView([34.0,-118.2],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'В©CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
  const bounds=[];
  USERS.filter(u=>u.role==='driver'&&u.active).forEach(u=>{
    const gps=DRIVER_GPS[u.id];const dd=DRIVER_DATA[u.id];if(!gps||!dd)return;
    const co=companies.find(c=>c.id===u.co);const rt=dd.currentRoute;const pct=Math.round(rt.completed/rt.totalStops*100);
    const driverIcon=L.divIcon({className:'',html:'<div style="background:#f97316;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">'+initials(u.name)+'</div>',iconSize:[32,32],iconAnchor:[16,16]});
    const _dm=L.marker([gps.lat,gps.lng],{icon:driverIcon}).addTo(map).bindPopup('<div style="font-family:sans-serif;font-size:12px;min-width:160px"><strong>'+u.name+'</strong><br/><span style="color:#666">'+(co?.name||'')+' В· '+dd.zone+'</span><br/><span style="color:#f97316;font-weight:600">'+pct+'% done</span> В· '+rt.completed+'/'+rt.totalStops+' stops</div>');
    _dm.on('dblclick',function(e){L.DomEvent.stopPropagation(e);map.flyTo([gps.lat,gps.lng],18,{animate:true,duration:0.8});openDriverDetailPanel(u,dd,gps);});
    /* MCD hover/click */
    _mcdAttach(_dm,'driver',function(){return _mcdDriverHtml(u,dd,gps);},gps.lat,gps.lng,map);
    /* Route stop markers with MCD */
    dd.currentRoute.stops.forEach(function(st){if(!st.lat||!st.lng)return;
      var sclr=st.status==='delivered'?'#15803d':st.status==='active'?'#00d4ff':'#94a3b8';
      var ssz=st.status==='active'?22:16;
      var sIcon=L.divIcon({className:'',html:'<div style="background:'+sclr+';color:#fff;width:'+ssz+'px;height:'+ssz+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border:2px solid rgba(255,255,255,.8);box-shadow:0 1px 4px rgba(0,0,0,.3)'+(st.status==='active'?';animation:pulse 2s infinite':'')+'">'+st.n+'</div>',iconSize:[ssz,ssz],iconAnchor:[ssz/2,ssz/2]});
      var sm=L.marker([st.lat,st.lng],{icon:sIcon}).addTo(map);
      _mcdAttach(sm,'stop',function(){return _mcdStopHtml(st);},st.lat,st.lng,map);
    });
    bounds.push([gps.lat,gps.lng]);
    dd.currentRoute.stops.forEach(s=>{if(!s.lat)return;
      const clr=s.status==='delivered'?'#15803d':s.status==='active'?'#00d4ff':'#94a3b8';
      const stopIcon=L.divIcon({className:'',html:'<div style="background:'+clr+';color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)">'+s.n+'</div>',iconSize:[18,18],iconAnchor:[9,9]});
      L.marker([s.lat,s.lng],{icon:stopIcon}).addTo(map).bindPopup('<div style="font-family:sans-serif;font-size:11px"><strong>#'+s.n+'</strong> '+s.name+'<br/>'+s.addr+'<br/>'+s.status+' В· '+s.time+'</div>');
      bounds.push([s.lat,s.lng]);
    });
  });
  if(bounds.length>0)map.fitBounds(bounds,{padding:[30,30]});
  /* в”Җв”Җ Warehouse Nodes в”Җв”Җ */
  WAREHOUSE_NODES.forEach(function(wh){
    var whIcon=L.divIcon({className:'',html:'<div style="background:rgba(167,139,250,.18);border:2px solid #a78bfa;color:#a78bfa;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(167,139,250,.35)">рҹҸӯ</div>',iconSize:[28,28],iconAnchor:[14,14]});
    var wm=L.marker([wh.lat,wh.lng],{icon:whIcon}).addTo(map);
    _mcdAttach(wm,'warehouse',function(){return _mcdWarehouseHtml(wh);},wh.lat,wh.lng,map);
  });
}
function initDriverRouteMap(){
  const mapEl=document.getElementById('driver-route-map');if(!mapEl||mapEl._leaflet_id)return;
  const u=state.user;const dd=DRIVER_DATA[u.id];if(!dd)return;
  const stops=dd.currentRoute.stops.filter(s=>s.lat&&s.lng);if(stops.length===0)return;
  const cLat=stops.reduce((a,s)=>a+s.lat,0)/stops.length;const cLng=stops.reduce((a,s)=>a+s.lng,0)/stops.length;
  const map=L.map(mapEl,{scrollWheelZoom:true,zoomControl:true}).setView([cLat,cLng],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'В©CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
  const bounds=[];const routeCoords=stops.map(s=>[s.lat,s.lng]);
  L.polyline(routeCoords,{color:'#00d4ff',weight:3,opacity:0.6,dashArray:'8 6'}).addTo(map);
  stops.forEach(s=>{
    const clr=s.status==='delivered'?'#15803d':s.status==='active'?'#00d4ff':'#94a3b8';const sz=s.status==='active'?26:20;
    const stopIcon=L.divIcon({className:'',html:'<div style="background:'+clr+';color:#fff;width:'+sz+'px;height:'+sz+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:'+(s.status==='active'?10:9)+'px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)'+(s.status==='active'?';animation:pulse 2s infinite':'')+'">'+s.n+'</div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const _sm=L.marker([s.lat,s.lng],{icon:stopIcon}).addTo(map).bindPopup('<div style="font-family:sans-serif;font-size:12px;min-width:180px"><strong>#'+s.n+' вҖ” '+s.name+'</strong><br/>'+s.addr+'<br/><span style="color:'+clr+';font-weight:600">'+s.status+'</span> В· '+s.pkg+' В· '+s.time+'</div>');
    _mcdAttach(_sm,'stop',function(){return _mcdStopHtml(s);},s.lat,s.lng,map);
    bounds.push([s.lat,s.lng]);
  });
  if(bounds.length>0)map.fitBounds(bounds,{padding:[25,25]});
}

    <div class="ds-kpi"><div class="ds-kpi-label">${icon('Clock')}&nbsp;Customer OTP</div><div class="ds-kpi-val" style="color:${m.customerOTP>=90?'var(--ok-t)':'var(--warn-t)'}"><span class="live-val" data-live-key="m.customerOTP">${m.customerOTP.toFixed(1)}</span>%</div></div>
  </div>
  <div class="card mb4"><div class="ch">${icon('BarChart2')}&nbsp;Detail Categories (${catData.length})</div><div class="cb"><table><thead><tr><th>Category</th><th style="text-align:right">Count</th><th style="width:40%">Distribution</th><th style="text-align:right">% of Vol</th></tr></thead>

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// COMPANY VALUATION (Owner)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderOwnerValuation(){
  var u=state.user;var ops=getOwnerOps(u.co);if(!ops)return'';
  var co=ops.co;
  var annualRev=ops.monthlyRev*12;
  var annualProfit=annualRev*((100-72)/100); // 28% margin from getOwnerOps
  var sde=annualProfit+45000; // owner salary add-back
  var ebitda=annualProfit*0.88; // ~EBITDA
  var fleetVal=co.fleet*18000; // avg vehicle value
  var goodwill=annualRev*0.3;
  // Valuation methods
  var methods=[
    {name:'SDE Multiple (Seller\'s Discretionary Earnings)',value:Math.round(sde*2.8),mult:'2.5вҖ“3.2Г—',source:'BizBuySell 2024 вҖ” Transportation & Logistics median multiples',components:[{l:'Annual Net Profit',v:annualProfit},{l:'Owner Salary Add-Back',v:45000},{l:'SDE',v:sde},{l:'Applied Multiple',v:'2.8Г—'}]},
    {name:'EBITDA Multiple',value:Math.round(ebitda*4.5),mult:'4.0вҖ“5.5Г—',source:'PitchBook 2024 вҖ” Last-Mile Delivery & Logistics sector comps',components:[{l:'Annual EBITDA (est.)',v:ebitda},{l:'Applied Multiple',v:'4.5Г—'},{l:'Industry Avg Multiple',v:'4.0вҖ“5.5Г—'}]},
    {name:'Revenue Multiple',value:Math.round(annualRev*1.2),mult:'0.8вҖ“1.5Г—',source:'IBISWorld 2024 вҖ” Couriers & Local Delivery Services (NAICS 49211)',components:[{l:'Annual Revenue',v:annualRev},{l:'Applied Multiple',v:'1.2Г—'},{l:'Revenue Growth Rate',v:'+8.4%'}]},
    {name:'Asset-Based Valuation',value:Math.round(fleetVal+goodwill+annualProfit*0.5),mult:'Fleet + Goodwill',source:'IRS Asset Depreciation Guidelines + FMV Assessment Standards (AICPA)',components:[{l:'Fleet Fair Market Value ('+co.fleet+' vehicles)',v:fleetVal},{l:'Routes & Customer Goodwill',v:goodwill},{l:'Working Capital',v:Math.round(annualProfit*0.5)}]},
    {name:'DCF (Discounted Cash Flow) вҖ” 5-Year',value:Math.round(annualProfit*3.79),mult:'NPV @ 12% WACC',source:'Damodaran NYU Stern вҖ” Cost of Capital for Transportation sector, Jan 2025',components:[{l:'Year 1 Cash Flow',v:annualProfit},{l:'Growth Rate',v:'6% p.a.'},{l:'Discount Rate (WACC)',v:'12%'},{l:'Terminal Multiple',v:'4.0Г—'},{l:'NPV 5-Year',v:Math.round(annualProfit*3.79)}]},
  ];
  var avgVal=Math.round(methods.reduce((a,m)=>a+m.value,0)/methods.length);
  var targetPrice=state._targetPrice||avgVal;
  var recommendations=[
    {title:'Increase Route Density & Stop Count',impact:'+12вҖ“18%',desc:'Optimize route planning to maximize stops per driver per day. Target 75+ stops/route in LA Metro. Higher utilization directly increases SDE and EBITDA multiples.',timeframe:'3вҖ“6 months'},
    {title:'Diversify Revenue Streams Beyond OnTrac',impact:'+15вҖ“25%',desc:'Add DTC/Shopify delivery ($1.65/stop) and white-glove furniture ($4.80/stop) via OnRouteRates platform. Multi-source revenue reduces buyer risk perception.',timeframe:'3вҖ“9 months'},
    {title:'Lock In Long-Term Carrier Contracts',impact:'+10вҖ“15%',desc:'Negotiate 2вҖ“3 year contracts with OnTrac and other carriers at locked rates. Predictable revenue commands higher acquisition multiples from PE buyers.',timeframe:'1вҖ“3 months'},
    {title:'Build Driver Retention Program',impact:'+8вҖ“12%',desc:'Reduce driver turnover below 20% annually. Implement bonus tiers, performance incentives, and benefits. Low turnover = operational stability for buyers.',timeframe:'6вҖ“12 months'},
    {title:'Automate Operations & Reduce Owner Dependency',impact:'+20вҖ“30%',desc:'Hire GM, implement TMS/WMS, automate dispatch. Buyers pay premium for businesses that run without the owner. Critical for maximizing SDE multiple.',timeframe:'6вҖ“18 months'},
    {title:'Improve Compliance & Safety Record',impact:'+5вҖ“10%',desc:'Maintain clean DOT/MC record, zero safety violations, current insurance. Clean compliance history reduces buyer due diligence risk.',timeframe:'Ongoing'},
    {title:'Document SOPs & Financial Records',impact:'+10вҖ“15%',desc:'Create comprehensive Standard Operating Procedures. Maintain 3+ years of clean financials (CPA-reviewed). Buyers need auditability.',timeframe:'3вҖ“6 months'},
    {title:'Expand Fleet & Territory',impact:'+15вҖ“25%',desc:'Strategic fleet expansion (60+ vehicles) and new territory coverage. Larger operations attract institutional buyers and PE firms, who pay 5вҖ“6Г— EBITDA vs 3вҖ“4Г— for small ops.',timeframe:'12вҖ“24 months'},
  ];
  return`<div class="page">
    <div class="ph"><div><div class="pt">${icon('DollarSign')}&nbsp;Company Valuation</div><div class="ps">${esc(co.name)} В· Business value analysis using US-standard methods</div></div><span class="badge b-active">5 Methods</span></div>
    <div class="card cb mb4" style="background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(167,139,250,.08));border-color:rgba(0,212,255,.2)">
      <div style="text-align:center"><div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:var(--mono);margin-bottom:6px">Estimated Company Value (Weighted Average)</div><div style="font-size:42px;font-weight:800;letter-spacing:-1px;color:var(--primary)">$${avgVal.toLocaleString()}</div><div style="font-size:13px;color:var(--muted);margin-top:4px">Range: $${Math.min(...methods.map(m=>m.value)).toLocaleString()} вҖ” $${Math.max(...methods.map(m=>m.value)).toLocaleString()}</div></div>
    </div>

function toggleAcctDropdown(e){
  e.stopPropagation();
  _acctDdOpen=!_acctDdOpen;
  var dd=document.getElementById('acct-dd');
  if(dd){dd.classList.toggle('open',_acctDdOpen);}
}
function closeAcctDd(){
  _acctDdOpen=false;
  var dd=document.getElementById('acct-dd');
  if(dd)dd.classList.remove('open');
}
document.addEventListener('click',function(e){
  if(_acctDdOpen&&!e.target.closest('.acct-dd')&&!e.target.closest('.sb-user')){closeAcctDd();}
});

function loadAcctAvatar(input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    _acctAvatar=e.target.result;
    rerenderPage();
    // also update sidebar avatar
    var sbAv=document.getElementById('sb-avatar');
    if(sbAv){sbAv.style.backgroundImage='url('+_acctAvatar+')';sbAv.style.backgroundSize='cover';sbAv.style.backgroundPosition='center';sbAv.textContent='';}
    render(); // full re-render to update sidebar
  };
  reader.readAsDataURL(input.files[0]);
}
function fmtDOB(el){
  var v=el.value.replace(/\D/g,'');
  if(v.length>=3)v=v.slice(0,2)+'.'+v.slice(2);
  if(v.length>=6)v=v.slice(0,5)+'.'+v.slice(5,9);
  el.value=v;
}
function setAcctSrc(mode){
  _acctSrc=mode;
  rerenderPage();
}
function setAcctStyle(style){
  _acctReportStyle=style;
  rerenderPage();
}
function setAcctFmt(fmt){
  _acctReportFmt=fmt;
  rerenderPage();
}

function bindLogin(){
  let showPw=false;
  const toggle=document.getElementById('toggle-pass'),passInp=document.getElementById('login-pass');
  if(toggle)toggle.addEventListener('click',()=>{showPw=!showPw;passInp.type=showPw?'text':'password';toggle.innerHTML=icon(showPw?'EyeOff':'Eye');});
  document.querySelectorAll('.demo-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.getElementById('login-email').value=btn.dataset.email;document.getElementById('login-pass').value=btn.dataset.pw;});});
  document.getElementById('login-form').addEventListener('submit',e=>{
    e.preventDefault();
    const email=document.getElementById('login-email').value,pw=document.getElementById('login-pass').value;
    const u=USERS.find(u=>u.email===email&&u.pw===pw&&u.active);
    if(!u){alert('Invalid credentials');return;}
    const{pw:_,...safe}=u;state.user=safe;
    // MVP spec dashboards (textedits_01) take precedence when subtype is mapped
    state.page=(safe.subtype&&window.DH_MVP&&window.DH_MVP.dashboards[safe.subtype])?'mvp_dashboard':(safe.role==='driver'?'driver':safe.role==='owner'?'rsp_national':safe.role==='ontrac_manager'?'ontrac_gm':safe.role==='accountant'?'billing':'dashboard');
    state.drvTab='route';state.accTab='overview';render();
    startSimulation();
  });
  initStarField();
}

function bindPage(){
  const addCo=document.getElementById('add-co-btn');if(addCo)addCo.addEventListener('click',()=>{_editCoId=null;openCoModal(null);});
  const addReq=document.getElementById('add-req-btn');if(addReq)addReq.addEventListener('click',()=>openReqModal());
  // Driver report form
  const drForm=document.getElementById('driver-report-form');
  if(drForm)drForm.addEventListener('submit',e=>{
    e.preventDefault();
    const u=state.user,dd=DRIVER_DATA[u.id],rt=dd.currentRoute;
    const type=document.getElementById('dr-type').value;
    const val=parseFloat(document.getElementById('dr-value').value);
    const reason=document.getElementById('dr-reason').value;
    const apiVal=type==='stops'?rt.completed:type==='earnings'?dd.todayPay:rt.drivenMiles;
    driverSubmissions.unshift({id:++subSeq,driverId:u.id,driverName:u.name,coId:u.co,date:new Date().toISOString().slice(0,10),type,apiValue:apiVal,actualValue:val,reason,status:'pending',ts:new Date().toISOString()});
    notifications.unshift({id:notifSeq++,type:'submission',icon:'рҹ“қ',title:`Data submitted by ${u.name}`,body:`${type}: actual ${val} vs API ${apiVal}`,time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),read:false,page:'billing'});
    toast('Submitted for review');
    rerenderPage();
  });
  // Close notif panel on outside click
  document.addEventListener('click',e=>{if(state.notifOpen&&!e.target.closest('.notif-bell')&&!e.target.closest('.notif-panel')){closeNotifPanel();}});
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
   PERSISTENT AUDIO В· the audio element lives outside #root so it
   survives every render() / rerenderPage() / navigation. The UI
   in the topbar gets recreated, but it's just controls that bind
   to the persistent <audio>. Music never cuts off again.
   в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function _radioEnsurePersistent(){
  let a = document.getElementById('radioAudio');
  if(a && a.parentNode === document.body) return a; // already persistent
  if(a) { try { a.parentNode.removeChild(a); } catch(e){} } // remove stale
  a = document.createElement('audio');
  a.id = 'radioAudio';
  a.preload = 'none';
  a.crossOrigin = 'anonymous';
  a.volume = 0.22;          // safe default вҖ” quiet on first load
  a.style.display = 'none'; // invisible
  document.body.appendChild(a);
  // Bind once-only events that survive across renders
  a.addEventListener('playing', ()=>{ const n=_radioEl('radioNow'); if(n) n.textContent='Playing'; });
  a.addEventListener('waiting', ()=>{ const n=_radioEl('radioNow'); if(n) n.textContent='BufferingвҖҰ'; });
  a.addEventListener('error',   ()=>{ const n=_radioEl('radioNow'); if(n) n.textContent='Stream unreachable'; });
  return a;
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
   RESTORE UI В· runs after every render() to sync visual controls
   to the persistent <audio> state (label, play/pause, LED, volume)
   в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function _radioRestoreUI(){
  _radioEnsurePersistent();
  const a = _radioEl('radioAudio');
  if(!a) return;
  // Volume slider вҶ’ audio
  const vol = _radioEl('radioVol');
  if(vol){
    vol.value = Math.round((a.volume||0.22)*100);
  }
  // Currently selected station label
  if(_radioIdx >= 0 && _radioIdx < RADIO_STATIONS.length){
    const s = RADIO_STATIONS[_radioIdx];
    const lbl = _radioEl('radioLabel');
    if(lbl) lbl.textContent = (s.name||'').replace(/^SomaFM В· /,'').replace(/^DriveHub\.fm В· /,'вҳ… ');
  }
  // Play/pause state
  const playBtn = _radioEl('radioPlayBtn');
  const tgl = _radioEl('radioToggleBtn');
  const now = _radioEl('radioNow');
  if(a.src && !a.paused){
    if(tgl) tgl.classList.add('playing');
    if(playBtn) playBtn.textContent = 'вқҷвқҷ';
    if(now) now.textContent = 'Playing';
  } else if(a.src && a.paused){
    if(tgl) tgl.classList.remove('playing');
    if(playBtn) playBtn.textContent = 'в–¶';
    if(now) now.textContent = 'Paused';
  }
}
window._radioRestoreUI = _radioRestoreUI;

function radioPopulateStates(){
  const sel = _radioEl('radioState');
  if(!sel || sel.options.length > 1) return;  // already populated
  const states = [...new Set(RADIO_STATIONS.map(s=>s.st))].sort();
  states.forEach(st=>{
    const o = document.createElement('option');
    o.value = st; o.textContent = st;
    sel.appendChild(o);
  });
}

function radioRenderList(){
  const list = _radioEl('radioList');
  if(!list) return;
  const filtered = RADIO_STATIONS.filter(s => !_radioFilter || s.st === _radioFilter);
  if(!filtered.length){ list.innerHTML = '<div style="padding:14px;text-align:center;font-size:11px;color:var(--muted)">No stations for this state yet.</div>'; return; }
  list.innerHTML = filtered.map(s=>{
    const origIdx = RADIO_STATIONS.indexOf(s);
    const active  = origIdx === _radioIdx ? ' active' : '';
    return `<div class="radio-item${active}" onclick="radioPlay(${origIdx})" title="${s.name}"><div class="radio-item-st">${s.st}</div><div class="radio-item-body"><div class="radio-item-nm">${s.name}</div><div class="radio-item-g">${s.g}</div></div></div>`;
  }).join('');
}

function radioToggleMenu(e){
  if(e){ e.stopPropagation(); }
  const panel = _radioEl('radioPanel');
  if(!panel) return;
  const opening = !panel.classList.contains('open');
  panel.classList.toggle('open');
  if(opening){
    radioPopulateStates();
    radioRenderList();
  }
}

function radioFilter(){
  _radioFilter = _radioEl('radioState').value;
  radioRenderList();
}

function radioPlay(i){
  const s = RADIO_STATIONS[i];
  if(!s) return;
  _radioIdx = i;
  const a = _radioEl('radioAudio');
  if(!a) return;
  try{
    a.src = s.u;
    const vol = _radioEl('radioVol');
    if(vol) a.volume = (parseInt(vol.value,10)||22) / 100;
    const playP = a.play();
    _radioEl('radioLabel').textContent = s.name.replace('SomaFM В· ','');
    _radioEl('radioNow').textContent   = 'BufferingвҖҰ';
    _radioEl('radioToggleBtn').classList.add('playing');
    _radioEl('radioPlayBtn').textContent = 'вқҷвқҷ';
    if(playP && playP.catch){
      playP.then(()=>{ _radioEl('radioNow').textContent = 'Playing'; })
           .catch(err=>{
              _radioEl('radioNow').textContent = 'Stream unreachable';
              _radioEl('radioToggleBtn').classList.remove('playing');
              _radioEl('radioPlayBtn').textContent = 'в–¶';
              console.warn('[radio] play failed:', err && err.message);
           });
    }
  } catch(err){
    _radioEl('radioNow').textContent = 'Error';
    console.warn('[radio] error:', err);
  }
  radioRenderList();
}

function radioTogglePlay(){
  const a = _radioEl('radioAudio');
  if(!a) return;
  if(!a.src){ if(_radioIdx < 0) _radioIdx = 0; return radioPlay(_radioIdx); }
  if(a.paused){
    a.play().then(()=>{
      _radioEl('radioToggleBtn').classList.add('playing');
      _radioEl('radioPlayBtn').textContent = 'вқҷвқҷ';
      _radioEl('radioNow').textContent = 'Playing';
    }).catch(()=>{});
  } else {
    a.pause();
    _radioEl('radioToggleBtn').classList.remove('playing');
    _radioEl('radioPlayBtn').textContent = 'в–¶';
    _radioEl('radioNow').textContent = 'Paused';
  }
}

function radioVolume(v){
  const a = _radioEl('radioAudio');
  if(a) a.volume = (parseInt(v,10)||0) / 100;
}

  var role=state.user.role;
  if(map.page==='driver'&&role!=='driver')return(role==='admin'||role==='general_manager'||role==='manager'||role==='gm');

// в”Җв”Җ Time Range Multipliers в”Җв”Җ
// Base = "month". Everything scales proportionally.
var TR_MULT={today:1/22,week:5/22,month:1,quarter:3,ytd:3,custom:1};
var _customFrom='2026-02-02',_customTo='2026-03-02';
function trMult(){return TR_MULT[state.timeRange]||1;}
function trVal(base){return Math.round(base*trMult());}
function trCur(base){return(base*trMult()).toFixed(2);}
// Slice arrays proportionally for chart data
function trSliceData(arr){
  var m=state.timeRange;
  if(m==='today')return arr.slice(-1);
  if(m==='week')return arr.slice(-5);
  if(m==='month')return arr;
  if(m==='quarter'){
    // Extend: repeat data 3x with variance
    var out=[];for(var q=0;q<3;q++){arr.forEach(function(d,i){var obj={};for(var k in d)obj[k]=typeof d[k]==='number'&&k!=='month'?Math.round(d[k]*(0.85+q*0.12+Math.random()*0.06)):d[k];obj.month=(d.month||d.label||d.day||'')+(q>0?' Q'+(q+1):'');out.push(obj);});}return out;
  }
  if(m==='ytd')return arr; // same as month for now
  if(m==='custom'){
    var d1=new Date(_customFrom),d2=new Date(_customTo);
    var days=Math.max(1,Math.round((d2-d1)/(86400000)));
    TR_MULT.custom=days/30;
    var slice=Math.min(arr.length,Math.max(1,Math.round(arr.length*days/30)));
    return arr.slice(-slice);
  }
  return arr;
}
function trLabel(){
  var m=state.timeRange;
  if(m==='today')return 'Today';
  if(m==='week')return 'This Week';
  if(m==='month')return 'This Month';
  if(m==='quarter')return 'Quarter (90d)';
  if(m==='ytd')return 'Year to Date';
  if(m==='custom')return _customFrom+' вҶ’ '+_customTo;
  return '';
}
window.setCustomFrom=function(v){_customFrom=v;TR_MULT.custom=Math.max(1,Math.round((new Date(_customTo)-new Date(_customFrom))/86400000))/30;rerenderPage();};
window.setCustomTo=function(v){_customTo=v;TR_MULT.custom=Math.max(1,Math.round((new Date(_customTo)-new Date(_customFrom))/86400000))/30;rerenderPage();};
window.setCustomPreset=function(days){
  var to=new Date();var from=new Date(to.getTime()-days*86400000);
  _customFrom=from.toISOString().slice(0,10);_customTo=to.toISOString().slice(0,10);
  TR_MULT.custom=days/30;rerenderPage();
};

function fs2Tick(){
  FS2S.tick++;
  const tEl=document.getElementById('fs2-tick');if(tEl)tEl.textContent='Tick #'+FS2S.tick;
  const drvs=fs2Drvs();
  drvs.forEach(d=>{
    if(d.status==='off_duty')return;
    const ph=FS2S.tick*0.06+d.simPhase;
    const tl=d.baseLat+Math.sin(ph)*d.routeRadius;const tg=d.baseLng+Math.cos(ph)*d.routeRadius;
    d.heading=fs2Bear(d.lat,d.lng,tl,tg);
    d.lat+=(tl-d.lat)*.35;d.lng+=(tg-d.lng)*.35;
    d.speed=d.status==='at_stop'?0:(22+Math.sin(FS2S.tick*.3+d.grade)*12);
    const r=fs2sr(FS2S.tick*113+d.id.charCodeAt(d.id.length-1));
    if(r<0.06&&d.status==='en_route')d.status='at_stop';
    else if(r<0.12&&d.status==='at_stop'){d.status='en_route';if(d.stops>0){d.stops--;if(d.pkgs>0)d.pkgs=Math.max(0,d.pkgs-Math.ceil(1+r*3));}}
    const mk=fs2DM.get(d.id);if(mk)mk.setLatLng([d.lat,d.lng]);
  });
  if(FS2S.focusedDriver)fs2UpdateFC(FS2S.focusedDriver);
  if(FS2S.tick%3===0&&FS2S.tab==='fleet')fs2PanelFleet();
  if(FS2S.tick%5===0)fs2KPI();
}

  if(FS2S.simHandle)clearInterval(FS2S.simHandle);
  FS2S.simHandle=setInterval(fs2Tick,[2500,900,250][FS2S.speedIdx]);FS2S.running=true;
  const b=document.getElementById('fs2-pause');if(b)b.textContent='вҸё';

// DHBus вҖ” Cross-map state synchronization bus
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
window.DHBus=(function(){
  var _subs={};
  return{
    on:function(evt,fn){(_subs[evt]=_subs[evt]||[]).push(fn);},
    emit:function(evt,data){(_subs[evt]||[]).forEach(function(fn){try{fn(data);}catch(e){}});},
    off:function(evt,fn){if(_subs[evt])_subs[evt]=_subs[evt].filter(function(f){return f!==fn;});}
  };
})();

// в”Җв”Җ  Live GPS deltas вҖ” emit to bus every 3s  в”Җв”Җ
setInterval(function(){
  USERS.filter(function(u){return u.role==='driver'&&u.active;}).forEach(function(u){
    var gps=DRIVER_GPS[u.id];if(!gps)return;
    gps.speed=Math.max(0,Math.min(55,Math.round(gps.speed+(Math.random()*6-3))));
    gps.heading=(gps.heading+(Math.random()*8-4)+360)%360;
    DHBus.emit('driver:update',{uid:u.id,gps:gps});
  });
},3000);

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
var _mcdTimeout=null;
var _mcdTarget=null;

function _mcdEnsure(){
  var el=document.getElementById('mcd');
  if(!el){
    el=document.createElement('div');el.id='mcd';
    document.body.appendChild(el);
  }
  return el;
}

function _mcdPosition(lat,lng,map){
  /* Convert LatLng to screen coords and position MCD above the marker */
  var pt=map.latLngToContainerPoint(L.latLng(lat,lng));
  var mapEl=map.getContainer();
  var rect=mapEl.getBoundingClientRect();
  var absX=rect.left+pt.x;
  var absY=rect.top+pt.y;
  var el=_mcdEnsure();
  // Card dimensions: approx 240Г—180
  var cardW=240;var topOffset=16; /* gap above marker */
  var left=absX-cardW/2;
  var top=absY-(180+topOffset);
  /* Clamp to viewport */
  left=Math.max(8,Math.min(window.innerWidth-cardW-8,left));
  top=Math.max(8,top);
  el.style.left=left+'px';
  el.style.top=top+'px';
}

function _mcdShow(type,html,lat,lng,map){
  clearTimeout(_mcdTimeout);
  var el=_mcdEnsure();
  el.className='mcd-'+type;
  el.innerHTML='<div class="mcd-card">'+html+'</div>';
  _mcdPosition(lat,lng,map);
  /* Force reflow then add vis */
  el.offsetHeight;
  el.classList.add('vis');
  _mcdTarget={lat,lng,map};
}

function _mcdHide(delay){
  delay=delay||0;
  _mcdTimeout=setTimeout(function(){
    var el=document.getElementById('mcd');
    if(el)el.classList.remove('vis');
    _mcdTarget=null;
  },delay);
}

function _mcdKeep(){clearTimeout(_mcdTimeout);}

/* в”Җв”Җ Attach stay-alive on the floating card в”Җв”Җ */
document.addEventListener('mouseover',function(e){
  if(e.target.closest('#mcd'))_mcdKeep();
});
document.addEventListener('mouseout',function(e){
  if(e.target.closest('#mcd'))_mcdHide(300);
});
/* Dismiss on map click */
document.addEventListener('click',function(e){
  if(!e.target.closest('#mcd')&&!e.target.closest('.leaflet-marker-icon'))_mcdHide(0);
});

function _buildSpeedGauge(spd){
  var max=60;var pct=Math.min(1,spd/max);
  // Arc: 135deg start вҶ’ 270deg sweep
  var startAngle=-135;var sweep=270;var endAngle=startAngle+pct*sweep;
  var r=22;var cx=32;var cy=32;
  var rad=function(d){return d*Math.PI/180;};
  var sx=cx+r*Math.cos(rad(startAngle));var sy=cy+r*Math.sin(rad(startAngle));
  var ex=cx+r*Math.cos(rad(endAngle));var ey=cy+r*Math.sin(rad(endAngle));
  var largeArc=pct>0.5?1:0;
  var clr=spd<25?'#4ade80':spd<45?'#fbbf24':'#f87171';
  var arcPath=pct>0.01?'<path d="M'+sx.toFixed(2)+' '+sy.toFixed(2)+' A22 22 0 '+largeArc+' 1 '+ex.toFixed(2)+' '+ey.toFixed(2)+'" stroke="'+clr+'" stroke-width="5" fill="none" stroke-linecap="round" id="ddp-spd-arc"/>':'';
  return '<div style="text-align:center">'+
    '<svg id="ddp-spd-svg" width="64" height="64" viewBox="0 0 64 64">'+
      '<circle cx="32" cy="32" r="22" stroke="rgba(255,255,255,.06)" stroke-width="5" fill="none"/>'+
      arcPath+
      '<text x="32" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="'+clr+'" font-family="\'JetBrains Mono\',monospace" id="ddp-spd-txt">'+spd+'</text>'+
      '<text x="32" y="46" text-anchor="middle" font-size="7" fill="rgba(255,255,255,.32)" font-family="\'JetBrains Mono\',monospace">mph</text>'+
    '</svg>'+
    '<div style="font-size:9px;color:rgba(255,255,255,.35);font-family:var(--mono)">SPEED</div>'+
  '</div>';
}

function _buildEpodRing(pct){
  var r=24;var circ=2*Math.PI*r;
  var dash=circ*pct/100;var gap=circ-dash;
  var clr=pct>=85?'#4ade80':pct>=70?'#fbbf24':'#f87171';
  return '<svg width="72" height="72" viewBox="0 0 72 72" style="display:inline-block">'+
    '<circle cx="36" cy="36" r="24" stroke="rgba(255,255,255,.06)" stroke-width="5" fill="none"/>'+
    '<circle cx="36" cy="36" r="24" stroke="'+clr+'" stroke-width="5" fill="none" stroke-linecap="round"'+
    ' stroke-dasharray="'+dash.toFixed(1)+' '+gap.toFixed(1)+'"'+
    ' transform="rotate(-90 36 36)"/>'+
    '<text x="36" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="'+clr+'" font-family="\'JetBrains Mono\',monospace">'+pct+'%</text>'+
  '</svg>';
}

function tickDriverPanelSim(gps){
  var panel=document.getElementById('drv-detail-panel');
  if(!panel||!panel.classList.contains('open'))return;
  // Delta speed
  gps.speed=Math.max(0,Math.min(55,Math.round(gps.speed+(Math.random()*6-3))));
  gps.heading=(gps.heading+(Math.random()*8-4)+360)%360;
  var dirs=['N','NE','E','SE','S','SW','W','NW'];
  var dirLabel=dirs[Math.round(gps.heading/45)%8];
  // Update needle
  var needle=document.getElementById('ddp-needle');
  if(needle)needle.style.transform='rotate('+gps.heading.toFixed(1)+'deg)';
  var hdgLbl=document.getElementById('ddp-hdg-lbl');
  if(hdgLbl)hdgLbl.textContent=Math.round(gps.heading)+'В° '+dirLabel;
  // Update speed text + arc colour
  var spdTxt=document.getElementById('ddp-spd-txt');
  var clr=gps.speed<25?'#4ade80':gps.speed<45?'#fbbf24':'#f87171';
  if(spdTxt){spdTxt.textContent=gps.speed;spdTxt.setAttribute('fill',clr);}
  // Rebuild arc path
  var spdSvg=document.getElementById('ddp-spd-svg');
  if(spdSvg){
    var oldArc=document.getElementById('ddp-spd-arc');if(oldArc)oldArc.remove();
    var max=60;var pct2=Math.min(1,gps.speed/max);
    if(pct2>0.01){
      var r2=22;var cx2=32;var cy2=32;
      var startA=-135;var sweep=270*pct2;var endA=startA+sweep;
      var rad2=function(d){return d*Math.PI/180;};
      var sx2=cx2+r2*Math.cos(rad2(startA));var sy2=cy2+r2*Math.sin(rad2(startA));
      var ex2=cx2+r2*Math.cos(rad2(endA));var ey2=cy2+r2*Math.sin(rad2(endA));
      var lA=pct2>0.5?1:0;
      var arcEl=document.createElementNS('http://www.w3.org/2000/svg','path');
      arcEl.setAttribute('id','ddp-spd-arc');
      arcEl.setAttribute('d','M'+sx2.toFixed(2)+' '+sy2.toFixed(2)+' A22 22 0 '+lA+' 1 '+ex2.toFixed(2)+' '+ey2.toFixed(2));
      arcEl.setAttribute('stroke',clr);arcEl.setAttribute('stroke-width','5');
      arcEl.setAttribute('fill','none');arcEl.setAttribute('stroke-linecap','round');
      spdSvg.insertBefore(arcEl,spdSvg.firstChild.nextSibling);
    }
  }
}

var _preShiftState={scanned:0,total:0,step:'manifest',routeGen:0,routeReady:false};
function renderDriverPreShift(){
  var u=state.user;var dd=DRIVER_DATA[u.id];if(!dd)return'';
  var rt=dd.currentRoute;
  if(!_preShiftState.total)_preShiftState.total=Math.round(42+Math.random()*28);
  var sc=_preShiftState.scanned;var tot=_preShiftState.total;
  var step=_preShiftState.step;
  // Generate package manifest
  var pkgs=[];for(var i=0;i<Math.min(tot,30);i++){
    var w=[{t:'Light',c:'#00d4ff'},{t:'Medium',c:'#2dd4bf'},{t:'Heavy',c:'#fbbf24'}][Math.floor(Math.random()*3)];
    pkgs.push({id:'1Z'+Math.random().toString(36).slice(2,10).toUpperCase(),type:w.t,color:w.color,scanned:i<sc,priority:i<3});
  }
  return'<div class="page">'+
    '<div class="ph"><div><div class="pt">рҹ“Ұ Pre-Shift Package Scan</div>'+
    '<div class="ps">'+esc(rt.routeId)+' В· '+tot+' packages to scan before departure</div></div>'+
    '<span class="badge '+(step==='done'?'b-active':'b-pending')+'">'+(step==='done'?'вң“ Scan Complete':sc+' / '+tot+' scanned')+'</span></div>'+

    // Progress bar
    '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="font-weight:600">Scan Progress</span>'+
        '<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--primary)">'+Math.round(sc/tot*100)+'%</span>'+
      '</div>'+
      '<div style="height:12px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:10px">'+
        '<div style="height:100%;width:'+Math.round(sc/tot*100)+'%;background:linear-gradient(to right,#00d4ff,#4ade80);border-radius:6px;transition:width .4s"></div></div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
        [{v:sc,l:'Scanned',c:'var(--ok-t)'},{v:tot-sc,l:'Remaining',c:'var(--muted)'},{v:pkgs.filter(function(p){return p.priority;}).length,l:'Priority',c:'var(--warn-t)'}]
        .map(function(k){return'<div style="text-align:center;background:var(--border-sub);border-radius:8px;padding:8px 16px"><div style="font-size:20px;font-weight:700;color:'+k.c+'">'+k.v+'</div><div style="font-size:10px;color:var(--muted)">'+k.l+'</div></div>';}).join('')+
      '</div>'+
    '</div>'+

    (step==='done'?

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// DH_MVP вҖ” Role-Specific Dashboards (textedits_01 MVP 2026)
//   Spec: Cost-to-Serve В· Fine Leakage В· EMOD 60/40 В· OEE>92%
//          Takt Time В· FlowSkip В· Triangulation В· Reputation
//          Proof of Autonomy В· CCA В· PoGM В· Carbon В· IRA
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
window.DH_MVP=(function(){
  var ns={};
  ns.PRIO={HIGH:'b-urgent',MED:'b-pending',LOW:'b-medium'};
  ns._rnd=function(s,n){var x=Math.sin((s||1)*9301+49297*(n||1))*233280;return x-Math.floor(x);};

  ns._k=function(label,val,sub,c){
    c=c||'var(--text)';
    return '<div class="card cb mvp-kpi" style="border-left:3px solid '+c+';min-width:0">'+
      '<div style="font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">'+esc(label)+'</div>'+
      '<div style="font-size:22px;font-weight:700;color:'+c+';line-height:1.1;word-break:break-word">'+val+'</div>'+
      (sub?'<div style="font-size:11px;color:var(--muted);margin-top:4px">'+sub+'</div>':'')+
    '</div>';
  };
  ns._b=function(title,iconName,prio,body){
    var cls=ns.PRIO[prio]||'b-medium';
    return '<div class="fp-section mvp-block" style="margin-bottom:16px">'+
      '<h3 style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+
        icon(iconName)+'<span style="flex:1">'+esc(title)+'</span>'+
        '<span class="badge '+cls+'">'+prio+'</span>'+
      '</h3>'+body+
    '</div>';
  };
  ns._bar=function(label,pct,target,c){
    c=c||'var(--primary)';pct=Math.max(0,Math.min(100,pct));
    return '<div style="margin-bottom:10px">'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">'+
        '<span style="color:var(--muted)">'+esc(label)+'</span>'+
        '<span style="color:'+c+';font-weight:600;font-family:var(--mono)">'+pct.toFixed(1)+'%</span>'+
      '</div>'+
      '<div class="fp-bar" style="position:relative;height:8px"><div class="fp-bar-fill" style="width:'+pct+'%;background:'+c+';height:100%;border-radius:4px"></div>'+
      (target?'<div style="position:absolute;left:'+target+'%;top:-3px;bottom:-3px;width:2px;background:rgba(255,255,255,.55)" title="Target '+target+'%"></div>':'')+
      '</div>'+(target?'<div style="font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono)">target вүҘ '+target+'%</div>':'')+
    '</div>';
  };
  ns._tok=function(label,value,c){
    c=c||'var(--primary)';
    return '<span class="badge" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'40;font-size:10px;padding:3px 8px;font-family:var(--mono)">'+esc(label)+': '+esc(value)+'</span>';
  };
  ns._act=function(label,action,kind){
    return '<button class="btn '+(kind||'btn-o')+' btn-sm" onclick="'+esc(action)+'">'+esc(label)+'</button>';
  };
  ns._row=function(label,val,c){
    return '<div class="fp-kv"><span style="color:var(--muted)">'+esc(label)+'</span><span style="color:'+(c||'var(--text)')+';font-weight:500">'+val+'</span></div>';
  };
  ns._tt=function(headers,rows){
    var h='<thead><tr>'+headers.map(function(h){return'<th>'+esc(h)+'</th>';}).join('')+'</tr></thead>';
    var b='<tbody>'+rows.map(function(r){return'<tr>'+r.map(function(c){return'<td>'+c+'</td>';}).join('')+'</tr>';}).join('')+'</tbody>';
    return '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'+h+b+'</table></div>';
  };

  // в”Җв”Җ Margin Ribbon (cockpit-v2 .ribbon adaptation) в”Җв”Җ
  // Compact horizontal KPI strip В· 5 cells В· animated sweep В· sparkline + delta + counter tween + ripple
  ns._ribbon=function(cells,seed){
    if(!cells||!cells.length)return'';
    seed=seed||1;
    return '<div class="mvp-ribbon" role="region" aria-label="Role-critical KPIs В· live">'+
      cells.map(function(c,i){
        var col=c.color||'var(--primary)';
        var trend=c.trend!==undefined?c.trend:0;
        var delta=c.delta!==undefined?c.delta:(trend*4+ns._rnd(seed,i*7)*3-1);
        var spark=ns._spark(seed,i*13+1,{trend:trend,color:col});
        var deltaChip=ns._delta(delta,{inverted:c.deltaInverted,title:'vs last 7d'});
        var pulseChip=c.pulse?ns._pulse(col):'';
        // Wrap value with animated counter (tweens 0 вҶ’ target on first paint, live-ticks every 4.5s)
        var valueHtml=ns._wrap(c.value);
        return '<div class="mvp-rb-cell" tabindex="0" aria-label="'+esc(c.label)+': '+esc(String(c.value).replace(/<[^>]+>/g,''))+'">'+
          '<div class="mvp-rb-icon" style="background:'+col+'1c;color:'+col+'">'+(c.ic||'')+'</div>'+
          '<div class="mvp-rb-content">'+
            '<div class="mvp-rb-label">'+esc(c.label)+'</div>'+
            '<div class="mvp-rb-value" style="color:'+col+'">'+pulseChip+valueHtml+'</div>'+
          '</div>'+
          '<div class="mvp-rb-extra">'+spark+deltaChip+'</div>'+
        '</div>';
      }).join('')+
    '</div>';
  };

  // в”Җв”Җ Driver Grade pill (flowskip-v2 .grade.g1-g5) в”Җв”Җ
  ns._grade=function(level){
    var n=Math.max(1,Math.min(5,Math.round(level||3)));
    var labels={5:'GRADE 5 В· Reputation-Max',4:'GRADE 4 В· Pro',3:'GRADE 3 В· Standard',2:'GRADE 2 В· Probation',1:'GRADE 1 В· Risk'};
    return '<span class="mvp-grade mvp-grade-'+n+'">'+esc(labels[n])+'</span>';
  };

  // в”Җв”Җ Exception card (flowskip-v2 .exc-card В· for SQEP/OTIF/CCA violations) в”Җв”Җ
  ns._exc=function(type,title,meta){
    var t=type||'c22';
    var icons={c22:'вҡ ',otif:'вҸұ',cca:'вҡ–'};
    var tags={c22:'CODE 22 В· WALMART SQEP',otif:'OTIF RISK',cca:'CCA OPEN'};
    return '<div class="mvp-exc mvp-exc-'+t+'">'+
      '<div class="mvp-exc-icon">'+(icons[t]||'!')+'</div>'+
      '<div class="mvp-exc-body">'+
        '<div class="mvp-exc-title">'+esc(title)+'</div>'+
        '<div class="mvp-exc-meta">'+esc(meta||'')+'</div>'+
      '</div>'+
      '<span class="mvp-exc-tag mvp-exc-tag-'+t+'">'+(tags[t]||'EXC')+'</span>'+
    '</div>';
  };
  ns._excList=function(items){
    if(!items||!items.length)return'';
    return '<div class="mvp-exc-list">'+items.map(function(i){return ns._exc(i.type,i.title,i.meta);}).join('')+'</div>';
  };

  // в”Җв”Җ State coverage grid (RSP-company 9 states / OnTrac 35 sample) в”Җв”Җ
  ns._stateGrid=function(states,opts){
    opts=opts||{};
    var headers=opts.scope==='ontrac'?['State','RSPs','Fleet']:['State','Hub','Fleet','Density','OTIF'];
    var rows=states.map(function(s){
      if(opts.scope==='ontrac'){
        return['<b>'+esc(s.st)+'</b>',
          '<span class="badge b-info-t" style="font-family:var(--mono);font-size:10px">'+s.rsps+' RSPs</span>',
          '<span style="font-family:var(--mono);color:var(--money)">'+s.fleet.toLocaleString()+' vans</span>'];
      }
      var dCol=s.density>=1.05?'var(--ok-t)':(s.density>=0.95?'var(--primary)':'var(--warn-t)');
      var oCol=s.otif>=98.2?'var(--ok-t)':'var(--warn-t)';
      return['<b>'+esc(s.st)+'</b>',
        '<span style="font-family:var(--mono);font-size:11px">'+esc(s.hub)+'</span>',
        '<span style="font-family:var(--mono);color:var(--money)">'+s.fleet+' vans</span>',
        '<span style="font-family:var(--mono);color:'+dCol+'">'+s.density.toFixed(2)+'</span>',
        '<span style="font-family:var(--mono);color:'+oCol+'">'+s.otif.toFixed(1)+'%</span>'];
    });
    return ns._tt(headers,rows);
  };

  // в”Җв”Җ Partner list (B2B insurers / e-commerce / B2C brand stores) в”Җв”Җ
  // в”Җв”Җ ENGAGEMENT HELPERS В· 10x vs avg delivery CRM в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Sparkline (deterministic seeded SVG В· 14-pt trend)
  ns._spark=function(seed,offset,opts){
    opts=opts||{};
    var len=opts.len||14;
    var trend=opts.trend||0; // -1 down, 0 flat, +1 up
    var color=opts.color||'currentColor';
    var pts=[];
    for(var i=0;i<len;i++){
      var noise=ns._rnd((seed||1)*1000,offset+i)*0.42;
      var slope=trend*(i/(len-1))*0.55;
      pts.push(0.30+noise+slope);
    }
    var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts);
    var range=Math.max(.0001,mx-mn);
    var W=54,H=18;
    var coords=pts.map(function(p,i){
      var x=(i/(len-1))*W;
      var y=H-((p-mn)/range)*(H-2)-1;
      return {x:x,y:y};
    });
    var path=coords.map(function(c,i){return (i===0?'M':'L')+c.x.toFixed(1)+' '+c.y.toFixed(1);}).join(' ');
    var area=path+' L'+W+' '+H+' L0 '+H+' Z';
    var last=coords[coords.length-1];
    return '<svg class="mvp-spark" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true">'+
      '<path class="mvp-spark-area" d="'+area+'" fill="'+color+'"/>'+
      '<path d="'+path+'" stroke="'+color+'" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'+
      '<circle cx="'+last.x.toFixed(1)+'" cy="'+last.y.toFixed(1)+'" r="2" fill="'+color+'"/>'+
    '</svg>';
  };
  // Delta chip В· trend % vs prior period В· invertable for "lower is better"
  ns._delta=function(pct,opts){
    opts=opts||{};
    var inv=opts.inverted===true;
    var positive=inv?pct<0:pct>0;
    var negative=inv?pct>0:pct<0;
    var arrow=pct>0.05?'в–І':(pct<-0.05?'в–ј':'в– ');
    var cls=positive?'mvp-delta-up':(negative?'mvp-delta-down':'mvp-delta-flat');
    var sign=pct>0?'+':'';
    return '<span class="mvp-delta '+cls+'" title="'+(opts.title||'vs last 7d')+'">'+arrow+sign+pct.toFixed(1)+'%</span>';
  };
  // Goal progress В· current vs target with optional over-100% styling
  ns._goal=function(curr,target,opts){
    opts=opts||{};
    var raw=(curr/target)*100;
    var clamped=Math.max(0,Math.min(100,raw));
    var over=raw>=100;
    var fmt=opts.format||function(v){return v;};
    return '<div class="mvp-goal" aria-label="Goal progress">'+
      '<div class="mvp-goal-track"><div class="mvp-goal-fill'+(over?' over':'')+'" style="width:'+clamped.toFixed(0)+'%"></div></div>'+
      '<span>'+raw.toFixed(0)+'% of '+fmt(target)+'</span>'+
    '</div>';
  };
  // Live pulse В· for streaming metrics (Takt, OEE, OTIF)
  ns._pulse=function(c){
    return '<span class="mvp-pulse" style="--pulse-c:'+(c||'var(--ok-t)')+'" aria-label="live"></span>';
  };
  // Streak badge В· "X days at target"
  ns._streak=function(days){
    return '<span class="mvp-streak" title="Consecutive days at-or-above target">вҡЎ '+days+'d streak</span>';
  };
  // в”Җв”Җв”Җ iOS-feel В· counter wrap + ring + live activator в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Wrap a formatted display string so the numeric portion tweens 0вҶ’target on first paint
  ns._wrap=function(formatted){
    if(formatted===null||formatted===undefined)return formatted;
    var s=String(formatted);
    if(s.indexOf('<')>=0)return formatted; // skip if HTML present (e.g., grade pill)
    var m=s.match(/-?\d{1,3}(?:,\d{3})+(?:\.\d+)?|-?\d+(?:\.\d+)?/);
    if(!m)return formatted;
    var clean=m[0].replace(/,/g,'');
    var target=parseFloat(clean);
    if(isNaN(target))return formatted;
    var pre=s.substring(0,m.index);
    var suf=s.substring(m.index+m[0].length);
    var dec=clean.indexOf('.')>=0?(clean.split('.')[1]||'').length:0;
    var cm=m[0].indexOf(',')>=0?'1':'0';
    return '<span class="mvp-counter" data-tgt="'+target+'" data-pre="'+esc(pre)+'" data-suf="'+esc(suf)+'" data-dec="'+dec+'" data-cm="'+cm+'">'+esc(s)+'</span>';
  };

  // в”Җв”Җ Cyberpunk chart helpers В· DriveHub style в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Mini bar chart (distributions: Grade 1-5, etc.)
  ns._bars=function(values,opts){
    opts=opts||{};
    if(!values||!values.length)return'';
    var max=opts.max||Math.max.apply(null,values.map(function(v){return v.value;}));
    var showVals=opts.showVals!==false;
    return '<div class="mvp-bars-wrap"><div class="mvp-bars" role="img" aria-label="Bar chart">'+
      values.map(function(v){
        var h=Math.max(3,(v.value/max)*100);
        var col=v.color||'var(--primary)';
        return '<div class="mvp-bar-col" style="height:'+h.toFixed(0)+'%;--bar-c:'+col+'" title="'+esc(v.label)+': '+esc(String(v.value))+'"></div>';
      }).join('')+
    '</div>'+
    (showVals?'<div class="mvp-bars-vals">'+values.map(function(v){return '<div style="color:'+(v.color||'var(--primary)')+'">'+esc(String(v.value))+'</div>';}).join('')+'</div>':'')+
    '<div class="mvp-bars-labels">'+values.map(function(v){return '<div>'+esc(v.label)+'</div>';}).join('')+'</div>'+
    '</div>';
  };

  // Radar chart (multi-dim KPI В· 3-7 axes)
  ns._radar=function(axes,opts){
    if(!axes||axes.length<3)return'';
    opts=opts||{};
    var size=opts.size||200,cx=size/2,cy=size/2,r=size*0.34;
    var n=axes.length;
    var color=opts.color||'var(--primary)';
    var grid=[0.25,0.5,0.75,1.0].map(function(s){
      var pts=axes.map(function(a,i){
        var ang=(Math.PI*2*i/n)-Math.PI/2;
        return (cx+Math.cos(ang)*r*s).toFixed(1)+','+(cy+Math.sin(ang)*r*s).toFixed(1);
      }).join(' ');
      return '<polygon class="mvp-radar-grid" points="'+pts+'"/>';
    }).join('');
    var axisLines=axes.map(function(a,i){
      var ang=(Math.PI*2*i/n)-Math.PI/2;
      var x=cx+Math.cos(ang)*r,y=cy+Math.sin(ang)*r;
      return '<line class="mvp-radar-axis" x1="'+cx+'" y1="'+cy+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'"/>';
    }).join('');
    var dataPts=axes.map(function(a,i){
      var ang=(Math.PI*2*i/n)-Math.PI/2;
      var ratio=Math.max(0,Math.min(1,a.value/(a.max||100)));
      return {x:cx+Math.cos(ang)*r*ratio,y:cy+Math.sin(ang)*r*ratio};
    });
    var ptsStr=dataPts.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ');
    var dots=dataPts.map(function(p){return '<circle class="mvp-radar-pt" cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="2.5"/>';}).join('');
    var labels=axes.map(function(a,i){
      var ang=(Math.PI*2*i/n)-Math.PI/2;
      var lr=r*1.20;
      var x=cx+Math.cos(ang)*lr,y=cy+Math.sin(ang)*lr;
      return '<text class="mvp-radar-label" x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" text-anchor="middle" dominant-baseline="central">'+esc(a.label)+'</text>';
    }).join('');
    return '<svg class="mvp-radar" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="color:'+color+'" aria-label="Multi-axis KPI radar">'+
      grid+axisLines+
      '<polygon class="mvp-radar-shape" points="'+ptsStr+'" stroke="'+color+'" fill="'+color+'"/>'+
      dots+labels+
    '</svg>';
  };

  // Gauge (semi-circular OEE / Atomic Clock)
  ns._gauge=function(value,max,opts){
    opts=opts||{};
    var size=opts.size||160,stroke=opts.stroke||10;
    var color=opts.color||'var(--primary)';
    var r=(size-stroke)/2-4;
    var cx=size/2,cy=size*0.62;
    // Arc from 200В° to 340В° (semi-circle pointing up)
    var startA=Math.PI*1.10,endA=Math.PI*1.90;
    var totalArc=Math.PI*0.80*2; // 144В° wait вҖ” recalc: from 1.10ПҖ to 1.90ПҖ = 0.80ПҖ = 144В°. Want wider.
    // Use 0.75ПҖ to 2.25ПҖ = 1.5ПҖ = 270В°
    startA=Math.PI*0.75;
    endA=Math.PI*2.25;
    totalArc=endA-startA;
    var pct=Math.max(0,Math.min(1,(value||0)/(max||100)));
    function pt(t){
      var a=startA+totalArc*t;
      return {x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r};
    }
    var p0=pt(0),p1=pt(1),pCur=pt(pct);
    var bgPath='M '+p0.x.toFixed(1)+' '+p0.y.toFixed(1)+' A '+r+' '+r+' 0 1 1 '+p1.x.toFixed(1)+' '+p1.y.toFixed(1);
    var fgPath='M '+p0.x.toFixed(1)+' '+p0.y.toFixed(1)+' A '+r+' '+r+' 0 '+(totalArc*pct>Math.PI?1:0)+' 1 '+pCur.x.toFixed(1)+' '+pCur.y.toFixed(1);
    var label=opts.label||(value.toFixed(opts.dec||1)+(opts.unit||''));
    var sub=opts.sublabel||'';
    var ticks='';
    for(var i=0;i<=4;i++){
      var ta=pt(i/4);
      var tb={x:cx+Math.cos(startA+totalArc*(i/4))*(r+6),y:cy+Math.sin(startA+totalArc*(i/4))*(r+6)};
      ticks+='<line class="mvp-gauge-tick" x1="'+ta.x.toFixed(1)+'" y1="'+ta.y.toFixed(1)+'" x2="'+tb.x.toFixed(1)+'" y2="'+tb.y.toFixed(1)+'"/>';
    }
    return '<svg class="mvp-gauge" width="'+size+'" height="'+(size*0.78)+'" viewBox="0 0 '+size+' '+(size*0.78)+'" style="color:'+color+'" aria-label="Gauge '+label+'">'+
      ticks+
      '<path class="mvp-gauge-arc-bg" d="'+bgPath+'" stroke-width="'+stroke+'"/>'+
      '<path class="mvp-gauge-arc-fg" d="'+fgPath+'" stroke-width="'+stroke+'" stroke="'+color+'"/>'+
      '<text x="'+cx+'" y="'+(cy-6)+'" fill="'+color+'" font-size="22" font-weight="700">'+esc(label)+'</text>'+
      (sub?'<text x="'+cx+'" y="'+(cy+12)+'" fill="var(--muted)" font-size="10">'+esc(sub)+'</text>':'')+
    '</svg>';
  };

  // Activity feed (live event stream)
  ns._feed=function(events){
    if(!events||!events.length)return'';
    return '<div class="mvp-feed" role="log" aria-live="polite">'+events.map(function(e){
      var col=e.color||'var(--primary)';
      return '<div class="mvp-feed-item" style="--feed-c:'+col+'">'+
        '<span class="mvp-feed-time">'+esc(e.time||'now')+'</span>'+
        '<span class="mvp-feed-icon" style="color:'+col+'">'+esc(e.ic||'вҖў')+'</span>'+
        '<div class="mvp-feed-body">'+
          '<div class="mvp-feed-title">'+esc(e.title)+'</div>'+
          (e.meta?'<div class="mvp-feed-meta">'+esc(e.meta)+'</div>':'')+
        '</div>'+
      '</div>';
    }).join('')+'</div>';
  };

  // Heatmap grid (24h Г— 7d or any matrix)
  ns._heatmap=function(matrix,opts){
    opts=opts||{};
    if(!matrix||!matrix.length)return'';
    var cols=opts.cols||matrix[0].length;
    var color=opts.color||'0,212,255';
    var flat=[];matrix.forEach(function(r){r.forEach(function(v){flat.push(v);});});
    var max=opts.max||Math.max.apply(null,flat);
    var cells=[];
    matrix.forEach(function(row,ri){
      row.forEach(function(v,ci){
        var alpha=Math.max(0.04,(v/max)).toFixed(2);
        var rgb='rgba('+color+','+alpha+')';
        cells.push('<div class="mvp-heat-cell" style="--cell-c:'+rgb+'" title="'+esc(opts.format?opts.format(v,ri,ci):v)+'"></div>');
      });
    });
    return '<div class="mvp-heatmap" style="grid-template-columns:repeat('+cols+',1fr)">'+cells.join('')+'</div>'+
      (opts.xLabels?'<div class="mvp-heatmap-axis">'+opts.xLabels.map(function(l){return '<span>'+esc(l)+'</span>';}).join('')+'</div>':'');
  };

  // Glitch text wrapper

  // в”Җв”Җ Ticker tape (Bloomberg-style horizontal scroll) в”Җв”Җ
  ns._ticker=function(items){

  // в”Җв”Җ Donut chart with legend (% breakdown) в”Җв”Җ
  ns._donut=function(segments,opts){
    if(!segments||!segments.length)return'';
    opts=opts||{};
    var size=opts.size||140,stroke=opts.stroke||14;
    var r=(size-stroke)/2-2,cx=size/2,cy=size/2;
    var c=2*Math.PI*r;
    var total=segments.reduce(function(s,x){return s+x.value;},0);
    if(total<=0)return'';
    var offset=0;
    var paths=segments.map(function(seg){
      var pct=seg.value/total;
      var dash=(pct*c).toFixed(2);
      var gap=(c-pct*c).toFixed(2);
      var rotation=-90+(offset/total*360);
      offset+=seg.value;
      var col=seg.color||'var(--primary)';
      return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" stroke-width="'+stroke+'" fill="none" '+
        'stroke="'+col+'" stroke-dasharray="'+dash+' '+gap+'" '+
        'stroke-linecap="butt" '+
        'transform="rotate('+rotation.toFixed(2)+' '+cx+' '+cy+')" '+
        'style="filter:drop-shadow(0 0 5px '+col+')"/>';
    }).join('');
    var legend=segments.map(function(seg){
      var col=seg.color||'var(--primary)';
      return '<div class="mvp-donut-leg">'+
        '<span class="mvp-donut-dot" style="background:'+col+';color:'+col+'"></span>'+
        '<span class="mvp-donut-lbl">'+esc(seg.label)+'</span>'+
        '<span class="mvp-donut-val" style="color:'+col+'">'+esc(String(seg.value))+'</span>'+
      '</div>';
    }).join('');
    var center=opts.center?'<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" dominant-baseline="central" fill="var(--text)" font-size="13" font-weight="700" font-family="var(--mono)">'+esc(opts.center)+'</text>'+
      (opts.centerSub?'<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" dominant-baseline="central" fill="var(--muted)" font-size="9" font-family="var(--mono)">'+esc(opts.centerSub)+'</text>':''):'';
    return '<div class="mvp-donut-wrap">'+
      '<svg class="mvp-donut" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" aria-label="Donut chart">'+
        '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" stroke="rgba(255,255,255,.05)" stroke-width="'+stroke+'" fill="none"/>'+
        paths+center+
      '</svg>'+
      '<div class="mvp-donut-legend">'+legend+'</div>'+
    '</div>';
  };

  // в”Җв”Җ Quick-stats strip (6 inline mini-tiles) в”Җв”Җ
  ns._quick=function(stats){
    if(!stats||!stats.length)return'';
    return '<div class="mvp-quick">'+stats.map(function(s){
      var col=s.color||'var(--primary)';
      var trend=s.trend?'<div class="mvp-quick-trend" style="color:'+(s.trend>0?'var(--ok-t)':(s.trend<0?'var(--err-t)':'var(--muted)'))+'">'+(s.trend>0?'в–І':(s.trend<0?'в–ј':'в– '))+' '+Math.abs(s.trend).toFixed(1)+'%</div>':'';
      return '<div class="mvp-quick-item" style="border-left-color:'+col+'">'+
        '<div class="mvp-quick-val" style="color:'+col+'">'+esc(s.value)+'</div>'+

      '</div>';
    }).join('')+'</div>';

  // в”Җв”Җ 24h horizontal timeline (event density / fade by intensity) в”Җв”Җ
  ns._timeline=function(intensities,opts){
    if(!intensities||intensities.length!==24)return'';
    opts=opts||{};
    var color=opts.color||'0,212,255';
    var max=Math.max.apply(null,intensities)||1;
    var bars=intensities.map(function(v,h){
      var alpha=Math.max(0.05,v/max);
      var height=Math.max(20,30+v/max*70);
      return '<div class="mvp-tl-bar'+(v>max*0.7?' active':'')+'" style="background:rgba('+color+','+alpha.toFixed(2)+');color:rgba('+color+',1)" title="'+(h<10?'0'+h:h)+':00 В· '+v+' events"></div>';
    }).join('');
    return '<div class="mvp-timeline">'+bars+'</div>'+
      '<div class="mvp-tl-axis"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>23:59</span></div>';
  };

  // в”Җв”Җ Mini area chart (richer trend with axes) в”Җв”Җ
  ns._area=function(seed,opts){
    opts=opts||{};
    var len=opts.len||30;
    var trend=opts.trend||0;
    var color=opts.color||'var(--primary)';
    var pts=[];
    for(var i=0;i<len;i++){
      var noise=ns._rnd((seed||1)*1000,i+(opts.offset||0))*0.4;
      var slope=trend*(i/(len-1))*0.5;
      pts.push(0.30+noise+slope);
    }
    var W=opts.width||280,H=opts.height||56;
    var padL=opts.padL||0,padR=opts.padR||0,padT=4,padB=14;
    var innerW=W-padL-padR,innerH=H-padT-padB;
    var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts);
    var range=Math.max(.0001,mx-mn);
    var coords=pts.map(function(p,i){
      var x=padL+(i/(len-1))*innerW;
      var y=padT+innerH-((p-mn)/range)*innerH;
      return {x:x,y:y};
    });
    var path=coords.map(function(c,i){return (i===0?'M':'L')+c.x.toFixed(1)+' '+c.y.toFixed(1);}).join(' ');
    var area=path+' L'+(padL+innerW)+' '+(padT+innerH)+' L'+padL+' '+(padT+innerH)+' Z';
    var last=coords[coords.length-1];
    return '<svg class="mvp-area" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="color:'+color+'" aria-label="Area chart">'+
      '<line class="mvp-area-axis" x1="'+padL+'" y1="'+(padT+innerH)+'" x2="'+(padL+innerW)+'" y2="'+(padT+innerH)+'"/>'+
      '<path class="mvp-area-fill" d="'+area+'" fill="'+color+'"/>'+
      '<path class="mvp-area-line" d="'+path+'" stroke="'+color+'"/>'+
      '<circle class="mvp-area-pt" cx="'+last.x.toFixed(1)+'" cy="'+last.y.toFixed(1)+'" r="3"/>'+
    '</svg>';
  };

  // в”Җв”Җ MES В«РҰРёС„СҖРҫРІРҫР№ РҰРөС…В» В· Production Defect Tally в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Per textedits_01 В§1 line 42 / В§2 line 16 / В§3 line 78:
  //   "РҡР°Р¶РҙР°СҸ В«РҝСғСҒСӮР°СҸ РјРёР»СҸВ» (16,7%) = РҝСҖРҫРёР·РІРҫРҙСҒСӮРІРөРҪРҪСӢР№ РұСҖР°Рә СҒСӮРҫРёРјРҫСҒСӮСҢСҺ $30 РјР»СҖРҙ/РіРҫРҙ"
  //   "Takt Time >2 РјРёРҪ РәР»Р°СҒСҒРёС„РёСҶРёСҖСғРөСӮСҒСҸ РәР°Рә РҝСҖРҫРёР·РІРҫРҙСҒСӮРІРөРҪРҪСӢР№ РұСҖР°Рә"
  //   "РЎСӮРҫРёРјРҫСҒСӮСҢ РҫРҙРҪРҫР№ РҪРөСғРҙР°СҮРё (Failed Delivery) = $17,78"
  // Math is per-RSP daily, scaled to dashboard role:
  //   driver scope:  fleet=1
  //   RSP scope:     fleet=companyFleet (315 vans)
  //   network scope: fleet=networkVehicles (7,000 vans)
  ns._mesDefect=function(d,scope){
    scope=scope||'rsp';
    var fleet=scope==='driver'?1:(scope==='network'?d.networkVehicles:d.companyFleet);
    var stopsPerVan=32;
    var totalStops=fleet*stopsPerVan;
    // 1) Empty-mile defect: empty_mile_pct % of miles burned w/o cargo
    //    Avg cost per mile $1.74 (industry) В· ~38 mi/van/day
    var emptyMiCost=Math.round(fleet*38*(d.empty_mile_pct/100)*1.74);
    // 2) Dwell-time defect: 39% baseline of clock burn at $0.42/min crew + capex
    //    Reduced by selfHeal effectiveness
    var dwellMinutes=fleet*stopsPerVan*0.39*(2.4-d.selfHeal/200);
    var dwellCost=Math.round(dwellMinutes*0.42);
    // 3) Takt violations: each >2 min stop = $14.60 (capex + driver)
    var taktCost=Math.round(d.taktViol*14.60*Math.max(1,fleet/35));
    // 4) Failed deliveries (after self-healing recovery)
    //    Pre-fix failure rate would be 15% baseline; current is failureRate%
    //    Cost per failure = $17.78 per spec
    var failed=Math.round(totalStops*(d.failureRate/100));
    var failCost=Math.round(failed*17.78);
    var total=emptyMiCost+dwellCost+taktCost+failCost;
    // Compare against $30B/yr industry baseline scaled to fleet share
    var industryShare=Math.round(30e9*(fleet/13750000)/365);
    var savedVsIndustry=Math.max(0,industryShare-total);
    return '<div class="mvp-mes-defect" role="region" aria-label="MES Production Defect Tally">'+
      '<div class="mvp-mes-head">'+
        '<div class="mvp-mes-title">РҰРёС„СҖРҫРІРҫР№ РҰРөС… В· Production Defect Tally</div>'+
        '<div class="mvp-mes-tag">scope В· '+esc(scope)+' В· '+(fleet>1?fleet.toLocaleString()+' vans':'1 driver')+'</div>'+
      '</div>'+
      '<div class="mvp-mes-grid">'+
        '<div class="mvp-mes-cell"><div class="mvp-mes-cell-lbl">Empty-mile defect</div><div class="mvp-mes-cell-val">$'+emptyMiCost.toLocaleString()+'</div><div class="mvp-mes-cell-sub">'+d.empty_mile_pct.toFixed(1)+'% Г— $1.74/mi</div></div>'+
        '<div class="mvp-mes-cell"><div class="mvp-mes-cell-lbl">Dwell-time burn</div><div class="mvp-mes-cell-val">$'+dwellCost.toLocaleString()+'</div><div class="mvp-mes-cell-sub">'+Math.round(dwellMinutes).toLocaleString()+' min Г— $0.42</div></div>'+
        '<div class="mvp-mes-cell"><div class="mvp-mes-cell-lbl">Takt violations</div><div class="mvp-mes-cell-val">$'+taktCost.toLocaleString()+'</div><div class="mvp-mes-cell-sub">'+d.taktViol+' stops Г— $14.60</div></div>'+
        '<div class="mvp-mes-cell"><div class="mvp-mes-cell-lbl">Failed deliveries</div><div class="mvp-mes-cell-val">$'+failCost.toLocaleString()+'</div><div class="mvp-mes-cell-sub">'+failed+' Г— $17.78</div></div>'+
      '</div>'+
      '<div class="mvp-mes-total">'+
        '<div><div class="mvp-mes-total-lbl">Daily defect cost</div></div>'+
        '<div class="mvp-mes-total-val">$'+ns._wrap(total.toLocaleString())+'</div>'+
        '<div class="mvp-mes-total-meta">' +(savedVsIndustry>0?'-$'+savedVsIndustry.toLocaleString()+' vs market':'baseline')+ '</div>'+
      '</div>'+
    '</div>';
  };

  // в”Җв”Җ DOL Compliance Posture В· post-audit (March 2026 + ongoing) в”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Per textedits_01 В§1 line 23, В§3 line 142, В§4 line 270:
  //   "Proof of Autonomy Index вҖ” РҝСҖСҸРјРҫРө РҙРҫРәР°Р·Р°СӮРөР»СҢСҒСӮРІРҫ 1099 РҙР»СҸ Р°СғРҙРёСӮР° DOL 2026"
  //   "$1-2 РјР»СҖРҙ/year РҝРөСҖРөРәР»Р°СҒСҒРёС„РёРәР°СҶРёРё W-2 risk"
  //   "Cycle of Corrective Actions (CCA) вҖ” Р·Р°СүРёСӮР° РҫСӮ halatnost РёСҒРәРҫРІ"
  // Today is 2026-04-25 вҖ” DOL audit Ріate (March 2026) РҝСҖРҫР№РҙРөРҪ; РјСӢ РІ surveillance.
  ns._dolPosture=function(d){
    var autonomy=d.autonomy;            // 78-96%
    var ccaClosure=d.ccaClosed/(d.ccaClosed+d.ccaOpen)*100;
    var pgEvidence=Math.min(100,d.proGrade*20+autonomy*0.4); // grade Г— autonomy
    var hedgeNV=Math.min(100,((d.ccaClosed/(d.ccaOpen+1))/24)*60+30); // CCA velocity вҶ’ NV protection
    return '<div class="mvp-dol" role="region" aria-label="DOL Compliance Posture">'+
      '<div class="mvp-dol-head">'+
        '<div class="mvp-dol-title"><span class="mvp-dol-shield">вҡ–</span>DOL Rule В· Post-audit Surveillance</div>'+
        '<div class="mvp-dol-status">POSTURE В· ACTIVE</div>'+
      '</div>'+
      '<div class="mvp-dol-rows">'+
        '<div class="mvp-dol-row"><span class="mvp-dol-row-lbl">Proof of Autonomy</span><div class="mvp-dol-row-bar"><div class="mvp-dol-row-fill" style="width:'+autonomy.toFixed(0)+'%"></div></div><span class="mvp-dol-row-val">'+autonomy.toFixed(0)+'%</span></div>'+
