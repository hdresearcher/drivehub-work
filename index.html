  // в”Җв”Җ Activator: counter tween В· tap ripple В· live tick В· scroll morph в”Җв”Җ
  ns._initActivator=function(){
    if(typeof document==='undefined'||ns._activatorReady)return;
    ns._activatorReady=true;

    var REDUCED=(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches);

    // в”Җв”Җ Tween counters from 0 вҶ’ target with cubic ease-out в”Җв”Җ
    function activateCounters(){
      var els=document.querySelectorAll('.mvp-counter[data-tgt]:not([data-act])');
      if(!els.length)return;
      els.forEach(function(el,i){
        el.setAttribute('data-act','1');
        var target=parseFloat(el.getAttribute('data-tgt'));
        var pre=el.getAttribute('data-pre')||'';
        var suf=el.getAttribute('data-suf')||'';
        var dec=parseInt(el.getAttribute('data-dec')||0);
        var cm=el.getAttribute('data-cm')==='1';
        function fmt(v){
          var s=dec>0?v.toFixed(dec):Math.round(v).toString();
          if(cm){var p=s.split('.');p[0]=parseInt(p[0]||0).toLocaleString();s=p.join('.');}
          return pre+s+suf;
        }
        if(REDUCED){el.textContent=fmt(target);return;}
        var dur=900+Math.random()*400;
        var delay=Math.min(i*30,400); // staggered entrance
        var startTs=null;
        el.textContent=fmt(0);
        function tick(now){
          if(startTs===null)startTs=now;
          var t=Math.min(1,(now-startTs)/dur);
          var eased=1-Math.pow(1-t,3); // cubic ease-out
          el.textContent=fmt(target*eased);
          if(t<1)requestAnimationFrame(tick);
        }
        setTimeout(function(){requestAnimationFrame(tick);},delay);
      });
    }

    // в”Җв”Җ Tap ripple (delegated, low-overhead) в”Җв”Җ
    function spawnRipple(e){
      if(REDUCED)return;
      var btn=e.target.closest('.mvp-block .btn, .mvp-rb-cell, .mvp-fw-card, .mvp-kpi');
      if(!btn||btn.classList.contains('no-ripple'))return;
      var rect=btn.getBoundingClientRect();
      var size=Math.max(rect.width,rect.height)*1.6;
      var rip=document.createElement('span');
      rip.className='mvp-ripple';
      rip.style.width=rip.style.height=size+'px';
      rip.style.left=(e.clientX-rect.left-size/2)+'px';
      rip.style.top=(e.clientY-rect.top-size/2)+'px';
      btn.appendChild(rip);
      setTimeout(function(){if(rip.parentNode)rip.parentNode.removeChild(rip);},620);
    }

    // в”Җв”Җ Live tick: nudge 2-4 random ribbon counters every 4.5s в”Җв”Җ
    function liveTick(){
      if(document.hidden||REDUCED)return;
      var ribbon=document.querySelector('.mvp-ribbon');
      if(!ribbon)return;
      var pool=ribbon.querySelectorAll('.mvp-counter[data-act][data-tgt]');
      if(!pool.length)return;
      var n=Math.min(pool.length,2+Math.floor(Math.random()*3));
      var picked={};
      while(Object.keys(picked).length<n){
        var i=Math.floor(Math.random()*pool.length);
        picked[i]=pool[i];
      }
      Object.keys(picked).forEach(function(k){
        var el=picked[k];
        var pre=el.getAttribute('data-pre')||'',suf=el.getAttribute('data-suf')||'';
        var dec=parseInt(el.getAttribute('data-dec')||0),cm=el.getAttribute('data-cm')==='1';
        var target=parseFloat(el.getAttribute('data-tgt'));
        var noise=(Math.random()-0.5)*0.012; // Вұ0.6%
        var v=target*(1+noise);
        var s=dec>0?v.toFixed(dec):Math.round(v).toString();
        if(cm){var p=s.split('.');p[0]=parseInt(p[0]||0).toLocaleString();s=p.join('.');}
        el.textContent=pre+s+suf;
        el.classList.add('tick');
        setTimeout(function(){el.classList.remove('tick');},650);
      });
    }

    // в”Җв”Җ Sticky-ribbon morph: shadow when content scrolled away в”Җв”Җ
    function handleScroll(e){
      var pc=e&&e.target&&e.target.id==='page-content'?e.target:document.getElementById('page-content');
      if(!pc)return;
      var ribbons=pc.querySelectorAll('.mvp-ribbon');
      var scrolled=pc.scrollTop>4;
      ribbons.forEach(function(rb){rb.classList.toggle('is-scrolled',scrolled);});
    }

    // в”Җв”Җ Bind once when DOM is ready в”Җв”Җ
    function setup(){
      if(!document.body)return;
      // Re-activate counters on every render mutation
      var debounceTimer=null;
      var mo=new MutationObserver(function(){
        if(debounceTimer)return;
        debounceTimer=setTimeout(function(){debounceTimer=null;activateCounters();},30);
      });
      mo.observe(document.body,{childList:true,subtree:true});
      activateCounters();
      document.addEventListener('click',spawnRipple,true);
      document.addEventListener('scroll',handleScroll,{capture:true,passive:true});
      // Live tick (paused when tab is hidden via document.hidden check)
      ns._tickInterval=setInterval(liveTick,4500);
    }

    if(document.readyState!=='loading')setup();
    else document.addEventListener('DOMContentLoaded',setup);
  };
