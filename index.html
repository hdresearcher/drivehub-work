.re-rdr-body{flex:1;overflow-y:auto;padding:16px}
.re-rdr-body h2{font-size:13px;font-weight:700;color:#e2e8f0;margin:12px 0 5px;border-bottom:1px solid rgba(249,115,22,.15);padding-bottom:4px}
.re-rdr-body h3{font-size:11px;font-weight:700;color:#e2e8f0;margin:8px 0 3px}
.re-rdr-body p{font-size:11px;color:#94a3b8;line-height:1.7;margin-bottom:7px}
.re-rdr-body strong{color:#f97316}
.re-rdr-body table{width:100%;border-collapse:collapse;margin:8px 0;font-size:10px}
.re-rdr-body th{background:rgba(249,115,22,.08);padding:5px 7px;text-align:left;color:#e2e8f0;border:1px solid rgba(249,115,22,.1)}
.re-rdr-body td{padding:4px 7px;border:1px solid rgba(255,255,255,.04);color:#94a3b8}
.re-sim-bar{height:26px;display:flex;align-items:center;gap:10px;padding:0 18px;background:rgba(0,0,0,.35);border-top:1px solid rgba(249,115,22,.06);flex-shrink:0;font-size:9px;color:#475569;font-family:var(--mono)}

/* в”Җв”Җ Login Hero в”Җв”Җ */
.login-hero{text-align:center;padding:28px 24px 20px;background:linear-gradient(160deg,rgba(0,212,255,.07) 0%,rgba(0,153,204,.05) 50%,rgba(167,139,250,.06) 100%);border-bottom:1px solid var(--border);border-radius:20px 20px 0 0;position:relative;overflow:hidden}
.login-hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.1) 0%,transparent 70%);pointer-events:none;animation:heroGlow 4s ease-in-out infinite}
@keyframes heroGlow{0%,100%{opacity:.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}
.login-hero .login-logo-row{justify-content:center;margin-bottom:10px}
.login-hero .login-logo-icon{width:52px;height:52px;border-radius:14px;box-shadow:0 4px 28px rgba(0,212,255,.4);animation:heroPulse 3s ease-in-out infinite}
.login-hero .login-logo-icon span{font-size:18px!important}
@keyframes heroPulse{0%,100%{box-shadow:0 4px 28px rgba(0,212,255,.4)}50%{box-shadow:0 4px 44px rgba(0,212,255,.65),0 0 60px rgba(0,212,255,.15)}}
.login-hero .login-logo-title{font-size:26px}
.login-hero .login-logo-sub{font-size:10px;letter-spacing:3.5px;margin-top:6px}
.login-slogan{font-size:13px;color:var(--primary);margin-top:10px;font-style:italic;letter-spacing:.5px;opacity:.75;animation:sloganFloat 5s ease-in-out infinite}
@keyframes sloganFloat{0%,100%{opacity:.75;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}
body.light-theme .login-hero{background:linear-gradient(160deg,rgba(0,180,220,.06) 0%,rgba(0,153,204,.04) 50%,rgba(140,120,220,.05) 100%)}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* DH_MVP В· Mobile-first В· Engagement-grade dashboards (textedits_01)    */
/* All rules namespaced .mvp-* вҖ” zero collisions with existing selectors */
/* Donor patterns: cockpit-v2 (ribbon) В· flowskip-v2 (grade/exception)   */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

/* в”Җв”Җ Block / KPI core (fluid sizing) в”Җв”Җ */
.mvp-block{position:relative;margin-bottom:clamp(12px,1.6vw,16px);padding:clamp(14px,1.8vw,20px);
  background:linear-gradient(180deg,rgba(15,16,25,.6) 0%,rgba(10,10,15,.4) 100%);
  transition:border-color .2s ease;border-radius:clamp(10px,1.2vw,14px)}
.mvp-block:hover{border-color:rgba(0,212,255,.18)}
.mvp-block h3{font-size:clamp(13px,1.5vw,15px);font-weight:700;letter-spacing:-.01em;line-height:1.3}
.mvp-block h3>span:nth-of-type(1){flex:1;min-width:0}
.mvp-kpi{padding:clamp(11px,1.4vw,15px);border-radius:clamp(8px,1vw,12px);
  transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;min-width:0}
.mvp-kpi:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.35),0 0 0 1px rgba(0,212,255,.06)}
.mvp-kpi:focus-within{outline:2px solid var(--primary);outline-offset:2px}
.mvp-kpi>div:nth-child(1){font-size:clamp(9px,1vw,10px);line-height:1.2}
.mvp-kpi>div:nth-child(2){font-size:clamp(18px,2.4vw,22px);line-height:1.15;word-break:break-word}
.mvp-kpi>div:nth-child(3){font-size:clamp(10px,1.1vw,11px);line-height:1.4;margin-top:4px}

/* в”Җв”Җ Framework footer в”Җв”Җ */
.mvp-framework{background:linear-gradient(90deg,rgba(52,211,153,.04) 0%,rgba(0,212,255,.04) 50%,rgba(167,139,250,.04) 100%)}
.mvp-framework-grid{gap:clamp(10px,1.4vw,14px)}
.mvp-fw-card{background:rgba(15,16,25,.65);transition:transform .15s ease;padding:clamp(12px,1.6vw,16px)}
.mvp-fw-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.mvp-flag{font-family:var(--mono),system-ui;font-size:clamp(10px,1.1vw,11px)}
.mvp-hidden{font-family:inherit;font-size:clamp(10px,1.1vw,11px)}

/* в”Җв”Җ Margin Ribbon В· sticky В· animated sweep В· cockpit-v2 adaptation в”Җв”Җ */
.mvp-ribbon{display:flex;align-items:stretch;min-height:48px;margin:0 0 clamp(12px,1.6vw,16px);
  border-radius:clamp(10px,1.2vw,14px);
  background:linear-gradient(90deg,rgba(52,211,153,.06) 0%,rgba(0,212,255,.05) 50%,rgba(167,139,250,.06) 100%);
  border:1px solid var(--border);overflow:hidden;position:sticky;top:0;z-index:8;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.mvp-ribbon::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(90deg,transparent 0%,rgba(0,212,255,.13) 50%,transparent 100%);
  background-size:200% 100%;animation:mvpRbnSweep 9s linear infinite;opacity:.55;pointer-events:none}
@keyframes mvpRbnSweep{0%{background-position:-100% 0}100%{background-position:100% 0}}
.mvp-rb-cell{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:clamp(8px,1vw,10px) clamp(10px,1.2vw,14px);
  border-right:1px solid var(--border-sub);min-width:0;position:relative;z-index:1}
.mvp-rb-cell:last-child{border-right:none}
.mvp-rb-icon{width:clamp(22px,2.5vw,28px);height:clamp(22px,2.5vw,28px);border-radius:7px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:clamp(12px,1.4vw,14px);font-weight:700}
.mvp-rb-content{display:flex;flex-direction:column;line-height:1.15;min-width:0;flex:1}
.mvp-rb-label{font-size:clamp(8px,.9vw,9px);font-family:var(--mono);letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mvp-rb-value{font-family:var(--mono);font-weight:700;font-size:clamp(12px,1.4vw,14px);letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.mvp-rb-extra{display:flex;align-items:center;gap:5px;flex-shrink:0}

/* в”Җв”Җ Sparkline (inline SVG) в”Җв”Җ */
svg.mvp-spark{flex-shrink:0;display:block;height:18px;width:54px;opacity:.85}
svg.mvp-spark path{stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
svg.mvp-spark .mvp-spark-area{fill-opacity:.12;stroke:none}
svg.mvp-spark circle{filter:drop-shadow(0 0 3px currentColor)}

/* в”Җв”Җ Delta chip в”Җв”Җ */
.mvp-delta{display:inline-flex;align-items:center;gap:2px;font-family:var(--mono);
  font-size:clamp(9px,1vw,10px);font-weight:700;padding:1px 5px;border-radius:4px;
  letter-spacing:.3px;line-height:1;white-space:nowrap}
.mvp-delta-up{background:rgba(34,197,94,.14);color:var(--ok-t)}
.mvp-delta-down{background:rgba(239,68,68,.14);color:var(--err-t)}
.mvp-delta-flat{background:rgba(255,255,255,.05);color:var(--muted)}

/* в”Җв”Җ Goal progress (mini-bar with target marker) в”Җв”Җ */
.mvp-goal{margin-top:6px;font-size:9px;color:var(--muted);font-family:var(--mono)}
.mvp-goal-track{position:relative;height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:3px;overflow:hidden}
.mvp-goal-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--primary),var(--ok-t));transition:width .9s cubic-bezier(.16,1,.3,1)}
.mvp-goal-fill.over{background:linear-gradient(90deg,var(--ok-t),var(--money,#34d399))}

/* в”Җв”Җ Live pulse В· for real-time metrics (Takt, OEE, OTIF) в”Җв”Җ */
.mvp-pulse{display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--pulse-c,var(--ok-t));position:relative;flex-shrink:0;box-shadow:0 0 6px var(--pulse-c,var(--ok-t))}
.mvp-pulse::after{content:'';position:absolute;inset:0;border-radius:50%;background:inherit;
  animation:mvpPulse 2.4s cubic-bezier(.4,0,.6,1) infinite}
@keyframes mvpPulse{0%{transform:scale(1);opacity:.85}80%,100%{transform:scale(2.8);opacity:0}}

/* в”Җв”Җ Streak badge в”Җв”Җ */
.mvp-streak{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;
  background:linear-gradient(135deg,rgba(251,191,36,.14),rgba(245,158,11,.10));
  border:1px solid rgba(251,191,36,.22);color:var(--warn-t)}

/* в”Җв”Җ Driver Grade pills (flowskip-v2 adaptation) в”Җв”Җ */
.mvp-grade{display:inline-flex;align-items:center;gap:3px;font-size:clamp(9px,1vw,10px);font-weight:700;
  padding:2px 7px;border-radius:4px;font-family:var(--mono);letter-spacing:.5px;border:1px solid transparent}
.mvp-grade-5{background:rgba(0,212,255,.12);color:var(--primary);border-color:rgba(0,212,255,.25)}
.mvp-grade-4{background:rgba(74,222,128,.10);color:var(--ok-t);border-color:rgba(74,222,128,.22)}
.mvp-grade-3{background:rgba(251,191,36,.10);color:var(--warn-t);border-color:rgba(251,191,36,.22)}
.mvp-grade-2{background:rgba(251,146,60,.10);color:#fb923c;border-color:rgba(251,146,60,.22)}
.mvp-grade-1{background:rgba(239,68,68,.10);color:var(--err-t);border-color:rgba(239,68,68,.22)}

/* в”Җв”Җ Exception cards (flowskip-v2 adaptation) в”Җв”Җ */
.mvp-exc-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.mvp-exc{padding:clamp(10px,1.2vw,12px);border-radius:8px;border:1px solid;display:flex;gap:10px;align-items:flex-start}
.mvp-exc-c22{border-color:rgba(251,191,36,.30);background:rgba(251,191,36,.04)}
.mvp-exc-otif{border-color:rgba(239,68,68,.28);background:rgba(239,68,68,.04)}
.mvp-exc-cca{border-color:rgba(167,139,250,.28);background:rgba(167,139,250,.04)}
.mvp-exc-icon{font-size:14px;flex-shrink:0}
.mvp-exc-body{flex:1;min-width:0}
.mvp-exc-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px}
.mvp-exc-meta{font-size:10px;color:var(--muted);font-family:var(--mono);line-height:1.5}
.mvp-exc-tag{font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;font-family:var(--mono);letter-spacing:.5px;flex-shrink:0;align-self:flex-start;margin-top:1px}
.mvp-exc-tag-c22{background:var(--warn-bg);color:var(--warn-t)}
.mvp-exc-tag-otif{background:var(--err-bg);color:var(--err-t)}
.mvp-exc-tag-cca{background:var(--pur-bg);color:var(--pur-t)}

/* в”Җв”Җ Scroll-triggered card-enter animation (10x feel vs avg CRM) в”Җв”Җ */
@keyframes mvpEnter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.mvp-block{animation:mvpEnter .45s cubic-bezier(.16,1,.3,1) backwards}
.mvp-block:nth-of-type(1){animation-delay:.04s}
.mvp-block:nth-of-type(2){animation-delay:.08s}
.mvp-block:nth-of-type(3){animation-delay:.12s}
.mvp-block:nth-of-type(4){animation-delay:.16s}
.mvp-block:nth-of-type(5){animation-delay:.20s}
.mvp-block:nth-of-type(6){animation-delay:.24s}
.mvp-block:nth-of-type(7){animation-delay:.28s}
.mvp-block:nth-of-type(8){animation-delay:.32s}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* RESPONSIVE TIERS В· 1280 / 900 / 640 / 480 / 380                      */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
@media(max-width:1280px){
  .mvp-block .g4{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  .mvp-framework-grid{grid-template-columns:1fr}
  .mvp-block .g3{grid-template-columns:repeat(2,1fr)}
  svg.mvp-spark{width:48px;height:16px}
}
@media(max-width:760px){
  .mvp-ribbon{flex-wrap:wrap;min-height:auto;padding:4px;gap:3px}
  .mvp-rb-cell{flex:1 0 calc(50% - 3px);padding:8px 10px;border-right:none;border:1px solid var(--border-sub);border-radius:7px;min-height:48px}
  .mvp-rb-cell:last-child{border-right:1px solid var(--border-sub)}
}
@media(max-width:640px){
  .mvp-block .g4,.mvp-block .g3,.mvp-block .g2{grid-template-columns:1fr;gap:8px}
  .mvp-block{padding:14px;border-radius:10px}
  .mvp-block h3{font-size:13px;margin-bottom:10px}
  .mvp-rb-extra{display:none}
}
@media(max-width:480px){
  .mvp-rb-cell{flex:1 0 100%}
  .mvp-block{padding:12px}
  .mvp-fw-card{padding:11px}
  .mvp-kpi{padding:11px}
  /* Hide animated sweep on very small to save GPU */
  .mvp-ribbon::before{display:none}
}
@media(max-width:380px){
  .mvp-block h3{flex-wrap:wrap;font-size:12px}
}

/* в”Җв”Җ Touch-friendly buttons (pointer:coarse = mobile/tablet) в”Җв”Җ */
@media(pointer:coarse){
  .mvp-block .btn-sm{min-height:38px;padding:9px 14px;font-size:12px}
  .mvp-block .btn{min-height:44px;padding:11px 16px}
  .mvp-rb-cell{min-height:52px}
  .mvp-kpi{padding:14px}
}

/* в”Җв”Җ Reduced motion (a11y / battery friendly) в”Җв”Җ */
@media(prefers-reduced-motion:reduce){
  .mvp-ribbon::before,.mvp-pulse::after,.mvp-block,.mvp-kpi,.mvp-fw-card{animation:none!important;transition:none!important}
  *{transition-duration:.001ms!important;animation-duration:.001ms!important}
}

/* в”Җв”Җ Safe-area insets (notch / home indicator) в”Җв”Җ */
@supports(padding:env(safe-area-inset-bottom)){
  #page-content{padding-bottom:max(0px,env(safe-area-inset-bottom))}
}

/* в”Җв”Җ Dark light theme support hooks в”Җв”Җ */
body.light-theme .mvp-block{background:linear-gradient(180deg,rgba(255,255,255,.7) 0%,rgba(245,247,250,.5) 100%)}
body.light-theme .mvp-ribbon{background:linear-gradient(90deg,rgba(52,211,153,.10) 0%,rgba(0,212,255,.08) 50%,rgba(167,139,250,.10) 100%)}
body.light-theme svg.mvp-spark{opacity:1}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* iOS-feel pass В· glassmorphism В· counters В· ring В· ripple В· live tick  */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

/* в”Җв”Җ Glassmorphism (iOS Control Center) в”Җв”Җ */
.mvp-block{
  backdrop-filter:blur(10px) saturate(1.18);
  -webkit-backdrop-filter:blur(10px) saturate(1.18);
  background:linear-gradient(180deg,rgba(15,16,25,.55) 0%,rgba(10,10,15,.34) 100%);
  border:1px solid rgba(255,255,255,.07);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 8px 32px rgba(0,0,0,.4)}
.mvp-block:hover{
  transform:translateY(-2px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(0,212,255,.10)}

/* в”Җв”Җ Animated counter (tabular-nums for stable width during tween) в”Җв”Җ */
.mvp-counter{font-variant-numeric:tabular-nums;display:inline-block;will-change:contents}
.mvp-counter.tick{animation:mvpTickPulse .65s cubic-bezier(.4,0,.6,1)}
@keyframes mvpTickPulse{
  0%{text-shadow:0 0 0 currentColor;transform:scale(1)}
  45%{text-shadow:0 0 12px currentColor;transform:scale(1.06)}
  100%{text-shadow:0 0 0 currentColor;transform:scale(1)}
}

/* в”Җв”Җ Progress ring (iOS Activity / Health) в”Җв”Җ */
svg.mvp-ring{display:inline-block;vertical-align:middle;overflow:visible}
svg.mvp-ring .mvp-ring-bg{stroke:rgba(255,255,255,.09);fill:none}
svg.mvp-ring .mvp-ring-fg{transition:stroke-dashoffset 1.4s cubic-bezier(.16,1,.3,1);fill:none;stroke-linecap:round;filter:drop-shadow(0 0 8px currentColor)}
svg.mvp-ring text{font-family:var(--mono);font-weight:700;font-size:11px;dominant-baseline:central;text-anchor:middle}

/* в”Җв”Җ Tap ripple (iOS-grade tactile feedback) в”Җв”Җ */
.mvp-block .btn,.mvp-rb-cell,.mvp-fw-card,.mvp-kpi{position:relative;overflow:hidden}
.mvp-ripple{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.42) 0%,rgba(255,255,255,0) 70%);
  pointer-events:none;transform:scale(0);
  animation:mvpRipple .6s cubic-bezier(.4,0,.6,1) forwards}
@keyframes mvpRipple{to{transform:scale(2.5);opacity:0}}

/* в”Җв”Җ Sticky ribbon morph (iOS Large Title pattern) в”Җв”Җ */
.mvp-ribbon{transition:box-shadow .25s ease,backdrop-filter .25s ease}
.mvp-ribbon.is-scrolled{box-shadow:0 8px 24px rgba(0,0,0,.55);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4)}

/* в”Җв”Җ iOS-style scroll snap & momentum on mobile в”Җв”Җ */
@media(max-width:760px){
  #page-content{scroll-snap-type:y proximity;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
  .mvp-block{scroll-snap-align:start;scroll-margin-top:88px}
}

/* в”Җв”Җ Live "live" indicator dot (iOS Now Playing) в”Җв”Җ */
.mvp-live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok-t);
  box-shadow:0 0 6px var(--ok-t);margin-right:5px;animation:mvpLiveBlink 1.6s infinite ease-in-out}
@keyframes mvpLiveBlink{0%,100%{opacity:1}50%{opacity:.45}}

/* в”Җв”Җ Reduced motion (override iOS animations) в”Җв”Җ */
@media(prefers-reduced-motion:reduce){
  .mvp-counter.tick,.mvp-ripple,.mvp-live-dot{animation:none!important}
  svg.mvp-ring .mvp-ring-fg{transition:none!important}
  .mvp-block:hover{transform:none}
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* CYBERPUNK В· DriveHub neon palette В· holographic В· scanlines В· glitch */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
:root{
  --mvp-neon-cyan:#00f0ff;
  --mvp-neon-magenta:#ff2bd6;
  --mvp-neon-lime:#b2ff00;
  --mvp-neon-amber:#ffb800;
  --mvp-neon-violet:#a78bfa
}

/* в”Җв”Җ Holographic ribbon shimmer (Dynamic Island feel) в”Җв”Җ */
.mvp-ribbon{
  background:linear-gradient(90deg,
    rgba(0,240,255,.07) 0%,
    rgba(167,139,250,.07) 25%,
    rgba(255,43,214,.06) 50%,
    rgba(178,255,0,.05) 75%,
    rgba(0,240,255,.07) 100%);
  background-size:200% 100%;
  animation:mvpHoloShift 14s linear infinite}
@keyframes mvpHoloShift{0%{background-position:0 0}100%{background-position:-200% 0}}

/* в”Җв”Җ Neon flicker on HIGH priority badges (b-urgent) в”Җв”Җ */
.mvp-block .badge.b-urgent{
  text-shadow:0 0 8px currentColor;
  box-shadow:0 0 12px rgba(239,68,68,.30),inset 0 0 0 1px rgba(239,68,68,.45);
  animation:mvpNeonFlicker 4.5s infinite}
@keyframes mvpNeonFlicker{
  0%,96%,100%{opacity:1;text-shadow:0 0 8px currentColor}
  96.5%{opacity:.45;text-shadow:none}
  97%{opacity:1;text-shadow:0 0 8px currentColor}
  98%{opacity:.6;text-shadow:0 0 4px currentColor}
}

/* в”Җв”Җ Scanlines overlay (HUD feel) в”Җв”Җ */
.mvp-scanlines{position:relative}
.mvp-scanlines::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,
    transparent 0px,
    transparent 3px,
    rgba(0,212,255,.045) 3px,
    rgba(0,212,255,.045) 4px);
  border-radius:inherit;mix-blend-mode:overlay;opacity:.6}

/* в”Җв”Җ Cyber grid pattern (subtle TRON background) в”Җв”Җ */
.mvp-grid-bg{
  background-image:
    linear-gradient(rgba(0,212,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.035) 1px,transparent 1px);
  background-size:24px 24px;
  background-position:-1px -1px}

/* в”Җв”Җ Glitch text (Mr Robot / Akira) в”Җв”Җ */
.mvp-glitch{position:relative;display:inline-block}
.mvp-glitch::before,.mvp-glitch::after{
  content:attr(data-text);position:absolute;left:0;top:0;width:100%;
  pointer-events:none;background:transparent}
.mvp-glitch::before{color:var(--mvp-neon-cyan);clip-path:polygon(0 0,100% 0,100% 33%,0 33%);
  animation:mvpGlitchA 3.2s infinite linear;text-shadow:1px 0 var(--mvp-neon-cyan)}
.mvp-glitch::after{color:var(--mvp-neon-magenta);clip-path:polygon(0 67%,100% 67%,100% 100%,0 100%);
  animation:mvpGlitchB 3.2s infinite linear reverse;text-shadow:-1px 0 var(--mvp-neon-magenta)}
@keyframes mvpGlitchA{
  0%,90%,100%{transform:translate(0,0);opacity:.65}
  92%{transform:translate(-2px,1px)}
  94%{transform:translate(1px,-1px)}
  96%{transform:translate(-1px,1px)}
}
@keyframes mvpGlitchB{
  0%,88%,100%{transform:translate(0,0);opacity:.65}
  92%{transform:translate(2px,-1px)}
  94%{transform:translate(-1px,1px)}
  96%{transform:translate(1px,-1px)}
}

/* в”Җв”Җ Mini bar chart (distributions like Grade 1-5) в”Җв”Җ */
.mvp-bars-wrap{padding:8px 0}
.mvp-bars{display:flex;align-items:flex-end;gap:4px;height:54px;padding:2px 0}
.mvp-bar-col{
  flex:1;background:linear-gradient(180deg,var(--bar-c,var(--primary)) 0%,
    color-mix(in srgb,var(--bar-c,var(--primary)) 60%,transparent) 100%);
  min-height:3px;border-radius:3px 3px 0 0;
  animation:mvpBarGrow 1s cubic-bezier(.16,1,.3,1) backwards;
  box-shadow:0 0 8px var(--bar-c,var(--primary));position:relative}
.mvp-bar-col:nth-child(1){animation-delay:.05s}.mvp-bar-col:nth-child(2){animation-delay:.10s}
.mvp-bar-col:nth-child(3){animation-delay:.15s}.mvp-bar-col:nth-child(4){animation-delay:.20s}
.mvp-bar-col:nth-child(5){animation-delay:.25s}.mvp-bar-col:nth-child(6){animation-delay:.30s}
@keyframes mvpBarGrow{from{height:0!important;opacity:0}to{opacity:1}}
.mvp-bars-labels{display:flex;gap:4px;margin-top:6px;font-size:9px;font-family:var(--mono);color:var(--muted);text-align:center}
.mvp-bars-labels>div{flex:1}
.mvp-bars-vals{display:flex;gap:4px;margin-top:2px;font-size:10px;font-family:var(--mono);font-weight:700;text-align:center}
.mvp-bars-vals>div{flex:1}

/* в”Җв”Җ Radar chart (multi-dim KPI overview) в”Җв”Җ */
svg.mvp-radar{display:block;margin:0 auto;overflow:visible}
svg.mvp-radar .mvp-radar-grid{stroke:rgba(255,255,255,.07);fill:none}
svg.mvp-radar .mvp-radar-axis{stroke:rgba(255,255,255,.05)}
svg.mvp-radar .mvp-radar-shape{
  fill-opacity:.20;stroke-width:1.6;
  filter:drop-shadow(0 0 6px currentColor);
  transition:all .8s cubic-bezier(.16,1,.3,1);
  animation:mvpRadarPulse 3s ease-in-out infinite}
@keyframes mvpRadarPulse{0%,100%{filter:drop-shadow(0 0 6px currentColor)}50%{filter:drop-shadow(0 0 14px currentColor)}}
svg.mvp-radar .mvp-radar-label{font-family:var(--mono);font-size:9px;font-weight:600;fill:var(--muted)}
svg.mvp-radar .mvp-radar-pt{fill:currentColor;filter:drop-shadow(0 0 4px currentColor)}

/* в”Җв”Җ Gauge (semi-circular, OEE / atomic clock feel) в”Җв”Җ */
svg.mvp-gauge{display:block;margin:0 auto;overflow:visible}
svg.mvp-gauge .mvp-gauge-arc-bg{stroke:rgba(255,255,255,.07);fill:none;stroke-linecap:round}
svg.mvp-gauge .mvp-gauge-arc-fg{
  transition:stroke-dashoffset 1.4s cubic-bezier(.16,1,.3,1);
  fill:none;stroke-linecap:round;
  filter:drop-shadow(0 0 10px currentColor)}
svg.mvp-gauge .mvp-gauge-tick{stroke:rgba(255,255,255,.2);stroke-width:1}
svg.mvp-gauge text{font-family:var(--mono);text-anchor:middle}

/* в”Җв”Җ Activity feed (live event stream В· Stocks news feel) в”Җв”Җ */
.mvp-feed{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;
  padding:4px 2px 4px 0;scrollbar-width:thin}
.mvp-feed::-webkit-scrollbar{width:3px}
.mvp-feed::-webkit-scrollbar-thumb{background:rgba(0,212,255,.25);border-radius:2px}
.mvp-feed-item{
  display:flex;align-items:flex-start;gap:9px;padding:9px 11px;
  border-radius:9px;background:rgba(255,255,255,.022);
  border:1px solid var(--border-sub);
  font-size:11px;line-height:1.4;
  animation:mvpFeedSlide .5s cubic-bezier(.16,1,.3,1) backwards;
  position:relative;overflow:hidden}
.mvp-feed-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--feed-c,var(--primary));box-shadow:0 0 6px var(--feed-c,var(--primary))}
.mvp-feed-item:nth-child(1){animation-delay:.05s}
.mvp-feed-item:nth-child(2){animation-delay:.10s}
.mvp-feed-item:nth-child(3){animation-delay:.15s}
.mvp-feed-item:nth-child(4){animation-delay:.20s}
.mvp-feed-item:nth-child(5){animation-delay:.25s}
.mvp-feed-item:nth-child(6){animation-delay:.30s}
.mvp-feed-item:nth-child(7){animation-delay:.35s}
@keyframes mvpFeedSlide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.mvp-feed-time{font-family:var(--mono);font-size:9px;color:var(--muted);
  flex-shrink:0;min-width:42px;letter-spacing:.5px}
.mvp-feed-icon{font-size:13px;flex-shrink:0;line-height:1.2}
.mvp-feed-body{flex:1;min-width:0}
.mvp-feed-title{font-weight:600;color:var(--text);font-size:11.5px}
.mvp-feed-meta{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:1px;letter-spacing:.3px}

/* в”Җв”Җ Heatmap grid (24h Г— 7d / GitHub-style) в”Җв”Җ */
.mvp-heatmap{display:grid;gap:3px}
.mvp-heat-cell{
  aspect-ratio:1;border-radius:3px;
  background:var(--cell-c,rgba(0,212,255,.08));
  transition:transform .15s ease,box-shadow .15s ease;
  cursor:default;min-width:8px}
.mvp-heat-cell:hover{transform:scale(1.35);z-index:1;box-shadow:0 0 10px var(--cell-c)}
.mvp-heatmap-axis{display:flex;justify-content:space-between;font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:4px;letter-spacing:.5px}

/* в”Җв”Җ Mobile (cyberpunk doesn't break on small screens) в”Җв”Җ */
@media(max-width:640px){
  svg.mvp-radar{width:160px;height:160px}
  svg.mvp-gauge{width:120px;height:84px}
  .mvp-feed{max-height:200px}
}

/* в”Җв”Җ Reduced motion overrides for cyber animations в”Җв”Җ */
@media(prefers-reduced-motion:reduce){
  .mvp-ribbon{animation:none!important;background:rgba(15,16,25,.5)!important}
  .mvp-block .badge.b-urgent{animation:none!important}
  .mvp-glitch::before,.mvp-glitch::after{animation:none!important}
  .mvp-bar-col{animation:none!important}
  .mvp-feed-item{animation:none!important}
  svg.mvp-radar .mvp-radar-shape{animation:none!important}
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* TICKER В· DONUT В· QUICK-STATS В· TIMELINE В· AREA CHART                  */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

/* в”Җв”Җ Ticker tape (Bloomberg / Reuters style horizontal scroll) в”Җв”Җ */
.mvp-ticker{
  height:36px;background:linear-gradient(90deg,rgba(0,0,0,.55),rgba(15,16,25,.5),rgba(0,0,0,.55));
  border:1px solid var(--border);border-radius:9px;
  overflow:hidden;margin:0 0 12px;position:relative;
  -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 6%,#000 94%,transparent 100%);
  mask-image:linear-gradient(90deg,transparent 0,#000 6%,#000 94%,transparent 100%);
  box-shadow:inset 0 0 12px rgba(0,212,255,.06)}
.mvp-ticker::before{
  content:'LIVE';position:absolute;left:8px;top:50%;transform:translateY(-50%);
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1.5px;
  color:var(--ok-t);background:rgba(0,0,0,.7);padding:2px 7px;border-radius:4px;
  box-shadow:0 0 8px rgba(74,222,128,.4);z-index:2;
  animation:mvpLiveBlink 1.6s infinite ease-in-out}
.mvp-ticker-track{display:flex;gap:36px;padding:9px 0 9px 60px;
  animation:mvpTickerScroll 70s linear infinite;white-space:nowrap;width:max-content}
.mvp-ticker:hover .mvp-ticker-track{animation-play-state:paused}
@keyframes mvpTickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.mvp-ticker-item{display:inline-flex;align-items:center;gap:7px;
  font-family:var(--mono);font-size:11px;flex-shrink:0;letter-spacing:.3px}
.mvp-ticker-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;box-shadow:0 0 5px currentColor}
.mvp-ticker-label{font-weight:600;color:var(--muted);text-transform:uppercase;font-size:9px;letter-spacing:1.2px}
.mvp-ticker-value{color:var(--text);font-weight:700}
.mvp-ticker-delta{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.3px}
.mvp-ticker-delta.up{color:var(--ok-t);background:rgba(34,197,94,.13)}
.mvp-ticker-delta.down{color:var(--err-t);background:rgba(239,68,68,.13)}
.mvp-ticker-delta.flat{color:var(--muted);background:rgba(255,255,255,.05)}

/* в”Җв”Җ Donut chart with legend в”Җв”Җ */
.mvp-donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center;padding:6px 0}
svg.mvp-donut{display:block;flex-shrink:0;overflow:visible}
svg.mvp-donut circle{transition:stroke-dasharray 1.1s cubic-bezier(.16,1,.3,1)}
.mvp-donut-legend{display:flex;flex-direction:column;gap:7px;font-size:11px;font-family:var(--mono);min-width:140px}
.mvp-donut-leg{display:flex;align-items:center;gap:9px;line-height:1.2}
.mvp-donut-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;box-shadow:0 0 4px currentColor}
.mvp-donut-lbl{flex:1;color:var(--muted);font-weight:500}
.mvp-donut-val{color:var(--text);font-weight:700;letter-spacing:.3px}

/* в”Җв”Җ Quick stats strip (6 inline tiles) в”Җв”Җ */
.mvp-quick{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:7px;margin-bottom:12px}
.mvp-quick-item{padding:9px 12px;border-radius:8px;background:rgba(255,255,255,.025);
  border:1px solid var(--border);border-left:3px solid;transition:all .15s ease}
.mvp-quick-item:hover{transform:translateY(-1px);background:rgba(255,255,255,.04);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.mvp-quick-val{font-family:var(--mono);font-size:14px;font-weight:700;line-height:1.1}
.mvp-quick-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1.2px;text-transform:uppercase;margin-top:3px}
.mvp-quick-trend{font-size:9px;margin-top:3px;font-family:var(--mono);font-weight:600}

/* в”Җв”Җ 24-hour timeline (event density bar) в”Җв”Җ */
.mvp-timeline{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;height:30px;padding:2px 0}
.mvp-tl-bar{border-radius:3px;transition:transform .15s ease,box-shadow .15s ease;cursor:default;
  background:rgba(255,255,255,.05);min-height:6px}
.mvp-tl-bar:hover{transform:scaleY(1.18);z-index:1;box-shadow:0 0 10px currentColor}
.mvp-tl-bar.active{box-shadow:0 0 6px currentColor}
.mvp-tl-axis{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;
  color:var(--muted);margin-top:5px;letter-spacing:.5px;padding:0 2px}
.mvp-tl-axis>span{flex:0 0 auto}

/* в”Җв”Җ Mini area chart (for richer trend than sparkline) в”Җв”Җ */
svg.mvp-area{display:block;width:100%;height:64px;overflow:visible}
svg.mvp-area .mvp-area-fill{fill-opacity:.2}
svg.mvp-area .mvp-area-line{fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  filter:drop-shadow(0 0 4px currentColor)}
svg.mvp-area .mvp-area-axis{stroke:rgba(255,255,255,.06);stroke-width:1}
svg.mvp-area .mvp-area-pt{fill:currentColor;filter:drop-shadow(0 0 3px currentColor)}
svg.mvp-area text{font-family:var(--mono);font-size:8px;fill:var(--muted)}

/* в”Җв”Җ Cockpit auto-block layout fix в”Җв”Җ */
.mvp-cockpit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:1024px){.mvp-cockpit-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.mvp-cockpit-grid{grid-template-columns:1fr}}

/* в”Җв”Җ Responsive tickers / donuts в”Җв”Җ */
@media(max-width:640px){
  .mvp-ticker{height:32px}
  .mvp-ticker::before{font-size:8px;padding:1px 5px}
  .mvp-ticker-item{font-size:10px;gap:5px}
  .mvp-ticker-track{padding-left:50px}
  svg.mvp-donut{width:120px;height:120px}
  .mvp-donut-legend{min-width:100%}
  .mvp-timeline{height:24px}
}

@media(prefers-reduced-motion:reduce){
  .mvp-ticker-track{animation:none!important}
  svg.mvp-donut circle{transition:none!important}
  svg.mvp-area .mvp-area-line{filter:none}
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* CRYPTO WALL В· iOS Stocks-app cards В· 6 symbols incl. $DRH & CCR     */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

.mvp-crypto-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--c-accent,var(--primary));box-shadow:0 0 8px var(--c-accent,var(--primary))}
.mvp-crypto-head{display:flex;align-items:baseline;gap:7px;margin-bottom:5px}

.mvp-crypto-price{font-family:var(--mono);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
.mvp-crypto-body svg.mvp-spark{width:46px;height:18px;flex-shrink:0;opacity:.95}
.mvp-crypto-foot{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:9px;line-height:1.1}
.mvp-crypto-delta{font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.3px}
.mvp-crypto-delta.up{color:var(--ok-t);background:rgba(34,197,94,.13)}
.mvp-crypto-delta.down{color:var(--err-t);background:rgba(239,68,68,.13)}
.mvp-crypto-mcap{color:var(--muted);font-weight:500;letter-spacing:.4px}
.mvp-crypto-card.featured{border-color:rgba(0,240,255,.35);box-shadow:0 0 16px rgba(0,240,255,.12),inset 0 0 0 1px rgba(0,240,255,.15)}
.mvp-crypto-card.featured::after{content:'вҳ… DRIVEHUB';position:absolute;top:6px;right:6px;font-family:var(--mono);font-size:7px;font-weight:700;letter-spacing:1.2px;color:var(--mvp-neon-cyan);background:rgba(0,240,255,.10);padding:1px 5px;border-radius:3px;text-shadow:0 0 4px var(--mvp-neon-cyan)}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* MES В«РҰРҳРӨР РһР’РһРҷ РҰР•РҘВ» В· Production Defect Tally                          */
/* DOL POST-AUDIT POSTURE В· 1099 Compliance Surveillance                */
/* Both auto-injected before crypto wall В· per textedits_01 spec        */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

.mvp-mes-strip{display:grid;grid-template-columns:1.4fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:900px){.mvp-mes-strip{grid-template-columns:1fr}}

.mvp-mes-defect{
  padding:12px 14px;border-radius:11px;
  background:linear-gradient(135deg,rgba(239,68,68,.06) 0%,rgba(15,16,25,.78) 60%,rgba(0,0,0,.5) 100%);
  border:1px solid rgba(239,68,68,.18);position:relative;overflow:hidden;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.mvp-mes-defect::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(239,68,68,.04) 3px,rgba(239,68,68,.04) 4px);
  opacity:.7;border-radius:inherit;mix-blend-mode:overlay}
.mvp-mes-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:relative;z-index:1}
.mvp-mes-title{font-family:var(--mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--err-t);font-weight:700;display:flex;align-items:center;gap:7px}
.mvp-mes-title::before{content:'в– ';color:var(--err-t);font-size:8px;animation:mvpLiveBlink 1.6s infinite ease-in-out}
.mvp-mes-tag{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.5px}
.mvp-mes-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;position:relative;z-index:1}
@media(max-width:640px){.mvp-mes-grid{grid-template-columns:repeat(2,1fr)}}
.mvp-mes-cell{padding:8px 9px;border-radius:7px;background:rgba(0,0,0,.3);border:1px solid rgba(239,68,68,.1)}
.mvp-mes-cell-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.mvp-mes-cell-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--err-t);font-variant-numeric:tabular-nums;line-height:1.1}
.mvp-mes-cell-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.3px}
.mvp-mes-total{margin-top:10px;display:flex;align-items:baseline;justify-content:space-between;padding-top:10px;border-top:1px solid rgba(239,68,68,.15);position:relative;z-index:1}
.mvp-mes-total-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.mvp-mes-total-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--err-t);font-variant-numeric:tabular-nums;text-shadow:0 0 8px rgba(239,68,68,.4)}
.mvp-mes-total-meta{font-family:var(--mono);font-size:9px;color:var(--money);letter-spacing:.4px}

.mvp-dol{
  padding:12px 14px;border-radius:11px;
  background:linear-gradient(135deg,rgba(167,139,250,.06) 0%,rgba(15,16,25,.78) 60%,rgba(0,0,0,.5) 100%);
  border:1px solid rgba(167,139,250,.20);position:relative;overflow:hidden;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.mvp-dol-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mvp-dol-title{font-family:var(--mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--pur-t);font-weight:700;display:flex;align-items:center;gap:7px}
.mvp-dol-shield{color:var(--pur-t);font-size:13px;text-shadow:0 0 6px var(--pur-t);animation:mvpPulse 3s infinite}
@keyframes mvpDolPulse{0%,100%{opacity:1}50%{opacity:.55}}
.mvp-dol-status{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:4px;background:rgba(74,222,128,.12);color:var(--ok-t);border:1px solid rgba(74,222,128,.25)}
.mvp-dol-rows{display:flex;flex-direction:column;gap:7px}
.mvp-dol-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;font-family:var(--mono);font-size:11px}
.mvp-dol-row-lbl{color:var(--muted);font-size:9px;letter-spacing:.6px;text-transform:uppercase}
.mvp-dol-row-bar{height:6px;border-radius:3px;background:rgba(255,255,255,.06);position:relative;overflow:hidden}
.mvp-dol-row-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--pur-t),var(--ok-t));transition:width 1.4s cubic-bezier(.16,1,.3,1);box-shadow:0 0 6px var(--pur-t)}
.mvp-dol-row-val{font-weight:700;color:var(--text);font-size:11px;font-variant-numeric:tabular-nums;min-width:48px;text-align:right}
.mvp-dol-foot{margin-top:10px;padding-top:10px;border-top:1px solid rgba(167,139,250,.15);font-family:var(--mono);font-size:9px;color:var(--muted);line-height:1.5;letter-spacing:.3px}
.mvp-dol-foot strong{color:var(--pur-t);font-weight:700}

@media(prefers-reduced-motion:reduce){
  .mvp-mes-defect::before,.mvp-dol-shield{animation:none!important}
  .mvp-dol-row-fill{transition:none!important}
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* INTRADAY RATES TRADER В· cyber trading desk                            */
/* OnRouteRates extension В· wholesale вҶ’ retail driver pool resale        */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

/* Tab switcher В· Marketplace вҮ„ Trader Desk */
.orr-tab-bar{display:inline-flex;gap:4px;background:rgba(0,0,0,.35);padding:4px;border-radius:9px;border:1px solid var(--border);margin-bottom:14px}
.orr-tab{padding:8px 16px;border-radius:6px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.6px;cursor:pointer;color:var(--muted);transition:all .15s ease;border:none;background:transparent;display:inline-flex;align-items:center;gap:6px}
.orr-tab:not(.active):hover{color:var(--text);background:rgba(255,255,255,.04)}
.orr-tab.active{background:linear-gradient(135deg,var(--mvp-neon-cyan),var(--primary));color:#07091a;box-shadow:0 0 14px rgba(0,212,255,.4),inset 0 1px 0 rgba(255,255,255,.2)}

/* Stats ribbon вҖ” trader top-line */
.trader-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px;padding:14px;
  background:linear-gradient(135deg,rgba(0,212,255,.04) 0%,rgba(0,0,0,.34) 100%);
  border:1px solid var(--border);border-radius:11px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.trader-stat{padding:6px 0}
.trader-stat-label{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.trader-stat-val{font-family:var(--mono);font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
.trader-stat-val.up{color:var(--ok-t)}
.trader-stat-val.down{color:var(--err-t)}
.trader-stat-val.cyan{color:var(--mvp-neon-cyan)}
.trader-stat-val.violet{color:var(--mvp-neon-violet,var(--pur-t))}
.trader-stat-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px}

/* Trader CTA strip */
.trade-cta{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px;border-radius:11px;
  background:linear-gradient(180deg,rgba(0,0,0,.42),rgba(15,16,25,.62));border:1px solid var(--border);margin-bottom:12px}
@media(max-width:760px){.trade-cta{grid-template-columns:repeat(2,1fr)}}
.trade-cta-btn{padding:11px 8px;border-radius:7px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.6px;cursor:pointer;border:1px solid;background:transparent;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.trade-cta-btn.buy{color:var(--ok-t);border-color:rgba(74,222,128,.4)}
.trade-cta-btn.buy:hover{background:rgba(74,222,128,.10);box-shadow:0 0 14px rgba(74,222,128,.25)}
.trade-cta-btn.sell{color:var(--err-t);border-color:rgba(239,68,68,.4)}
.trade-cta-btn.sell:hover{background:rgba(239,68,68,.10);box-shadow:0 0 14px rgba(239,68,68,.25)}
.trade-cta-btn.limit{color:var(--mvp-neon-cyan);border-color:rgba(0,240,255,.4)}
.trade-cta-btn.limit:hover{background:rgba(0,240,255,.10);box-shadow:0 0 14px rgba(0,240,255,.30)}
.trade-cta-btn.auto{color:var(--mvp-neon-magenta);border-color:rgba(255,43,214,.4)}
.trade-cta-btn.auto:hover{background:rgba(255,43,214,.10);box-shadow:0 0 14px rgba(255,43,214,.30)}

/* 3-col main grid В· Order Book / Positions / Trade Feed */
.trader-grid{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:1100px){.trader-grid{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.trader-grid{grid-template-columns:1fr}}

/* Panel base for book / positions / feed */
.book-panel{padding:12px;border-radius:11px;background:linear-gradient(180deg,rgba(15,16,25,.62) 0%,rgba(10,10,15,.40) 100%);
  border:1px solid var(--border);display:flex;flex-direction:column;gap:8px;min-height:360px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.book-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:10px}
.book-title{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mvp-neon-cyan);display:flex;align-items:center;gap:6px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.book-title-ico{font-size:13px;flex-shrink:0;text-shadow:0 0 4px currentColor}
.book-spread{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.5px;flex-shrink:0}

/* Order Book ladder В· ask top вҶ’ mid вҶ’ bid bottom */
.book-ladder{display:flex;flex-direction:column;font-family:var(--mono);font-size:10.5px;flex:1}
.book-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;align-items:center;padding:5px 8px;border-radius:4px;cursor:pointer;transition:background .12s ease;letter-spacing:.3px;position:relative;overflow:hidden}
.book-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:var(--depth-w,0%);opacity:.18;pointer-events:none;border-radius:4px}
.book-row.ask{color:var(--err-t)}
.book-row.ask::before{background:var(--err-t)}
.book-row.bid{color:var(--ok-t)}
.book-row.bid::before{background:var(--ok-t)}
.book-row.ask:hover{background:rgba(239,68,68,.12)}
.book-row.bid:hover{background:rgba(74,222,128,.12)}
.book-row.best{font-weight:800;border-left:2px solid var(--mvp-neon-cyan);padding-left:6px}
.book-row .px{font-weight:700;text-align:left;position:relative}
.book-row .qty{text-align:center;color:var(--muted);position:relative}
.book-row .total{text-align:right;color:var(--dim);font-size:9.5px;position:relative}
.book-mid{display:flex;align-items:center;justify-content:center;gap:8px;padding:7px;margin:5px 0;
  background:linear-gradient(90deg,rgba(239,68,68,.06) 0%,rgba(0,212,255,.12) 50%,rgba(74,222,128,.06) 100%);
  border:1px solid rgba(0,240,255,.15);border-radius:6px;
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--mvp-neon-cyan);
  text-shadow:0 0 6px rgba(0,240,255,.45)}

/* Open positions table */
.pos-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10.5px}
.pos-table th{text-align:left;padding:6px 7px;color:var(--muted);font-weight:600;letter-spacing:.6px;text-transform:uppercase;font-size:9px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(15,16,25,.95);z-index:1}
.pos-table td{padding:7px 7px;border-bottom:1px solid var(--border-sub)}
.pos-table tr:hover td{background:rgba(0,240,255,.03)}
.pos-pnl-up{color:var(--ok-t);font-weight:700}
.pos-pnl-down{color:var(--err-t);font-weight:700}
.pos-action{padding:4px 9px;font-size:9px;border-radius:4px;border:1px solid;background:transparent;cursor:pointer;font-family:var(--mono);font-weight:700;letter-spacing:.5px;transition:all .12s}
.pos-action.sell{color:var(--err-t);border-color:rgba(239,68,68,.4)}
.pos-action.sell:hover{background:rgba(239,68,68,.1);box-shadow:0 0 8px rgba(239,68,68,.3)}
.pos-action.add{color:var(--ok-t);border-color:rgba(74,222,128,.4);margin-left:4px}
.pos-action.add:hover{background:rgba(74,222,128,.1)}
.pos-prov{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Recent trades feed */
.feed-trades{display:flex;flex-direction:column;gap:4px;flex:1;overflow-y:auto;max-height:340px}
.feed-trade{display:grid;grid-template-columns:auto auto auto 1fr auto;gap:8px;align-items:center;padding:6px 9px;border-radius:5px;font-family:var(--mono);font-size:10.5px;border-left:2px solid;animation:mvpFeedSlide .35s cubic-bezier(.16,1,.3,1) backwards}
.feed-trade.buy{border-left-color:var(--ok-t);background:rgba(74,222,128,.045)}
.feed-trade.sell{border-left-color:var(--err-t);background:rgba(239,68,68,.045)}
.feed-trade-time{color:var(--muted);font-size:9px;flex-shrink:0;letter-spacing:.4px}
.feed-trade-side{font-weight:700;flex-shrink:0;font-size:9.5px;letter-spacing:.5px}
.feed-trade-side.buy{color:var(--ok-t)}
.feed-trade-side.sell{color:var(--err-t)}
.feed-trade-px{font-weight:700;flex-shrink:0;color:var(--text)}
.feed-trade-prov{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.feed-trade-qty{flex-shrink:0;color:var(--dim);font-size:9.5px}

/* Rate selector strip В· pick which rate to view in book */
.rate-selector{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;margin-bottom:10px;scrollbar-width:thin}
.rate-selector::-webkit-scrollbar{height:3px}
.rate-selector::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);border-radius:2px}
.rate-chip{flex-shrink:0;padding:7px 12px;border-radius:7px;background:rgba(255,255,255,.025);
  border:1px solid var(--border);font-family:var(--mono);font-size:10.5px;cursor:pointer;
  transition:all .15s ease;display:inline-flex;flex-direction:column;gap:2px;min-width:120px;
  letter-spacing:.3px}
.rate-chip:hover{border-color:rgba(0,212,255,.35);background:rgba(0,212,255,.06)}
.rate-chip.active{border-color:var(--mvp-neon-cyan);background:rgba(0,240,255,.10);

.rate-chip-prov{font-size:10px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rate-chip-px{font-weight:700;color:var(--mvp-neon-cyan);font-size:11.5px}
.rate-chip-trend{font-size:9px;color:var(--ok-t)}
.rate-chip.active .rate-chip-prov{color:var(--mvp-neon-cyan)}

/* Driver Demand Pool */
.demand-pool{padding:14px;border-radius:11px;
  background:linear-gradient(135deg,rgba(167,139,250,.06) 0%,rgba(15,16,25,.6) 100%);
  border:1px solid rgba(167,139,250,.22);position:relative;overflow:hidden;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.demand-pool::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--mvp-neon-violet,var(--pur-t)),transparent);
  animation:mvpHoloShift 4s linear infinite;background-size:200% 100%}
.demand-rows{display:flex;flex-direction:column;margin-top:10px}
.demand-row{display:grid;grid-template-columns:auto 1fr auto auto auto;gap:10px;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--border-sub);font-family:var(--mono);font-size:10.5px}
.demand-row:last-child{border-bottom:none}
.demand-grade{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.6px;font-family:var(--mono);min-width:24px;text-align:center}
.demand-driver{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.demand-driver-id{color:var(--muted);font-size:9.5px}
.demand-bid{font-weight:700;color:var(--mvp-neon-cyan);text-align:right;min-width:80px}
.demand-qty{color:var(--muted);font-size:9.5px;min-width:48px;text-align:right}
.demand-action{padding:4px 10px;font-size:9px;border-radius:4px;border:1px solid var(--mvp-neon-cyan);
  background:transparent;color:var(--mvp-neon-cyan);cursor:pointer;font-family:var(--mono);font-weight:700;letter-spacing:.5px;transition:all .12s}
.demand-action:hover{background:rgba(0,240,255,.12);box-shadow:0 0 10px rgba(0,240,255,.3)}

// SEEDED PRNG вҖ” deterministic random for consistent renders
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function seededRng(seed){var s=seed;return function(){s=(s*16807+0)%2147483647;return(s-1)/2147483646;};}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// PLATFORM HISTORICAL DATA вҖ” 18 months of simulated metrics
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
var PLATFORM_HISTORY=(function(){
  var rng=seededRng(42);var r=function(){return rng();};var months=[];
  var baseCompanies=6,baseMRR=3200;
  for(var m=0;m<18;m++){
    var ym=new Date(2023,9+m,1);var year=ym.getFullYear(),mo=ym.getMonth();
    var growth=1+m*0.065+r()*0.02;
    var seasonal=1+(mo===11?0.18:mo===0?-0.04:mo===6?0.08:mo===4?0.05:0);
    var coCount=Math.round(baseCompanies*growth*seasonal);

/* Build a synthetic order book for any rate В· 5 levels each side, depth-weighted. */
function _orrBook(rate){
  var seed=rate.id||1;
  var rnd=function(n){var x=Math.sin(seed*9301+49297*n)*233280;return x-Math.floor(x);};
  var mid=rate.rate;
  var asks=[],bids=[];
  for(var i=1;i<=5;i++){
    asks.push({px:Math.round((mid+i*0.018)*1000)/1000, qty:Math.floor(15+rnd(i)*45)});
    bids.push({px:Math.round((mid-i*0.018)*1000)/1000, qty:Math.floor(15+rnd(i+10)*45)});
  }
  asks.reverse(); // best ask (lowest) at bottom adjacent to mid
  return {asks:asks, bids:bids, mid:mid};
}

    const mult=isSun?0.32:isSat?0.68:isFri?1.14:isWed?1.12:0.94+(Math.sin(d*0.9)*0.1);
    const volume=Math.round(baseDailyVol*mult+(Math.random()*baseDailyVol*0.06-baseDailyVol*0.03));
    const stops=Math.round(baseDailyStops*mult+(Math.random()*baseDailyStops*0.06-baseDailyStops*0.03));

    days.push({day:d+1,date:dt.toISOString().slice(0,10),dow:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dow],

var _chartCounter=0;
var CHART_TYPES=[{k:'line',l:'Line'},{k:'area',l:'Area'},{k:'bars',l:'Bars'},{k:'scatter',l:'Scatter'},{k:'stepped',l:'Stepped'},{k:'spline',l:'Spline'}];
window.setChartType=function(cid,type){state.chartTypes[cid]=type;rerenderPage();};

function lineChart(data,key,color='#00d4ff',forcedId){
  var cid=forcedId||('ch_'+(++_chartCounter));
  var type=state.chartTypes[cid]||'line';
  var W=500,H=160,PL=44,PR=10,PT=10,PB=22;
  var vals=data.map(function(d){return d[key];});
  var max=Math.max.apply(null,vals)*1.1||1,min=0;
  var xs=data.map(function(_,i){return PL+(W-PL-PR)*i/(data.length-1);});
  var ys=vals.map(function(v){return PT+(H-PT-PB)*(1-(v-min)/(max-min));});
  var steps=4;
  var yLabels=Array.from({length:steps+1},function(_,i){
    var f=i/steps,v=min+(max-min)*f,y=PT+(H-PT-PB)*(1-f);
    var lbl=max>=2000?'$'+Math.round(v/1000)+'k':max>=100?'$'+Math.round(v):v.toFixed(2);
    return '<text x="'+(PL-5)+'" y="'+(y+4)+'" text-anchor="end" font-size="10" fill="var(--muted)">'+lbl+'</text><line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="var(--border)" stroke-dasharray="3 3"/>';
  }).join('');
  var xLabels=data.map(function(d,i){return '<text x="'+xs[i]+'" y="'+H+'" text-anchor="middle" font-size="10" fill="var(--muted)">'+esc(d.month||d.label||d.day||i+1)+'</text>';}).join('');
  var gid='g'+Math.random().toString(36).slice(2,8);
  var grad='<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stop-color="'+color+'" stop-opacity="0.28"/><stop offset="95%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>';
  var body='';
  if(type==='line'){
    var pts=xs.map(function(x,i){return x+','+ys[i];}).join(' ');
    body='<polyline class="chart-line" points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+xs.map(function(x,i){return '<circle class="chart-dot" cx="'+x+'" cy="'+ys[i]+'" r="3.5" fill="'+color+'" stroke="var(--surface)" stroke-width="2" style="animation-delay:'+(0.3+i*0.06)+'s"/>';}).join('');
  }else if(type==='area'){
    var pts2=xs.map(function(x,i){return x+','+ys[i];}).join(' ');
    var area='M'+xs[0]+','+(H-PB)+' '+xs.map(function(x,i){return 'L'+x+','+ys[i];}).join(' ')+' L'+xs[xs.length-1]+','+(H-PB)+' Z';
    body='<path class="chart-area" d="'+area+'" fill="url(#'+gid+')"/><polyline class="chart-line" points="'+pts2+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  }else if(type==='bars'){
    var bw=Math.max(6,Math.min(28,(W-PL-PR)/data.length-4));
    body=xs.map(function(x,i){var h=H-PB-ys[i];return '<rect x="'+(x-bw/2)+'" y="'+ys[i]+'" width="'+bw+'" height="'+h+'" rx="3" fill="'+color+'" opacity="0.75"/>';}).join('');
  }else if(type==='scatter'){
    body=xs.map(function(x,i){return '<circle cx="'+x+'" cy="'+ys[i]+'" r="5" fill="'+color+'" opacity="0.8"/><circle cx="'+x+'" cy="'+ys[i]+'" r="2" fill="var(--surface)"/>';}).join('');
  }else if(type==='stepped'){
    var sp='M'+xs[0]+','+ys[0];
    for(var si=1;si<xs.length;si++){sp+=' L'+xs[si]+','+ys[si-1]+' L'+xs[si]+','+ys[si];}
    body='<path d="'+sp+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round"/>'+xs.map(function(x,i){return '<circle cx="'+x+'" cy="'+ys[i]+'" r="3" fill="'+color+'" stroke="var(--surface)" stroke-width="1.5"/>';}).join('');
  }else if(type==='spline'){
    var cp=[];
    for(var j=0;j<xs.length;j++){
      if(j===0)cp.push('M'+xs[0]+','+ys[0]);
      else{var cpx1=xs[j-1]+(xs[j]-xs[j-1])/3,cpx2=xs[j]-(xs[j]-xs[j-1])/3;cp.push(' C'+cpx1+','+ys[j-1]+' '+cpx2+','+ys[j]+' '+xs[j]+','+ys[j]);}
    }
    body='<path d="'+cp.join('')+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round"/>'+xs.map(function(x,i){return '<circle cx="'+x+'" cy="'+ys[i]+'" r="3" fill="'+color+'" stroke="var(--surface)" stroke-width="1.5"/>';}).join('');
  }
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:190px;display:block">'+grad+yLabels+xLabels+body+'</svg>';
  var sel='<div class="chart-switch"><select onchange="setChartType(\''+cid+'\',this.value)">'+CHART_TYPES.map(function(t){return '<option value="'+t.k+'"'+(type===t.k?' selected':'')+'>'+t.l+'</option>';}).join('')+'</select></div>';
  return '<div class="chart-wrap">'+sel+svg+'</div>';
}
function donutChart(data){
  const total=data.reduce((a,d)=>a+d.value,0)||1;
  let angle=-Math.PI/2;
  const R=52,cx=70,cy=68,r=30;
  const slices=data.map(d=>{
    const a=2*Math.PI*d.value/total;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    angle+=a;
    const x2=cx+R*Math.cos(angle),y2=cy+R*Math.sin(angle);
    return `<path d="M${cx},${cy} L${x1},${y1} A${R},${R},0,${a>Math.PI?1:0},1,${x2},${y2} Z" fill="${d.color}" opacity="0.9"/>`;
  }).join('');
  const legend=data.map(d=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:8px;height:8px;border-radius:50%;background:${d.color};flex-shrink:0"></div><span style="color:var(--muted);flex:1">${esc(d.name)}</span><span style="font-weight:600">${d.value}</span></div>`).join('');
  return `<div style="display:flex;align-items:center;gap:16px"><svg viewBox="0 0 140 136" style="width:140px;height:136px;flex-shrink:0">${slices}<circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--surface)"/></svg><div style="display:flex;flex-direction:column;gap:8px">${legend}</div></div>`;
}
function ringChart(pct,color='#00d4ff',label='',sub=''){
  const r=44,cx=56,cy=56,circ=2*Math.PI*r;
  const fill=circ*(pct/100),gap=circ-fill;
  return `<svg viewBox="0 0 112 112" style="width:112px;height:112px;display:block;flex-shrink:0;margin:0 auto">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="10"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${fill} ${gap}" stroke-dashoffset="${circ*0.25}" transform="rotate(-90 ${cx} ${cy}) rotate(90 ${cx} ${cy})" style="animation:ringFill .8s cubic-bezier(.34,1.56,.64,1) both"/>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="18" font-weight="700" fill="var(--text)" style="animation:valFlash .5s ease-out .4s both">${label}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="10" fill="var(--muted)">${sub}</text>
  </svg>`;
}

    <div class="g4 mb4">${kpi('Active Companies',activeC,`${pendingC} pending`,'Building2',periodChange(curMonth.companies,prevMonth.companies),'var(--primary-bg)',false,'Companies with active subscriptions currently on the platform')}${kpi('Monthly Revenue','$'+rev.toLocaleString(),'from active subscriptions','DollarSign',revChange+' vs last month','var(--ok-bg)',false,'Total monthly recurring revenue from all active subscription plans')}${kpi('Open Requests',openR,`${urgR} urgent`,'FileText','',urgR>0?'var(--err-bg)':'var(--primary-bg)',false,'Service requests currently in New or In Progress status')}${kpi('Driver Reports',pendSubs+' pending',`${driverSubmissions.length} total`,'ClipboardList','Needs review','var(--warn-bg)',false,'Driver-submitted data corrections awaiting accountant review')}</div>
    <div class="g4 mb4">${kpi('Total Fleet',fleet+' vehicles',drivers+' active drivers','Truck','+'+curMonth.newCompanies+' new','var(--primary-bg)',false,'Combined fleet size across all registered companies')}${kpi('Platform Churn',curMonth.churnRate+'%','companies/month','ArrowUpRight','',curMonth.churnRate<3?'var(--ok-bg)':'var(--warn-bg)',curMonth.churnRate>=3,'Percentage of companies that cancel their subscription per month')}${kpi('Avg On-Time',curMonth?Math.round(93+curMonth.companies*0.1)+'%':'вҖ”','platform average','Clock','','var(--ok-bg)',false,'Average on-time delivery rate across all active drivers')}${kpi('Plan Revenue','$'+curMonth.mrr.toLocaleString()+'/mo','all plans combined','DollarSign',revChange,'var(--primary-bg)',false,'Combined MRR from Starter, Professional and Enterprise plans')}</div>
    <div class="g21 mb4">
      <div class="card"><div class="ch">${icon('TrendingUp')}&nbsp;Revenue Trend</div><div class="cb">${lineChart(revTrend,'revenue')}</div></div>
      <div class="card"><div class="ch">Company Status</div><div class="cb">${donutChart(statusDist)}</div></div>
    </div>
    <div class="g21 mb4">
      <div class="card"><div class="ch">${icon('Users')}&nbsp;Company Growth</div><div class="cb">${lineChart(trSliceData(PLATFORM_HISTORY.slice(-8).map(function(m){return{month:m.label,revenue:m.companies};})),'revenue','#4ade80')}</div></div>
      <div class="card"><div class="ch">Plan Distribution</div><div class="cb">${donutChart(planDist)}</div></div>
    </div>
    <div class="g2 mb4">
      <div class="card"><div class="ch">${icon('FileText')}&nbsp;Recent Requests</div><div class="cb">${recentR.map(r=>`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-sub)"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.title)}</div><div style="font-size:11px;color:var(--muted)">${esc(r.type||'General')}</div></div><div style="display:flex;align-items:center;gap:5px;flex-shrink:0">${r.priority==='urgent'?icon('AlertTriangle'):''}<span style="font-size:11px;font-weight:500;color:${SC[r.status]||'var(--muted)'}">${r.status.replace('_',' ')}</span></div></div>`).join('')}</div></div>
      <div class="card"><div class="ch">${icon('Send')}&nbsp;Activity Feed</div><div class="cb">${notifications.slice(0,6).map(n=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-sub);font-size:12px"><span style="font-size:14px">${n.icon}</span><div style="flex:1;min-width:0"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block">${esc(n.title)}</span></div><span style="font-size:10px;color:var(--dim);font-family:var(--mono);white-space:nowrap">${esc(n.time)}</span></div>`).join('')}</div></div>
    </div>
    <div class="card mb4"><div class="ch">${icon('Building2')}&nbsp;Top Companies by Revenue</div><div class="cb"><table><thead><tr><th>Company</th><th>Location</th><th style="text-align:right">Fleet</th><th style="text-align:right">Revenue</th><th style="text-align:right">Plan</th></tr></thead><tbody>${topCo.map(c=>`<tr><td style="font-weight:500">${esc(c.name)}</td><td style="color:var(--muted)">${esc(c.city)}, ${esc(c.state)}</td><td style="text-align:right">${c.fleet}</td><td style="text-align:right;font-weight:500">$${(c.rev||0).toLocaleString()}</td><td style="text-align:right">${planBadge(c.plan)}</td></tr>`).join('')}</tbody></table></div></div>
  </div>`;
}

function renderRequests(){
  const view=window._reqView||'kanban';

  const COLS=['new','in_progress','completed','cancelled'];
  const CL={new:'New',in_progress:'In Progress',completed:'Completed',cancelled:'Cancelled'};
  const CC={new:'b-new',in_progress:'b-in_progress',completed:'b-completed',cancelled:'b-cancelled'};
  const kanban=COLS.map(col=>{const cr=filtered.filter(r=>r.status===col);return`<div class="k-col"><div class="k-head"><span class="badge ${CC[col]}">${CL[col]}</span><span style="font-size:11px;color:var(--muted)">${cr.length}</span></div>${cr.map(r=>`<div class="req-card"><div style="display:flex;gap:5px;margin-bottom:6px">${r.priority==='urgent'?`<span style="color:#f87171">${icon('AlertTriangle')}</span>`:''}<div class="req-title">${esc(r.title)}</div></div><div class="req-meta">${icon('Building2')}<span class="truncate">${esc(coName(r.coId))}</span></div>${r.type?`<div class="req-meta">${icon('FileText')} ${esc(r.type)}</div>`:''} ${r.val>0?`<div class="req-meta">${icon('DollarSign')} $${r.val.toLocaleString()}</div>`:''}<div class="req-foot"><span style="font-size:11px;font-weight:500">${r.priority}</span><div style="display:flex;gap:4px"><select class="small-select" onchange="updateReqStatus(${r.id},this.value)">${COLS.map(s=>`<option value="${s}"${r.status===s?' selected':''}>${CL[s]}</option>`).join('')}</select><button class="btn-g" style="padding:3px" onclick="deleteReq(${r.id})">${icon('Trash2')}</button></div></div></div>`).join('')}</div>`;}).join('');
  return `<div class="page">
    <div class="ph"><div><div class="pt">Requests</div><div class="ps">${requests.length} total</div></div><div style="display:flex;gap:8px"><div style="display:flex;gap:4px"><button class="btn btn-sm ${view==='kanban'?'btn-p':'btn-o'}" onclick="window._reqView='kanban';rerenderPage()">Kanban</button><button class="btn btn-sm ${view==='list'?'btn-p':'btn-o'}" onclick="window._reqView='list';rerenderPage()">List</button></div><button class="btn btn-p" id="add-req-btn">${icon('Plus')} New</button></div></div>
    <div style="margin-bottom:14px"><div class="inp-w" style="max-width:320px"><span class="inp-ic">${icon('Search')}</span><input class="inp has-ic" id="req-search" placeholder="SearchвҖҰ" value="${esc(search)}" oninput="rerenderPage()"/></div></div>
    ${view==='kanban'?`<div class="kanban">${kanban}</div>`:`<div class="card"><table><thead><tr><th>Title</th><th>Company</th><th>Priority</th><th>Status</th><th style="text-align:right">Value</th><th></th></tr></thead><tbody>${filtered.map(r=>`<tr><td style="font-weight:500;max-width:180px"><span class="truncate" style="display:block">${esc(r.title)}</span></td><td style="color:var(--muted)">${esc(coName(r.coId))}</td><td>${prioBadge(r.priority)}</td><td><select class="small-select" onchange="updateReqStatus(${r.id},this.value)">${COLS.map(s=>`<option value="${s}"${r.status===s?' selected':''}>${CL[s]}</option>`).join('')}</select></td><td style="text-align:right">${r.val>0?'$'+r.val.toLocaleString():'вҖ”'}</td><td><button class="btn-g" style="padding:4px" onclick="deleteReq(${r.id})">${icon('Trash2')}</button></td></tr>`).join('')}</tbody></table></div>`}
  </div>`;
}

function renderBilling(){
  const u=state.user;
  const isAcc=u&&u.role==='accountant';
  const tab=state.accTab||'overview';
  const activeRev=subs.filter(s=>s.active).reduce((a,s)=>a+s.price,0);
  const pendingSubs=driverSubmissions.filter(s=>s.status==='pending').length;

  const tabs=isAcc?`<div class="tab-bar" style="max-width:500px">${[{id:'overview',label:'Overview'},{id:'manual_data',label:'Manual Data Entry'},{id:'reports',label:'Reports'}].map(t=>`<div class="tab-item${tab===t.id?' active':''}" onclick="state.accTab='${t.id}';rerenderPage()">${t.label}${t.id==='manual_data'&&pendingSubs>0?` <span class="nav-badge" style="font-size:9px;margin-left:4px">${pendingSubs}</span>`:''}</div>`).join('')}</div>`:'';

  if(isAcc&&tab==='manual_data') return renderManualData();
  if(isAcc&&tab==='reports') return renderReports();

  const PC={paid:'var(--ok-t)',overdue:'var(--err-t)',pending:'var(--warn-t)',suspended:'var(--muted)'};
  const PF={starter:{price:99,label:'Starter',features:['Up to 20 vehicles','Basic analytics','Email support']},professional:{price:299,label:'Professional',features:['Up to 100 vehicles','Advanced analytics','Priority support','CRM access']},enterprise:{price:799,label:'Enterprise',features:['Unlimited vehicles','Full analytics suite','Dedicated account manager','API access']}};

  // CHANGED: Dynamically compute plan counts and find the most popular plan
  var planCounts={starter:0,professional:0,enterprise:0};
  subs.filter(function(s){return s.active;}).forEach(function(s){planCounts[s.plan]=(planCounts[s.plan]||0)+1;});
  var mostPopularPlan='';var maxCount=0;
  Object.keys(planCounts).forEach(function(k){if(planCounts[k]>maxCount){maxCount=planCounts[k];mostPopularPlan=k;}});

  // Revenue by plan
  var revByPlan={starter:0,professional:0,enterprise:0};
  subs.filter(function(s){return s.active;}).forEach(function(s){revByPlan[s.plan]=(revByPlan[s.plan]||0)+s.price;});

  // Historical MRR data
  var curMonth=PLATFORM_HISTORY[PLATFORM_HISTORY.length-1];
  var prevMonth=PLATFORM_HISTORY[PLATFORM_HISTORY.length-2]||curMonth;
  var mrrChange=periodChange(curMonth.mrr,prevMonth.mrr);
  var mrrTrend=trSliceData(PLATFORM_HISTORY.slice(-8).map(function(m){return{month:m.label,revenue:m.mrr};}));

  // Payment status summary
  var paidCount=subs.filter(function(s){return s.pay==='paid';}).length;
  var overdueCount=subs.filter(function(s){return s.pay==='overdue';}).length;
  var pendingPayCount=subs.filter(function(s){return s.pay==='pending';}).length;
  var suspendedCount=subs.filter(function(s){return s.pay==='suspended';}).length;
  var collectionRate=subs.length>0?Math.round(paidCount/subs.length*100):0;

  // Plan revenue distribution for donut
  var planRevDist=[
    {name:'Starter ($'+revByPlan.starter.toLocaleString()+')',value:revByPlan.starter,color:'#14b8a6'},
    {name:'Pro ($'+revByPlan.professional.toLocaleString()+')',value:revByPlan.professional,color:'#00d4ff'},
    {name:'Enterprise ($'+revByPlan.enterprise.toLocaleString()+')',value:revByPlan.enterprise,color:'#a78bfa'}
  ].filter(function(d){return d.value>0;});

  return `<div class="page">
    <div class="ph"><div><div class="pt">Billing & Subscriptions</div><div class="ps">Manage plans and payments</div></div>${timeRangePicker('bill',state.timeRange)}</div>
    ${tabs}
    <div class="g4 mb4">
      ${[{t:'Monthly Recurring',v:'$'+activeRev.toLocaleString(),s:mrrChange+' vs last month',ic:'DollarSign',bg:'var(--primary-bg)',d:'Total monthly recurring revenue from all active subscription plans'},{t:'Active Plans',v:subs.filter(s=>s.active).length,s:`of ${subs.length} total subscriptions`,ic:'Users',bg:'var(--ok-bg)',d:'Number of companies with a currently active and non-suspended subscription'},{t:'Collection Rate',v:collectionRate+'%',s:paidCount+' paid В· '+overdueCount+' overdue',ic:'CheckCircle',bg:collectionRate>=90?'var(--ok-bg)':'var(--warn-bg)',d:'Percentage of all subscriptions that have been successfully paid this cycle'},{t:'Driver Reports',v:pendingSubs+' pending',s:'needs accountant review',ic:'ClipboardList',bg:pendingSubs>0?'var(--warn-bg)':'var(--border-sub)',d:'Driver-submitted data corrections that are awaiting accountant verification'}].map(kpiCard).join('')}
    </div>
    <div class="g21 mb4">
      <div class="card"><div class="ch">${icon('TrendingUp')}&nbsp;MRR Trend</div><div class="cb">${lineChart(mrrTrend,'revenue','#00d4ff')}</div></div>
      <div class="card"><div class="ch">Revenue by Plan</div><div class="cb">${donutChart(planRevDist)}</div></div>
    </div>
    <div class="st">Available Plans</div>
    <div class="g3 mb6">${Object.entries(PF).map(([key,p])=>{
      var isPopular=key===mostPopularPlan;
      var coCount=planCounts[key]||0;
      var planRev=revByPlan[key]||0;
      return `<div class="plan-card${isPopular?' popular':''}">${isPopular?'<div class="plan-popular">Most Popular</div>':''}<div style="padding:16px"><div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px">${planBadge(key)}<div><span style="font-size:20px;font-weight:700">$${p.price}</span><span style="font-size:11px;color:var(--muted)">/mo</span></div></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 10px;background:var(--border-sub);border-radius:8px"><div style="flex:1"><div style="font-size:18px;font-weight:700;color:var(--text)">${coCount}</div><div style="font-size:10px;color:var(--muted)">companies</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:600;color:var(--primary)">$${planRev.toLocaleString()}</div><div style="font-size:10px;color:var(--muted)">monthly rev</div></div></div><ul style="list-style:none;display:flex;flex-direction:column;gap:6px">${p.features.map(f=>`<li style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">${icon('CheckCircle')}&nbsp;${esc(f)}</li>`).join('')}</ul></div></div>`;}).join('')}</div>
    <div class="g2 mb4">
      <div class="card cb">
        <div style="font-weight:600;font-size:13px;margin-bottom:12px">${icon('BarChart2')}&nbsp;Payment Status</div>
        ${[{l:'Paid',c:paidCount,color:'var(--ok-t)',pct:subs.length>0?Math.round(paidCount/subs.length*100):0},{l:'Pending',c:pendingPayCount,color:'var(--warn-t)',pct:subs.length>0?Math.round(pendingPayCount/subs.length*100):0},{l:'Overdue',c:overdueCount,color:'var(--err-t)',pct:subs.length>0?Math.round(overdueCount/subs.length*100):0},{l:'Suspended',c:suspendedCount,color:'var(--muted)',pct:subs.length>0?Math.round(suspendedCount/subs.length*100):0}].map(function(s){return'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-sub)"><span style="font-size:12px;min-width:70px;color:'+s.color+';font-weight:500">'+s.l+'</span><div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+s.pct+'%;background:'+s.color+';border-radius:3px"></div></div><span style="font-size:12px;font-weight:600;min-width:36px;text-align:right">'+s.c+'</span></div>';}).join('')}
      </div>
      <div class="card cb">
        <div style="font-weight:600;font-size:13px;margin-bottom:12px">${icon('Users')}&nbsp;Platform Growth</div>
        ${[{l:'Companies (Oct \'23)',v:PLATFORM_HISTORY[0].companies},{l:'Companies (Now)',v:PLATFORM_HISTORY[PLATFORM_HISTORY.length-1].companies},{l:'Growth',v:periodChange(PLATFORM_HISTORY[PLATFORM_HISTORY.length-1].companies,PLATFORM_HISTORY[0].companies)},{l:'Avg Churn Rate',v:curMonth.churnRate+'%/mo'},{l:'MRR (Oct \'23)',v:'$'+PLATFORM_HISTORY[0].mrr.toLocaleString()},{l:'MRR (Now)',v:'$'+curMonth.mrr.toLocaleString()}].map(function(r){return'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-sub);font-size:12px"><span style="color:var(--muted)">'+r.l+'</span><span style="font-weight:600">'+r.v+'</span></div>';}).join('')}
      </div>
    </div>
    <div class="st">Active Subscriptions</div>
    <div class="card cb">${subs.map(s=>`<div class="billing-row"><div class="billing-co"><div style="font-size:13px;font-weight:500">${esc(coName(s.coId))}</div><div style="font-size:11px;color:var(--muted)">${esc(s.inv||'вҖ”')}</div></div>${planBadge(s.plan)}<div style="font-size:13px;font-weight:600;min-width:60px;text-align:right">$${s.price}/mo</div><div style="font-size:12px;font-weight:500;color:${PC[s.pay]||'var(--muted)'};display:flex;align-items:center;gap:4px;min-width:90px">${(s.pay==='overdue'||s.pay==='suspended')?icon('AlertTriangle'):''}${esc(s.pay)}</div><select class="small-select" onchange="updateSubPlan(${s.id},this.value)">${['starter','professional','enterprise'].map(p=>`<option value="${p}"${s.plan===p?' selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}</select></div>`).join('')}</div>
  </div>`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
